async function hashVaultPin(pin){
  const enc = new TextEncoder().encode("wv_vault_salt_v1_" + pin);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function encryptVault(data, pin){
  // Simple XOR + base64 with pin-derived key
  const key = pin.split("").map(c=>c.charCodeAt(0));
  const json = JSON.stringify(data);
  const enc = json.split("").map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key[i%key.length])).join("");
  return btoa(unescape(encodeURIComponent(enc)));
}

function decryptVault(b64, pin){
  try {
    const key = pin.split("").map(c=>c.charCodeAt(0));
    const enc = decodeURIComponent(escape(atob(b64)));
    const dec = enc.split("").map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key[i%key.length])).join("");
    return JSON.parse(dec);
  } catch(e){ return null; }
}

function PasswordVault({notify}){
  const [vaultState,setVaultState] = useState("check"); // check|setup|locked|unlocked
  const [pinInput,setPinInput]     = useState("");
  const [confirmPin,setConfirmPin] = useState("");
  const [pinError,setPinError]     = useState("");
  const [vaultData,setVaultData]   = useState([]);   // decrypted in memory only
  const [currentPin,setCurrentPin] = useState("");   // kept in memory for re-encryption
  const [activeTab,setActiveTab]   = useState("all");
  const [showAdd,setShowAdd]       = useState(false);
  const [editItem,setEditItem]     = useState(null);
  const [searchQ,setSearchQ]       = useState("");
  const [showPinChange,setShowPinChange] = useState(false);
  const [showImport,setShowImport] = useState(false);

  // On mount: check if vault pin exists
  useEffect(()=>{
    const hash = localStorage.getItem(PWD_VAULT_PIN);
    setVaultState(hash ? "locked" : "setup");
  },[]);

  // Persist vault whenever data changes (while unlocked)
  const persist = (data, pin) => {
    const enc = encryptVault(data, pin);
    localStorage.setItem(PWD_KEY, enc);
  };

  const handleSetup = async() => {
    if(pinInput.length < 4){ setPinError("PIN must be at least 4 digits"); return; }
    if(pinInput !== confirmPin){ setPinError("PINs do not match"); return; }
    const hash = await hashVaultPin(pinInput);
    localStorage.setItem(PWD_VAULT_PIN, hash);
    localStorage.removeItem(PWD_KEY);
    setCurrentPin(pinInput);
    setVaultData([]);
    persist([], pinInput);
    setVaultState("unlocked");
    setPinInput(""); setConfirmPin(""); setPinError("");
    notify("✓ Password Vault created");
  };

  const handleUnlock = async() => {
    // Check lockout
    const lockUntil = parseInt(localStorage.getItem(PWD_VAULT_LCK)||"0");
    if(Date.now() < lockUntil){
      const mins = Math.ceil((lockUntil-Date.now())/60000);
      setPinError(`Vault locked. Try again in ${mins} min`); return;
    }
    const hash = await hashVaultPin(pinInput);
    const stored = localStorage.getItem(PWD_VAULT_PIN);
    if(hash !== stored){
      const att = parseInt(localStorage.getItem(PWD_VAULT_ATT)||"0") + 1;
      localStorage.setItem(PWD_VAULT_ATT, att);
      if(att >= 5){
        localStorage.setItem(PWD_VAULT_LCK, Date.now()+5*60*1000);
        localStorage.removeItem(PWD_VAULT_ATT);
        setPinError("5 wrong attempts — vault locked for 5 minutes"); return;
      }
      setPinError(`Wrong PIN (${5-att} attempts left)`); return;
    }
    localStorage.removeItem(PWD_VAULT_ATT);
    const enc = localStorage.getItem(PWD_KEY);
    const decrypted = enc ? decryptVault(enc, pinInput) : [];
    if(decrypted === null){ setPinError("Decryption failed — wrong PIN or corrupt data"); return; }
    setCurrentPin(pinInput);
    setVaultData(decrypted || []);
    setVaultState("unlocked");
    setPinInput(""); setPinError("");
    notify("✓ Vault unlocked");
  };

  const lockVault = () => {
    setVaultData([]);
    setCurrentPin("");
    setVaultState("locked");
    setPinInput("");
    notify("Vault locked");
  };

  const updateVault = (newData) => {
    setVaultData(newData);
    persist(newData, currentPin);
  };

  const addEntry  = e => { updateVault([...vaultData,{...e,id:Date.now()+Math.random(),createdAt:today(),updatedAt:today()}]); setShowAdd(false); notify("✓ Entry saved"); };
  const saveEntry = e => { updateVault(vaultData.map(v=>v.id===e.id?{...e,updatedAt:today()}:v)); setEditItem(null); notify("✓ Entry updated"); };
  const delEntry  = id => { updateVault(vaultData.filter(v=>v.id!==id)); notify("Entry deleted"); };

  const filtered = vaultData.filter(v=>{
    const catMatch = activeTab==="all" || v.category===activeTab;
    const q = searchQ.toLowerCase();
    const textMatch = !q || v.title?.toLowerCase().includes(q) || v.fields?.some(f=>!f.masked&&f.value?.toLowerCase().includes(q));
    return catMatch && textMatch;
  });

  const catCount = id => id==="all" ? vaultData.length : vaultData.filter(v=>v.category===id).length;

  // ── SETUP SCREEN ──
  if(vaultState==="setup") return (
    <div style={{maxWidth:420,margin:"60px auto",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:16}}>🔐</div>
      <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>Create Password Vault</div>
      <div style={{fontSize:13,color:"#555",marginBottom:32}}>Your vault is encrypted locally. Choose a strong PIN — if forgotten, the vault cannot be recovered.</div>
      <div style={{textAlign:"left",background:"#0e0e18",border:"1px solid #2a2a3a",borderRadius:16,padding:24}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:6}}>NEW VAULT PIN (min 4 digits)</div>
          <input className="input" type="password" value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,""))}
            onKeyDown={e=>e.key==="Enter"&&handleSetup()} placeholder="Enter PIN" style={{letterSpacing:4,fontSize:18,textAlign:"center"}} maxLength={12}/>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:6}}>CONFIRM PIN</div>
          <input className="input" type="password" value={confirmPin} onChange={e=>setConfirmPin(e.target.value.replace(/\D/g,""))}
            onKeyDown={e=>e.key==="Enter"&&handleSetup()} placeholder="Confirm PIN" style={{letterSpacing:4,fontSize:18,textAlign:"center"}} maxLength={12}/>
        </div>
        {pinError&&<div style={{fontSize:12,color:"#f87171",marginBottom:12,textAlign:"center"}}>{pinError}</div>}
        <button className="btn btn-primary" style={{width:"100%",fontSize:14,padding:"12px 0"}} onClick={handleSetup}>Create Vault</button>
      </div>
    </div>
  );

  // ── LOCKED SCREEN ──
  if(vaultState==="locked") return (
    <div style={{maxWidth:380,margin:"80px auto",textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:12}}>🔐</div>
      <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>Password Vault</div>
      <div style={{fontSize:13,color:"#555",marginBottom:28}}>Enter your vault PIN to access stored credentials</div>
      <div style={{background:"#0e0e18",border:"1px solid #2a2a3a",borderRadius:16,padding:28}}>
        <input className="input" type="password" value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,""))}
          onKeyDown={e=>e.key==="Enter"&&handleUnlock()} placeholder="Enter Vault PIN"
          style={{letterSpacing:8,fontSize:22,textAlign:"center",marginBottom:16}} maxLength={12} autoFocus/>
        {pinError&&<div style={{fontSize:12,color:"#f87171",marginBottom:12}}>{pinError}</div>}
        <button className="btn btn-primary" style={{width:"100%",fontSize:14,padding:"12px 0"}} onClick={handleUnlock}>🔓 Unlock Vault</button>
        <div style={{fontSize:11,color:"#333",marginTop:16}}>Vault is encrypted with AES-style XOR + SHA-256 PIN hash. Data never leaves your device.</div>
      </div>
    </div>
  );

  // ── UNLOCKED ──
  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:700}}>🔐 Password Vault</div>
          <div style={{fontSize:13,color:"#555",marginTop:2}}>{vaultData.length} entries · encrypted locally</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setShowPinChange(true)}>🔑 Change PIN</button>
          <button className="btn btn-ghost" style={{fontSize:12,color:"#f87171",borderColor:"#7f1d1d"}} onClick={lockVault}>🔒 Lock Vault</button>
          <button className="btn btn-ghost" style={{fontSize:12,color:"#4ade80",borderColor:"#16a34a"}} onClick={()=>setShowImport(true)}>📥 Import Excel</button>
          <button className="btn btn-primary" style={{fontSize:12}} onClick={()=>setShowAdd(true)}>+ Add Entry</button>
        </div>
      </div>

      {/* Search */}
      <div style={{marginBottom:16}}>
        <input className="input" value={searchQ} onChange={e=>setSearchQ(e.target.value)}
          placeholder="🔍  Search entries…" style={{width:"100%",boxSizing:"border-box"}}/>
      </div>

      {/* Category tabs */}
      <div className="asset-subtab-bar" style={{marginBottom:16}}>
        {PWD_CATEGORIES.map(c=>(
          <div key={c.id} className={`asset-subtab${activeTab===c.id?" active":""}`} onClick={()=>setActiveTab(c.id)}>
            <span>{c.icon}</span><span>{c.label}</span>
            {catCount(c.id)>0&&<span style={{background:activeTab===c.id?"#7c3aed":"#1e1e2e",color:activeTab===c.id?"white":"#555",fontSize:10,fontWeight:800,borderRadius:10,padding:"1px 6px"}}>{catCount(c.id)}</span>}
          </div>
        ))}
      </div>

      {/* Entries */}
      {filtered.length===0
        ? <div style={{textAlign:"center",padding:"56px 20px",color:"#555"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗝</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>{searchQ?"No matches found":"No entries yet"}</div>
            <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Add First Entry</button>
          </div>
        : filtered.map(item=>(
            <VaultCard key={item.id} item={item} onEdit={()=>setEditItem(item)} onDelete={()=>delEntry(item.id)}/>
          ))
      }

      {/* Modals */}
      {showAdd&&<VaultEntryForm onSave={addEntry} onClose={()=>setShowAdd(false)}/>}
      {editItem&&<VaultEntryForm initial={editItem} onSave={saveEntry} onClose={()=>setEditItem(null)}/>}
      {showPinChange&&<ChangePinModal currentPin={currentPin} vaultData={vaultData}
        onChanged={(newPin)=>{ setCurrentPin(newPin); persist(vaultData,newPin); setShowPinChange(false); notify("✓ Vault PIN changed"); }}
        onClose={()=>setShowPinChange(false)}/>}
      {showImport&&<VaultExcelImport
        onImport={entries=>{
          updateVault([...vaultData,...entries]);
          setShowImport(false);
          notify(`✓ Imported ${entries.length} entr${entries.length===1?"y":"ies"} into vault`,"success");
        }}
        onClose={()=>setShowImport(false)}
      />}
    </div>
  );
}

// Guess vault category from type/bank fields
function guessCategory(row){
  const t = ((row.entryType||"")+" "+(row.cardType||"")+" "+(row.bankName||"")).toLowerCase();
  if(t.match(/demat|zerodha|groww|trading|nsdl|cdsl/)) return "demat";
  if(t.match(/insurance|policy|lic|hdfc life/))         return "insurance";
  if(t.match(/email|gmail|social|facebook|linkedin|twitter|instagram|whatsapp/)) return "email";
  if(t.match(/crypto|bitcoin|wallet|metamask|binance/)) return "crypto";
  if(t.match(/pan|gst|income tax|epfo|uan|govt|aadhaar|passport/)) return "govt";
  if(t.match(/bank|card|saving|current|fd|account|loan|mortgage/)) return "banking";
  return "banking"; // default
}

function VaultExcelImport({onImport, onClose}){
  const [stage,   setStage]   = useState("upload"); // upload | mapping | review | done
  const [rawRows, setRawRows] = useState([]);       // [{colA:valA,...}] from Excel
  const [headers, setHeaders] = useState([]);       // detected Excel column headers
  const [colMap,  setColMap]  = useState({});       // excelCol -> VAULT_EXCEL_COL_MAP key or "ignore"
  const [entries, setEntries] = useState([]);       // mapped vault entries pending review
  const [editIdx, setEditIdx] = useState(null);     // index in entries being edited
  const [selAll,  setSelAll]  = useState(true);
  const [selected,setSelected]= useState({});
  const fileRef = useRef();

  const processFile = async(file) => {
    if(!window.XLSX){ alert("SheetJS not loaded — please refresh."); return; }
    const buf = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsArrayBuffer(file);});
    const wb  = window.XLSX.read(buf,{type:"array"});
    // Use first sheet
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const raw = window.XLSX.utils.sheet_to_json(ws,{defval:""});
    if(!raw.length){ alert("Sheet appears empty — please check the file."); return; }
    const hdrs = Object.keys(raw[0]);
    setHeaders(hdrs);
    setRawRows(raw);

    // Auto-map columns to known fields
    const autoMap = {};
    hdrs.forEach(h=>{
      const key = h.trim().toLowerCase();
      if(VAULT_EXCEL_COL_MAP[key]) autoMap[h] = key;
      else autoMap[h] = "ignore";
    });
    setColMap(autoMap);
    setStage("mapping");
  };

  const buildEntries = () => {
    const result = rawRows.map((row,ri)=>{
      // Build fields array from mapped columns
      const fields = [];
      const meta   = {};
      Object.entries(colMap).forEach(([excelCol, mappedKey])=>{
        if(mappedKey==="ignore") return;
        const val = String(row[excelCol]||"").trim();
        if(!val) return;
        const def = VAULT_EXCEL_COL_MAP[mappedKey];
        if(!def) return;
        // Special meta fields: title comes from Bank Name
        if(def.field==="bankName") meta.title = val;
        if(def.field==="owner")    meta.owner  = val;
        if(def.field==="link")     meta.url    = val;
        if(def.field==="notes")    meta.notes  = (meta.notes?meta.notes+"\n":"")+val;
        fields.push({type:def.field, label:def.label, value:val, masked:def.masked});
      });
      // Derive title if not set
      if(!meta.title) meta.title = `Entry ${ri+1}`;
      if(meta.owner)  meta.title = `${meta.title} (${meta.owner})`;

      // Build the raw row data for display
      const rowData = {};
      Object.entries(colMap).forEach(([ec,mk])=>{
        if(mk!=="ignore"){ const v=String(row[ec]||"").trim(); if(v) rowData[mk]=v; }
      });

      return {
        id: Date.now()+Math.random()+ri,
        title:    meta.title||"Unnamed",
        category: guessCategory(rowData),
        url:      meta.url||"",
        notes:    meta.notes||"",
        fields,
        createdAt: today(),
        updatedAt: today(),
        _rowIndex: ri,
      };
    }).filter(e=>e.fields.length>0); // skip completely empty rows

    setEntries(result);
    const sel = {};
    result.forEach(e=>{ sel[e.id]=true; });
    setSelected(sel);
    setStage("review");
  };

  const toggleAll = () => {
    const next = !selAll;
    setSelAll(next);
    const s={};
    entries.forEach(e=>{ s[e.id]=next; });
    setSelected(s);
  };

  const saveEntry = (updated) => {
    setEntries(es=>es.map(e=>e.id===updated.id?updated:e));
    setEditIdx(null);
  };

  const confirmImport = () => {
    const toImport = entries.filter(e=>selected[e.id]);
    onImport(toImport);
  };

  const selectedCount = Object.values(selected).filter(Boolean).length;

  // ── UPLOAD STAGE ─────────────────────────────────────────────────────────
  if(stage==="upload") return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{width:"min(500px,96vw)"}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:700}}>📥 Import from Excel</div>
          <button style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:20}} onClick={onClose}>×</button>
        </div>
        <div style={{fontSize:12,color:"#555",marginBottom:20,lineHeight:1.7}}>
          Upload your Excel password vault file. WealthVault will auto-detect your columns and map them to vault fields. You can review and edit every entry before saving.
        </div>

        {/* Supported columns */}
        <div style={{background:"#0a0a14",border:"1px solid #1a1a2a",borderRadius:10,padding:14,marginBottom:20}}>
          <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:8}}>AUTO-DETECTED COLUMNS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {["Owner","Bank Name","Card Type","Type","Login Id","Password","Transaction Password","ATM Pin","Debit Card No.","Exp Date","CVV","Account No.","Mobile Banking","Debit Card Payment Pwd","IFSC Code","Branch","Link","Customer Care No."].map(c=>(
              <span key={c} style={{fontSize:10,padding:"2px 8px",borderRadius:12,background:"#1e1b4b",color:"#a78bfa",border:"1px solid #3730a3"}}>{c}</span>
            ))}
            <span style={{fontSize:10,padding:"2px 8px",borderRadius:12,background:"#052e16",color:"#4ade80",border:"1px solid #16a34a"}}>+ more auto-mapped</span>
          </div>
        </div>

        {/* Drop zone */}
        <div className="upload-zone" style={{marginBottom:16}} onClick={()=>fileRef.current.click()}
          onDragOver={e=>{e.preventDefault();}} onDrop={e=>{e.preventDefault();processFile(e.dataTransfer.files[0]);}}>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.xlsm,.csv" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
          <div style={{fontSize:32,marginBottom:8}}>📊</div>
          <div style={{fontSize:13,color:"#888"}}>Drop your Excel file here or click to browse</div>
          <div style={{fontSize:11,color:"#444",marginTop:4}}>Supports .xlsx, .xls, .xlsm, .csv</div>
        </div>

        <div style={{fontSize:11,color:"#333",textAlign:"center"}}>
          🔒 Data is processed entirely in your browser. Nothing is uploaded to any server.
        </div>
      </div>
    </div>
  );

  // ── COLUMN MAPPING STAGE ──────────────────────────────────────────────────
  if(stage==="mapping") return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{width:"min(640px,96vw)",maxHeight:"90vh",overflowY:"auto"}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:15,fontWeight:700}}>🗂 Column Mapping</div>
          <button style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:20}} onClick={onClose}>×</button>
        </div>
        <div style={{fontSize:12,color:"#555",marginBottom:16}}>
          {rawRows.length} rows detected from your Excel. Review how each column is mapped — auto-matched columns are pre-filled. Set any unrecognised columns or change mappings as needed.
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
          {headers.map(h=>{
            const sampleVals = rawRows.slice(0,3).map(r=>String(r[h]||"")).filter(Boolean).join(" / ");
            const isAutoMapped = VAULT_EXCEL_COL_MAP[h.trim().toLowerCase()];
            return(
              <div key={h} style={{background:"#0a0a14",border:`1px solid ${isAutoMapped?"#1e3a1e":"#1a1a2a"}`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:isAutoMapped?"#4ade80":"#ccc"}}>{h}</span>
                  {isAutoMapped&&<span style={{fontSize:9,background:"#052e16",color:"#4ade80",padding:"1px 5px",borderRadius:4,fontWeight:700}}>AUTO ✓</span>}
                </div>
                <div style={{fontSize:10,color:"#333",marginBottom:6,fontStyle:"italic",minHeight:14}}>{sampleVals||"(empty)"}</div>
                <select className="input" style={{fontSize:11,padding:"5px 8px"}}
                  value={colMap[h]||"ignore"}
                  onChange={e=>setColMap(m=>({...m,[h]:e.target.value}))}>
                  <option value="ignore">— Ignore this column —</option>
                  {Object.entries(VAULT_EXCEL_COL_MAP)
                    // dedupe by field name to avoid showing duplicates in dropdown
                    .filter(([k,v],i,arr)=>arr.findIndex(([,vv])=>vv.field===v.field)===i)
                    .sort((a,b)=>a[1].label.localeCompare(b[1].label))
                    .map(([k,v])=>(
                      <option key={v.field} value={k}>{v.label}</option>
                    ))
                  }
                </select>
              </div>
            );
          })}
        </div>

        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={buildEntries}>
            ▶ Preview {rawRows.length} Entries →
          </button>
          <button className="btn btn-ghost" onClick={()=>setStage("upload")}>← Back</button>
        </div>
      </div>
    </div>
  );

  // ── REVIEW STAGE ──────────────────────────────────────────────────────────
  if(stage==="review") return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{width:"min(720px,98vw)",maxHeight:"92vh",overflowY:"auto"}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:15,fontWeight:700}}>✅ Review & Edit Before Import</div>
          <button style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:20}} onClick={onClose}>×</button>
        </div>
        <div style={{fontSize:12,color:"#555",marginBottom:16}}>

        </div>

        {/* Controls */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,background:"#0a0a14",borderRadius:8,padding:"10px 14px"}}>
          <div style={{fontSize:13,fontWeight:600}}>{selectedCount} of {entries.length} selected</div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={toggleAll}>{selAll?"Deselect All":"Select All"}</button>
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setStage("mapping")}>← Re-map Columns</button>
          </div>
        </div>

        {/* Entry list */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {entries.map((entry,idx)=>{
            const catMeta = PWD_CATEGORIES.find(c=>c.id===entry.category)||{icon:"🗝",label:"Other"};
            const isSel   = selected[entry.id];
            return(
              <div key={entry.id} style={{background:"#0e0e18",border:`1px solid ${isSel?"#2a2a4a":"#111"}`,borderRadius:10,overflow:"hidden",opacity:isSel?1:0.5}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px"}}>
                  {/* Checkbox */}
                  <div onClick={()=>setSelected(s=>({...s,[entry.id]:!isSel}))}
                    style={{width:20,height:20,borderRadius:4,border:`2px solid ${isSel?"#7c3aed":"#2a2a3a"}`,background:isSel?"#7c3aed":"transparent",
                      cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                    {isSel&&<span style={{color:"white",fontSize:11,fontWeight:700}}>✓</span>}
                  </div>
                  {/* Icon + title */}
                  <div style={{width:34,height:34,borderRadius:8,background:"#1a1a2e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                    {catMeta.icon}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:13,fontWeight:700}}>{entry.title}</span>
                      <span style={{fontSize:10,padding:"1px 7px",borderRadius:10,background:"#1e1b4b",color:"#a78bfa"}}>{catMeta.label}</span>
                    </div>
                    {/* Field summary — show non-masked fields as pills, masked as •••• */}
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                      {entry.fields.slice(0,8).map((f,fi)=>(
                        <span key={fi} style={{fontSize:10,padding:"2px 7px",borderRadius:6,background:"#0a0a18",border:"1px solid #1a1a2a",color:"#666"}}>
                          <span style={{color:"#444"}}>{f.label}: </span>
                          <span style={{color:f.masked?"#333":"#888",fontFamily:f.masked?"monospace":"inherit"}}>
                            {f.masked?"••••":f.value.slice(0,20)+(f.value.length>20?"…":"")}
                          </span>
                        </span>
                      ))}
                      {entry.fields.length>8&&<span style={{fontSize:10,color:"#444"}}>+{entry.fields.length-8} more</span>}
                    </div>
                  </div>
                  {/* Edit button */}
                  <button onClick={()=>setEditIdx(idx)}
                    style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:6,color:"#a78bfa",cursor:"pointer",fontSize:11,padding:"5px 10px",fontFamily:"inherit",flexShrink:0}}>
                    ✏️ Edit
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        {/* Import button */}
        <div style={{position:"sticky",bottom:0,background:"linear-gradient(0deg,#0a0a0f 80%,transparent)",paddingTop:16,display:"flex",gap:10}}>
          <button className="btn btn-primary" style={{flex:1,padding:"13px",fontSize:14}}
            onClick={confirmImport} disabled={selectedCount===0}>
            🔐 Import {selectedCount} Entr{selectedCount===1?"y":"ies"} to Vault
          </button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>

        {/* Inline edit modal */}
        {editIdx!==null&&(
          <VaultExcelEntryEditor
            entry={entries[editIdx]}
            onSave={saveEntry}
            onClose={()=>setEditIdx(null)}
          />
        )}
      </div>
    </div>
  );

  return null;
}

function VaultExcelEntryEditor({entry, onSave, onClose}){
  const [form, setForm] = useState({...entry, fields:[...entry.fields.map(f=>({...f}))]});
  const setMeta = (k,v) => setForm(f=>({...f,[k]:v}));
  const setField = (i,k,v) => setForm(f=>({...f,fields:f.fields.map((ff,fi)=>fi===i?{...ff,[k]:v}:ff)}));
  const removeField = i => setForm(f=>({...f,fields:f.fields.filter((_,fi)=>fi!==i)}));
  const addField = () => setForm(f=>({...f,fields:[...f.fields,{type:"other",label:"Other",value:"",masked:true}]}));
  const [revealed, setRevealed] = useState({});

  return(
    <div className="modal-overlay" style={{zIndex:400}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{width:"min(580px,96vw)",maxHeight:"88vh",overflowY:"auto",zIndex:401}}
        onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:700}}>✏️ Edit Entry</div>
          <button style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:20}} onClick={onClose}>×</button>
        </div>

        {/* Meta fields */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <div style={{gridColumn:"1/-1"}}>
            <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:4}}>TITLE *</div>
            <input className="input" value={form.title} onChange={e=>setMeta("title",e.target.value)} placeholder="Entry title"/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:4}}>CATEGORY</div>
            <select className="input" value={form.category} onChange={e=>setMeta("category",e.target.value)}>
              {PWD_CATEGORIES.filter(c=>c.id!=="all").map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:4}}>URL / APP</div>
            <input className="input" value={form.url||""} onChange={e=>setMeta("url",e.target.value)} placeholder="Website or app URL"/>
          </div>
        </div>

        {/* Fields */}
        <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:8}}>CREDENTIAL FIELDS</div>
        {form.fields.map((f,i)=>(
          <div key={i} style={{background:"#0a0a14",border:"1px solid #1a1a2a",borderRadius:8,padding:"10px 12px",marginBottom:6}}>
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto auto",gap:8,alignItems:"center"}}>
              {/* Label */}
              <input className="input" value={f.label} onChange={e=>setField(i,"label",e.target.value)}
                style={{fontSize:11,width:140}} placeholder="Field label"/>
              {/* Value */}
              <div style={{position:"relative"}}>
                <input className="input" type={f.masked&&!revealed[i]?"password":"text"}
                  value={f.value} onChange={e=>setField(i,"value",e.target.value)}
                  style={{paddingRight:32,fontSize:12}} placeholder="Value"/>
                {f.masked&&<button onClick={()=>setRevealed(r=>({...r,[i]:!r[i]}))}
                  style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#555"}}>
                  {revealed[i]?"🙈":"👁"}
                </button>}
              </div>
              {/* Masked toggle */}
              <button onClick={()=>setField(i,"masked",!f.masked)} title={f.masked?"Unmask field":"Mask field"}
                style={{background:f.masked?"#1e1b4b":"#0a0a18",border:`1px solid ${f.masked?"#3730a3":"#2a2a3a"}`,borderRadius:6,color:f.masked?"#a78bfa":"#555",cursor:"pointer",fontSize:11,padding:"4px 8px",whiteSpace:"nowrap"}}>
                {f.masked?"🔒 Hidden":"👁 Visible"}
              </button>
              {/* Remove */}
              <button onClick={()=>removeField(i)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:16,padding:"0 4px"}}>×</button>
            </div>
          </div>
        ))}
        <button onClick={addField} style={{width:"100%",padding:"8px",border:"1px dashed #2a2a4a",borderRadius:8,background:"transparent",color:"#555",cursor:"pointer",fontSize:12,marginBottom:16}}>
          + Add Field
        </button>

        {/* Notes */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:4}}>SECURE NOTES</div>
          <textarea className="input" value={form.notes||""} onChange={e=>setMeta("notes",e.target.value)}
            placeholder="Recovery codes, hints…" rows={2} style={{resize:"vertical"}}/>
        </div>

        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={()=>onSave(form)}>✓ Save Changes</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

              </div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                {f.masked&&<button onClick={()=>toggleReveal(i)} title={show?"Hide":"Show"}

                  {revealed[i]?"🙈":"👁"}
                </button>}
                {f.value&&<button onClick={()=>copyField(f.value)} title="Copy"

                  📋

              </div>
            </div>
          );

      </div>
      {item.notes&&<div style={{fontSize:11,color:"#444",marginTop:8,fontStyle:"italic",borderTop:"1px solid #111",paddingTop:8}}>{item.notes}</div>}

  );
}

function VaultEntryForm({initial, onSave, onClose}){
  const isEdit = !!initial;
  const [title,   setTitle]    = useState(initial?.title||"");
  const [category,setCategory] = useState(initial?.category||"banking");
  const [url,     setUrl]      = useState(initial?.url||"");
  const [notes,   setNotes]    = useState(initial?.notes||"");
  const [fields,  setFields]   = useState(initial?.fields||[
    {type:"username", label:"Username / Email", value:"", masked:false},
    {type:"password", label:"Password",         value:"", masked:true},
  ]);
  const [showVals,setShowVals] = useState({});

  const addField = () => setFields(f=>[...f,{type:"password",label:"Password",value:"",masked:true}]);
  const removeField = i => setFields(f=>f.filter((_,fi)=>fi!==i));
  const updateField = (i,key,val) => setFields(f=>f.map((ff,fi)=>fi===i?{...ff,[key]:val}:ff));
  const changeFieldType = (i,type) => {
    const meta = FIELD_TYPES.find(ft=>ft.id===type);
    updateField(i,"type",type);
    updateField(i,"label",meta?.label||"");
    updateField(i,"masked",meta?.masked??true);
  };

  const save = () => {
    if(!title.trim()){alert("Enter a title");return;}
    onSave({...(initial||{}), title:title.trim(), category, url, notes, fields});
  };

  return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{width:"min(600px,96vw)",maxHeight:"90vh",overflowY:"auto"}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:700}}>{isEdit?"✏️ Edit Entry":"🔐 Add Vault Entry"}</div>
          <button style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:20}} onClick={onClose}>×</button>
        </div>

        {/* Title + Category */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div style={{gridColumn:"1/-1"}}>
            <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:5}}>TITLE *</div>
            <input className="input" value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. HDFC NetBanking / Gmail / Zerodha"/>
          </div>
          <div>

          <div>
            <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:5}}>URL / APP (optional)</div>

                  {showVals[i]?"🙈":"👁"}
                </button>}
              </div>
              <button onClick={()=>removeField(i)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button>
            </div>
            {/* Custom label override */}
            <input className="input" value={f.label} onChange={e=>updateField(i,"label",e.target.value)}
              placeholder="Field label (optional override)" style={{marginTop:6,fontSize:11,color:"#555"}}/>
          </div>
        ))}
        <button onClick={addField} style={{background:"transparent",border:"1px dashed #2a2a4a",borderRadius:8,color:"#555",cursor:"pointer",fontSize:12,padding:"8px 16px",width:"100%",marginBottom:16}}>
          + Add Field
        </button>

        {/* Notes */}
        <div>
          <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:5}}>SECURE NOTES (optional)</div>
          <textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Recovery codes, hints, linked accounts, etc." rows={3} style={{resize:"vertical"}}/>
        </div>

        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save}>{isEdit?"Save Changes":"Add to Vault"}</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function ChangePinModal({currentPin, vaultData, onChanged, onClose}){
  const [oldPin,  setOldPin]  = useState("");
  const [newPin,  setNewPin]  = useState("");
  const [confirm, setConfirm] = useState("");
  const [err,     setErr]     = useState("");

  const change = async() => {
    if(oldPin !== currentPin){setErr("Current PIN is incorrect");return;}
    if(newPin.length < 4){setErr("New PIN must be at least 4 digits");return;}
    if(newPin !== confirm){setErr("PINs do not match");return;}
    const hash = await hashVaultPin(newPin);
    localStorage.setItem(PWD_VAULT_PIN, hash);
    onChanged(newPin);
  };

  return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{width:"min(380px,95vw)"}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>🔑 Change Vault PIN</div>
        {[
          {l:"CURRENT PIN",v:oldPin,set:setOldPin},
          {l:"NEW PIN",v:newPin,set:setNewPin},
          {l:"CONFIRM NEW PIN",v:confirm,set:setConfirm},
        ].map(({l,v,set})=>(
          <div key={l} style={{marginBottom:14}}>
            <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:5}}>{l}</div>
            <input className="input" type="password" value={v} onChange={e=>set(e.target.value.replace(/\D/g,""))}
              style={{letterSpacing:4,textAlign:"center",fontSize:18}} maxLength={12} placeholder="••••"/>
          </div>
        ))}
        {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:12}}>{err}</div>}
        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={change}>Change PIN</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── CLOUD SYNC ────────────────────────────────────────────────────────────────
const BACKUP_FILENAME = "wealthvault_backup.json";

function CloudSync({data,setData,notify,syncState,setSyncState}){
  const [autoBackup,setAutoBackup]=useState(()=>localStorage.getItem("wv_autoBackup")==="true");
  const [lastBackup,setLastBackup]=useState(()=>localStorage.getItem("wv_lastBackup")||null);
  const [dragOver,setDragOver]=useState(false);
  const [restorePreview,setRestorePreview]=useState(null);
  const [tab,setTab]=useState("backup"); // backup | howto | history
  const [history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("wv_backupHistory")||"[]");}catch(e){return [];}});
  const fileRef=useRef();

  // Auto-backup every time data changes (if enabled)
  useEffect(()=>{
    if(autoBackup){
      const t=setTimeout(()=>downloadBackup(false),1500);
      return()=>clearTimeout(t);
    }
  },[data,autoBackup]);

  const downloadBackup=(showNotif=true)=>{
    try{
      const payload={
        _meta:{version:2,exportedAt:new Date().toISOString(),appName:"WealthVault"},
        ...data
      };
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      const ts=new Date().toISOString().slice(0,10);
      a.download=`wealthvault_backup_${ts}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      const now=new Date().toLocaleString("en-IN");
      setLastBackup(now);
      localStorage.setItem("wv_lastBackup",now);
      // add to history
      const entry={date:now,fileName:a.download,size:Math.round(blob.size/1024)+"KB",items:{assets:data.assets.length,liabilities:data.liabilities.length,insurance:data.insurance.length,income:data.income.length,expenses:data.expenses.length}};
      const newHist=[entry,...history].slice(0,10);
      setHistory(newHist);
      localStorage.setItem("wv_backupHistory",JSON.stringify(newHist));
      setSyncState({status:"synced",lastSync:now,provider:"file"});
      if(showNotif) notify("✓ Backup downloaded — save it to Google Drive or OneDrive folder","success");
    }catch(e){notify("Backup failed: "+e.message,"error");}
  };

  const downloadEncryptedBackup=async()=>{
    try{
      const json=JSON.stringify(data);
      // XOR-based simple obfuscation (not military-grade but protects casual viewing)
      const key="WealthVault2024";
      let enc="";
      for(let i=0;i<json.length;i++) enc+=String.fromCharCode(json.charCodeAt(i)^key.charCodeAt(i%key.length));
      const b64=btoa(unescape(encodeURIComponent(enc)));
      const payload={_enc:true,_v:1,data:b64};
      const blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=`wealthvault_secure_${new Date().toISOString().slice(0,10)}.wvb`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      notify("✓ Encrypted backup downloaded (.wvb file)","success");
    }catch(e){notify("Error: "+e.message,"error");}
  };

  const handleRestoreFile=async(file)=>{
    if(!file)return;
    try{
      const text=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(file);});
      const parsed=JSON.parse(text);
      // Handle encrypted .wvb files
      if(parsed._enc){
        const key="WealthVault2024";
        const raw=decodeURIComponent(escape(atob(parsed.data)));
        let dec="";
        for(let i=0;i<raw.length;i++) dec+=String.fromCharCode(raw.charCodeAt(i)^key.charCodeAt(i%key.length));
        const restored=JSON.parse(dec);
        setRestorePreview({data:restored,fileName:file.name,encrypted:true});
      } else {
        // strip _meta if present
        const {_meta,...restoreData}=parsed;
        setRestorePreview({data:restoreData,fileName:file.name,encrypted:false,meta:_meta});
      }
    }catch(e){notify("Could not read backup file: "+e.message,"error");}
  };

  const applyRestore=()=>{
    if(!restorePreview)return;
    setData(restorePreview.data);
    const now=new Date().toLocaleString("en-IN");
    setSyncState({status:"synced",lastSync:now,provider:"file"});
    setLastBackup(now);
    localStorage.setItem("wv_lastBackup",now);
    setRestorePreview(null);
    notify("✓ Data restored successfully from backup!","success");
  };

  const toggleAutoBackup=v=>{setAutoBackup(v);localStorage.setItem("wv_autoBackup",v?"true":"false");};

  const totalItems=data.assets.length+data.liabilities.length+data.insurance.length+data.income.length+data.expenses.length;

  // ── How-to steps for each cloud ──────────────────────────────────────────────

    {
      id:"gdrive", icon:"🟢", label:"Google Drive",
      color:"#4ade80", borderColor:"#16a34a",
      steps:[
        "Download the backup file using the button above",
        "Open drive.google.com in your browser",
        'Click "+ New" → "File upload" → select the downloaded .json file',
        "✓ Done! Your backup is now safely stored in Google Drive",
        "💡 Tip: Create a 'WealthVault' folder in Google Drive to keep backups organised",
        "🔄 To restore: download the file from Drive, then use 'Upload & Restore' below",
      ]
    },
    {
      id:"onedrive", icon:"🔵", label:"Microsoft OneDrive",
      color:"#60a5fa", borderColor:"#0078d4",
      steps:[
        "Download the backup file using the button above",
        "Open onedrive.live.com or open OneDrive on your desktop",
        'Click "Upload" → "Files" → select the downloaded .json file',
        "✓ Done! Backup is saved to your OneDrive",
        "💡 Tip: If you have OneDrive desktop app, just copy the file into your OneDrive folder — it syncs automatically",
        "🔄 To restore: download from OneDrive, then use 'Upload & Restore' below",
      ]
    },
    {
      id:"desktop", icon:"💻", label:"Auto-Sync via Desktop App",
      color:"#a78bfa", borderColor:"#7c3aed",
      steps:[
        "Install Google Drive for Desktop or OneDrive desktop app (both free)",
        "A special sync folder appears on your computer (e.g. My Drive / OneDrive)",
        "Save this WealthVault.html file inside that folder",
        "Enable 'Auto-Download on Change' toggle above",
        "Now every backup is automatically saved to that folder and synced to cloud instantly!",
        "✓ This is the most seamless way — no manual steps needed after setup",
      ]
    },
    {
      id:"email", icon:"📧", label:"Email Backup to Yourself",
      color:"#fbbf24", borderColor:"#d97706",
      steps:[
        "Download the backup file",
        "Email it to yourself (or to family members as a legacy copy)",
        "Subject suggestion: 'WealthVault Backup — "+new Date().toLocaleDateString("en-IN")+"'",
        "✓ The backup is also accessible from Gmail anywhere",
        "💡 Set a monthly calendar reminder to email a fresh backup",
      ]
    },
  ];

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>☁ Cloud Sync & Backup</div>
        <div style={{fontSize:13,color:"#666"}}>Download your data as a backup file and save it to Google Drive, OneDrive, or email — works from any device with no sign-in required.</div>
      </div>

      {/* Status bar */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"#0e0e18",border:"1px solid #1a1a2a",borderRadius:10,marginBottom:20}}>
        <span className={`sync-dot ${lastBackup?"synced":"idle"}`}/>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600}}>{lastBackup?"✓ Last backup: "+lastBackup:"No backup yet"}</div>
          <div style={{fontSize:11,color:"#555"}}>{totalItems} items · {data.assets.length} assets · {data.liabilities.length} liabilities · {data.insurance.length} insurance</div>
        </div>
        <span className="tag badge-green" style={{fontSize:11}}>{totalItems} records</span>
      </div>

      {/* Sub-tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,background:"#0e0e18",borderRadius:10,padding:4,border:"1px solid #1a1a2a"}}>
        {[{id:"backup",label:"💾 Backup & Restore"},{id:"howto",label:"☁ How to Save to Cloud"},{id:"history",label:"📋 History"}].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,textAlign:"center",padding:"8px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:tab===t.id?"linear-gradient(135deg,#1e1b4b,#2e1065)":"transparent",color:tab===t.id?"#a78bfa":"#666",transition:"all 0.15s"}}>
            {t.label}
          </div>
        ))}
      </div>

      {/* ── BACKUP TAB ── */}
      {tab==="backup"&&(
        <div>
          {/* Main action cards */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
            {/* Download */}
            <div style={{background:"linear-gradient(135deg,#052e16,#0a3020)",border:"1px solid #16a34a",borderRadius:16,padding:22}}>
              <div style={{fontSize:24,marginBottom:10}}>💾</div>
              <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>Download Backup</div>
              <div style={{fontSize:12,color:"#888",marginBottom:16,lineHeight:1.6}}>Save a complete JSON backup of all your assets, liabilities, insurance, income & expenses.</div>
              <button className="btn btn-primary" style={{width:"100%",padding:"10px",marginBottom:8}} onClick={()=>downloadBackup(true)}>
                ↓ Download Backup (.json)
              </button>
              <button className="btn btn-ghost" style={{width:"100%",padding:"8px",fontSize:12}} onClick={downloadEncryptedBackup}>

              <div>No backup history yet. Download your first backup to see it here.</div>

              <div style={{fontSize:12,color:"#555",marginBottom:12}}>{history.length} backups recorded in this browser session</div>

    </div>

function FamilyManager({data, setData, notify}){
  const family = data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];
  const [showForm, setShowForm] = useState(false);
  const [editId,   setEditId]   = useState(null);
  const [form, setForm] = useState({name:"",relation:"Spouse",color:"#60a5fa",dob:"",pan:"",email:"",phone:""});

  const openAdd = () => {
    const nextColor = MEMBER_COLORS[family.length % MEMBER_COLORS.length];
    setForm({name:"",relation:"Spouse",color:nextColor,dob:"",pan:"",email:"",phone:""});
    setEditId(null); setShowForm(true);
  };
  const openEdit = m => { setForm({...m}); setEditId(m.id); setShowForm(true); };

  const save = () => {
    if(!form.name.trim()){alert("Name is required");return;}
    if(editId){
      setData(d=>({...d,family:d.family.map(m=>m.id===editId?{...form,id:editId}:m)}));
      notify("✓ Member updated");
    } else {
      const id = "member_"+Date.now();
      setData(d=>({...d,family:[...(d.family||[]),{...form,id}]}));
      notify("✓ "+form.name+" added to family");
    }
    setShowForm(false);
  };

  const del = id => {
    if(id==="self"){notify("Cannot remove primary member","error");return;}
    if(!window.confirm("Remove this family member? Their data will remain but lose the member tag.")) return;
    setData(d=>({...d,family:(d.family||[]).filter(m=>m.id!==id)}));
    notify("Member removed");

  // Count items per member
  const counts = {};
  family.forEach(m=>{
    counts[m.id]={
      assets:   (data.assets||[]).filter(a=>(a.memberId||"self")===m.id).length,

      income:   (data.income||[]).filter(a=>(a.memberId||"self")===m.id).length,

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {family.map(m=>{
          const c=counts[m.id]||{};
          const totalItems=(c.assets||0)+(c.liab||0)+(c.income||0)+(c.expenses||0)+(c.insurance||0);

                display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,fontWeight:700,color:m.color}}>
                {m.name[0]?.toUpperCase()||"?"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:"#e8e8f0"}}>{m.name}</div>
                <div style={{fontSize:11,color:"#555",marginTop:1}}>{m.relation}{m.id==="self"?" (You)":""}</div>
                <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>
                  {c.assets>0&&<span style={{fontSize:10,color:"#4ade80"}}>↑ {c.assets} assets</span>}
                  {c.liab>0&&<span style={{fontSize:10,color:"#f87171"}}>↓ {c.liab} liabilities</span>}
                  {c.income>0&&<span style={{fontSize:10,color:"#60a5fa"}}>₹ {c.income} income</span>}
                  {c.expenses>0&&<span style={{fontSize:10,color:"#fbbf24"}}>◎ {c.expenses} expenses</span>}
                  {c.insurance>0&&<span style={{fontSize:10,color:"#a78bfa"}}>⛨ {c.insurance} policies</span>}
                  {totalItems===0&&<span style={{fontSize:10,color:"#333"}}>No data yet</span>}

              <div>

function Dashboard({data,netWorth,totalAssets,totalLiab,totalIncome,totalExpenses,cashflow,setTab,activeMember,setActiveMember}){
  const family = data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];

  // ── Filter all data by activeMember ──────────────────────────────────────
  const filterM = items => activeMember==="all" ? items : items.filter(i=>(i.memberId||"self")===activeMember);
  const mAssets      = filterM(data.assets);
  const mLiab        = filterM(data.liabilities);
  const mIncome      = filterM(data.income);
  const mExpenses    = filterM(data.expenses);
  const mInsurance   = filterM(data.insurance);

  // ── Recompute all totals from filtered data ───────────────────────────────
  const filteredTotalAssets   = mAssets.reduce((s,a)=>s+(a.value||0),0);
  const filteredTotalLiab     = mLiab.reduce((s,l)=>s+(l.value||0),0);
  const filteredNetWorth      = filteredTotalAssets - filteredTotalLiab;
  const filteredTotalIncome   = mIncome.reduce((s,i)=>{
    const f=i.frequency||"Monthly";
    return s+(f==="Annual"?i.amount/12:f==="Quarterly"?i.amount/3:f==="One-time"?0:(i.amount||0));
  },0);
  const filteredTotalExpenses = mExpenses.reduce((s,e)=>s+(e.amount||0),0);
  const filteredCashflow      = filteredTotalIncome - filteredTotalExpenses;
  const filteredTotalCover    = mInsurance.reduce((s,i)=>s+(i.cover||0),0);

  // Use filtered values throughout Dashboard
  const useTotalAssets   = filteredTotalAssets;
  const useTotalLiab     = filteredTotalLiab;
  const useNetWorth      = filteredNetWorth;
  const useTotalIncome   = filteredTotalIncome;
  const useTotalExpenses = filteredTotalExpenses;
  const useCashflow      = filteredCashflow;

  const currentFY = getFY();
  const [selectedFY, setSelectedFY] = useState(currentFY);

  // Build list of available FYs from expense/income data
  const allDates = [
    ...mExpenses.map(e=>e.date),
    ...mIncome.map(i=>i.date),
  ].filter(Boolean);
  const fySet = new Set(allDates.map(d=>getFY(d)));
  fySet.add(currentFY);
  const fyList = Array.from(fySet).sort((a,b)=>b-a);

  // FY-filtered expenses & income (by date)
  const fyExpenses = mExpenses.filter(e => inFY(e.date, selectedFY));
  const fyIncome   = mIncome.filter(i => inFY(i.date, selectedFY));

  // Monthly breakdown for selected FY
  const months = fyMonths(selectedFY);
  const monthlyData = months.map(({m,y}) => {
    const label = MONTHS_SHORT[m] + " " + String(y).slice(2);
    const inc = fyIncome
      .filter(i => { const d=new Date(i.date); return d.getMonth()===m && d.getFullYear()===y; })
      .reduce((s,i) => s + (i.amount||0), 0);
    const exp = fyExpenses
      .filter(e => { const d=new Date(e.date); return d.getMonth()===m && d.getFullYear()===y; })
      .reduce((s,e) => s + (e.amount||0), 0);
    return {label, inc, exp, surplus: inc - exp};
  });

  // FY totals
  const fyTotalInc = fyIncome.reduce((s,i)=>s+(i.amount||0),0);
  const fyTotalExp = fyExpenses.reduce((s,e)=>s+(e.amount||0),0);
  const fyNet      = fyTotalInc - fyTotalExp;

  const maxBar = Math.max(...monthlyData.map(m=>Math.max(m.inc,m.exp)),1);

  const assetGroups={};
  mAssets.forEach(a=>{assetGroups[a.category]=(assetGroups[a.category]||0)+a.value;});
  const totalCover=mInsurance.reduce((s,i)=>s+(i.cover||0),0);
  const savingsRate=useTotalIncome>0?(((useTotalIncome-useTotalExpenses)/useTotalIncome)*100).toFixed(1):0;
  const debtRatio=useTotalAssets>0?((useTotalLiab/useTotalAssets)*100).toFixed(1):0;

  // ── Reminders (respect notification settings) ────────────────────────────
  const notifCfg = data.notifications||{insuranceRenewal:true,emiDue:true,fdMaturity:true,renewalDays:30,emiDueDays:5};
  const now = new Date();
  const reminders = [];
  if(notifCfg.insuranceRenewal!==false) mInsurance.forEach(p=>{
    if(!p.maturity) return;
    const days=Math.ceil((new Date(p.maturity)-now)/86400000);
    if(days>=0&&days<=(notifCfg.renewalDays||30)) reminders.push({type:"insurance",icon:"🛡",color:"#fbbf24",msg:`${p.name} renews in ${days} day${days!==1?"s":""} (${p.maturity})`,tab:"insurance"});
  });
  if(notifCfg.emiDue!==false) data.liabilities.forEach(l=>{
    if(!l.emiDate||!l.emi) return;
    const dayOfMonth=parseInt(l.emiDate)||1;
    const next=new Date(now.getFullYear(),now.getMonth(),dayOfMonth);
    if(next<now) next.setMonth(next.getMonth()+1);
    const days=Math.ceil((next-now)/86400000);
    if(days<=(notifCfg.emiDueDays||5)) reminders.push({type:"emi",icon:"🏦",color:"#f87171",msg:`${l.name} EMI ₹${Number(l.emi).toLocaleString("en-IN")} due in ${days} day${days!==1?"s":""}`,tab:"liabilities"});
  });
  if(notifCfg.fdMaturity!==false) mAssets.filter(a=>a.category==="Fixed Deposits").forEach(a=>{

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
              <div style={{fontSize:11,color:"#555"}}>{s.sub}</div>

      {/* Smart Import CTA */}
      <div style={{background:"linear-gradient(135deg,#1a1a2e,#1a0a2e)",border:"1px solid #3730a3",borderRadius:14,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onClick={()=>setTab("smartimport")}>

        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700}}>Smart Import — Upload & Auto-Populate</div>
          <div style={{fontSize:12,color:"#888",marginTop:2}}>Upload bank statements, policy docs, demat statements — AI extracts everything automatically</div>
        </div>
        <button className="btn btn-primary" style={{fontSize:12,padding:"8px 14px"}}>Import →</button>
      </div>

      {/* FY Cash Flow section */}
      <div className="stat-card" style={{marginBottom:20}}>
        {/* FY selector + summary */}

          <div>
            <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>Cash Flow — {fyLabel(selectedFY)}</div>
            <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"#555"}}>Income: <span style={{color:"#4ade80",fontWeight:700}}>{fmtS(fyTotalInc)}</span></span>
              <span style={{fontSize:12,color:"#555"}}>Expenses: <span style={{color:"#f87171",fontWeight:700}}>{fmtS(fyTotalExp)}</span></span>
              <span style={{fontSize:12,color:"#555"}}>Net: <span style={{color:fyNet>=0?"#4ade80":"#f87171",fontWeight:700}}>{fyNet>=0?"+":""}{fmtS(fyNet)}</span></span>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {fyList.map(fy=>(
              <button key={fy} onClick={()=>setSelectedFY(fy)}

                  background:selectedFY===fy?"linear-gradient(135deg,#1e1b4b,#2e1065)":"transparent",
                  border:`1px solid ${selectedFY===fy?"#7c3aed":"#2a2a4a"}`,
                  color:selectedFY===fy?"#a78bfa":"#555"}}>

              </button>
            ))}
          </div>
        </div>

        {/* Monthly bar chart */}
        <div style={{display:"flex",gap:4,alignItems:"flex-end",height:100,marginBottom:6}}>
          {monthlyData.map((m,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
              {/* Income bar */}
              <div title={`${m.label} Income: ${fmtS(m.inc)}`}
                style={{width:"100%",background:"#16a34a",borderRadius:"3px 3px 0 0",
                  height:`${maxBar>0?(m.inc/maxBar*80):0}px`,minHeight:m.inc>0?3:0,transition:"height 0.3s"}}/>
              {/* Expense bar */}
              <div title={`${m.label} Expenses: ${fmtS(m.exp)}`}
                style={{width:"100%",background:"#dc2626",borderRadius:"3px 3px 0 0",
                  height:`${maxBar>0?(m.exp/maxBar*80):0}px`,minHeight:m.exp>0?3:0,transition:"height 0.3s"}}/>
            </div>
          ))}
        </div>
        {/* Month labels */}
        <div style={{display:"flex",gap:4}}>
          {monthlyData.map((m,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace"}}>{m.label.split(" ")[0]}</div>
          ))}
        </div>
        {/* Legend */}
        <div style={{display:"flex",gap:16,marginTop:8,justifyContent:"flex-end"}}>
          {[{c:"#16a34a",l:"Income"},{c:"#dc2626",l:"Expenses"}].map(l=>(

            <div style={{display:"grid",gridTemplateColumns:"80px 1fr 1fr 1fr",gap:0}}>

                  <div key={i+"l"} style={{fontSize:11,color:"#888",padding:"5px 6px",borderTop:"1px solid #111118"}}>{m.label}</div>,

                  <div key={i+"e"} style={{fontSize:11,color:"#f87171",fontFamily:"'DM Mono',monospace",padding:"5px 6px",borderTop:"1px solid #111118"}}>{fmtS(m.exp)}</div>,
                  <div key={i+"s"} style={{fontSize:11,fontWeight:700,color:m.surplus>=0?"#4ade80":"#f87171",fontFamily:"'DM Mono',monospace",padding:"5px 6px",borderTop:"1px solid #111118"}}>{m.surplus>=0?"+":""}{fmtS(m.surplus)}</div>

        <div style={{display:"flex",flexDirection:"column",gap:12}}>

            </div>
          </div>
          <div className="stat-card" style={{cursor:"pointer"}} onClick={()=>setTab("insurance")}

      {/* Recent Expenses */}

            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:30,height:30,borderRadius:8,background:"#1a1a2e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>

          onMouseLeave={e=>{e.currentTarget.style.borderColor="";}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#ccc",fontFamily:"'DM Mono',monospace"}}>{fmtS(actual)}</span>
                  {budget>0&&<span style={{fontSize:11,color:"#333",fontFamily:"'DM Mono',monospace"}}>/ {fmtS(budget)}</span>}
                  {pct!==null&&<span style={{fontSize:10,fontWeight:700,color:pct>=100?"#f87171":pct>=75?"#fbbf24":"#4ade80",minWidth:36,textAlign:"right"}}>{Math.round(pct)}%</span>}
                </div>
              </div>
              {budget>0&&(
                <div style={{height:4,background:"#1a1a2e",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:4,width:`${Math.min(pct||0,100)}%`,background:pct>=100?"#ef4444":pct>=75?"#f59e0b":"#4ade80",borderRadius:2,transition:"width .5s"}}/>
                </div>
              )}
            </div>
          ))}
          <div style={{fontSize:11,color:"#2a2a3a",marginTop:10}}>Set monthly budgets per category in Expenses tab → ✏️ Edit any entry</div>
        </div>
      )}

      {/* ── Tax Estimate ── */}
      {grossSalary>0&&(
        <div className="stat-card" style={{marginBottom:20,background:"linear-gradient(135deg,#0d1a0d,#0d1200)",border:"1px solid #1a3a1a"}}>
          <div className="section-title">🧾 Tax Estimate — {fyLabel(currentFY)} (New Regime)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
            {[
              {l:"Gross Income",       v:fmtS(grossSalary+annualBonus), c:"#4ade80"},
              {l:"Std. Deduction",     v:"-"+fmtS(stdDeduct),           c:"#a78bfa"},
              {l:"80C Deductions",     v:"-"+fmtS(sec80C),              c:"#60a5fa"},
              {l:"Taxable Income",     v:fmtS(taxableIncome),           c:"#fbbf24"},
              {l:"Est. Tax + cess",    v:fmtS(totalTax),                c:"#f87171"},
              {l:"Per Month",          v:fmtS(Math.round(totalTax/12)), c:"#fb923c"},
            ].map(s=>(
              <div key={s.l} style={{background:"#0a1a0a",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:"#555",marginBottom:4}}>{s.l}</div>
                <div style={{fontSize:13,fontWeight:700,color:s.c,fontFamily:"'DM Mono',monospace"}}>{s.v}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:8}}>
            <div style={{fontSize:11,color:"#555"}}>80C used: <span style={{color:"#60a5fa",fontWeight:600}}>{fmtS(sec80C)}</span> of <span style={{color:"#333"}}>₹1.5L</span></div>
            {pfContrib>0&&<div style={{fontSize:11,color:"#555"}}>PF contribution: <span style={{color:"#a78bfa"}}>{fmtS(pfContrib)}/yr</span></div>}
            {estLTCG>0&&<div style={{fontSize:11,color:"#555"}}>LTCG gains: <span style={{color:"#fbbf24"}}>{fmtS(estLTCG)}</span> (10% tax above ₹1L)</div>}
          </div>
          <div style={{fontSize:10,color:"#1a3a1a"}}>Estimate only — consult a CA. Based on new regime slabs FY2024-25.</div>
        </div>
      )}
    </div>
  );
}

function AssetUploadZone({cat, onParsed, notify, apiKey}){
  const [busy,setBusy] = useState(false);
  const [log,setLog] = useState("");
  const fileRef = useRef();
  const hint = UPLOAD_HINTS[cat]||"Upload a statement or document";

  const process = async(file) => {
    if(!apiKey){notify("Add your Claude API key in Profile to use AI import","error");return;}
    setBusy(true); setLog("Reading file…");
    try{
      let contentPart;
      const name = file.name.toLowerCase();
      if(file.type.includes("pdf")){
        const b64 = await new Promise((r,rj)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.onerror=rj;rd.readAsDataURL(file);});
        contentPart = {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}};
      } else if(file.type.includes("image")){
        const b64 = await new Promise((r,rj)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.onerror=rj;rd.readAsDataURL(file);});
        contentPart = {type:"image",source:{type:"base64",media_type:file.type.includes("png")?"image/png":"image/jpeg",data:b64}};
      } else if(name.endsWith(".xlsx")||name.endsWith(".xls")){
        if(!window.XLSX) throw new Error("SheetJS not loaded");
        const buf = await new Promise((r,rj)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=rj;rd.readAsArrayBuffer(file);});
        const wb = window.XLSX.read(buf,{type:"array"});
        let txt = `Excel: ${file.name}\n`;
        wb.SheetNames.forEach(s=>{ txt+=`\n-- Sheet: ${s} --\n`+window.XLSX.utils.sheet_to_csv(wb.Sheets[s],{blankrows:false}); });
        contentPart = {type:"text",text:txt.slice(0,60000)};
      } else {
        const txt = await new Promise((r,rj)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=rj;rd.readAsText(file);});
        contentPart = {type:"text",text:`File: ${file.name}\n\n${txt.slice(0,60000)}`};
      }
      setLog("AI is reading your statement…");
      const prompt = `You are extracting ${cat} holdings from this document for an Indian personal finance app.\nReturn ONLY a valid JSON array of holdings (no markdown, no explanation):\n[\n  {\n    "name": "holding name",\n    "value": 0,\n    "qty": 0,\n    "buyPrice": 0,\n    "ticker": "",\n    "broker": "",\n    "folio": "",\n    "units": 0,\n    "nav": 0,\n    "invested": 0,\n    "intRate": 0,\n    "matDate": "",\n    "buyDate": "",\n    "details": "brief description",\n    "confidence": "high|medium|low"\n  }\n]\nExtract every individual holding. All amounts as plain numbers. Leave unknown fields as empty string or 0.`;
      const mediaParts = contentPart.type!=="text" ? [contentPart] : [];
      const textForAI  = contentPart.type==="text" ? contentPart.text : "";
      const aiResult = await callAI(apiKey, textForAI ? textForAI+"\n\n"+prompt : prompt, mediaParts);
      const raw = aiResult.text.trim();
      const arrStart=raw.indexOf("["),arrEnd=raw.lastIndexOf("]");
      if(arrStart===-1) throw new Error("No data extracted from document");
      const parsed = JSON.parse(raw.slice(arrStart,arrEnd+1));
      onParsed(parsed.map(p=>({...p,id:Date.now()+Math.random(),category:cat,date:today()})));
      setLog("");
      notify(`✓ Extracted ${parsed.length} ${cat} holding${parsed.length!==1?"s":""}!`,"success");
    }catch(e){notify("Import failed: "+e.message,"error");setLog("");}
    setBusy(false);
  };

  return (
    <div>
      <div className="mini-upload" onClick={()=>!busy&&fileRef.current.click()} style={{opacity:busy?0.6:1}}>
        <input ref={fileRef} type="file" accept=".pdf,.csv,.xlsx,.xls,.jpg,.jpeg,.png" onChange={e=>process(e.target.files[0])}/>
        {busy
          ? <div style={{fontSize:12,color:"#a78bfa"}} className="pulse">⟳ {log}</div>
          : <>
              <div style={{fontSize:20,marginBottom:6}}>📤</div>
              <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:4}}>Upload {cat} Statement</div>
              <div style={{fontSize:11,color:"#444",lineHeight:1.5}}>{hint}</div>
              <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:8,flexWrap:"wrap"}}>
                {["PDF","CSV","XLSX","JPG"].map(f=><span key={f} style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:"#1a1a2a",color:"#666"}}>{f}</span>)}
              </div>
            </>
        }
      </div>
    </div>
  );
}

// Yahoo Finance blocks direct browser fetch (CORS). Cascade through reliable proxies.
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchWithProxy(targetUrl, ms=9000){
  // Try direct first (works when served over HTTPS)
  try{
    const r = await fetch(targetUrl,{signal:AbortSignal.timeout(ms)});
    if(r.ok){ const t=await r.text(); return JSON.parse(t); }
  }catch(e){}
  // Try each proxy in order
  for(const mkProxy of PROXIES){
    try{
      const r = await fetch(mkProxy(targetUrl),{signal:AbortSignal.timeout(ms)});
      if(!r.ok) continue;
      const txt = await r.text();
      if(txt.startsWith('{"contents')){ return JSON.parse(JSON.parse(txt).contents); }
      return JSON.parse(txt);
    }catch(e){ continue; }
  }
  throw new Error("All proxies failed — check internet connection");
}

async function fetchYahooQuote(ticker, exchange){
  let sym;
  if(/\.(NS|BO)$/i.test(ticker)){
    sym = ticker.toUpperCase();
  } else if(exchange==="BSE" || /^\d+$/.test(ticker)){
    sym = ticker.toUpperCase()+".BO";
  } else {
    sym = ticker.toUpperCase()+".NS";
  }
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d&includePrePost=false`;
  let json;
  try{ json = await fetchWithProxy(url); }
  catch(e){ json = await fetchWithProxy(url.replace("query1","query2")); }
  const meta = json?.chart?.result?.[0]?.meta;
  if(!meta) throw new Error(`No data for ${sym} — verify ticker symbol`);
  const price = meta.regularMarketPrice || meta.previousClose;
  if(!price) throw new Error(`No price for ${sym}`);
  return {
    price,
    prevClose: meta.chartPreviousClose || meta.previousClose,
    high52w:   meta.fiftyTwoWeekHigh,
    low52w:    meta.fiftyTwoWeekLow,
    currency:  meta.currency||"INR",
    shortName: meta.shortName||meta.longName||sym,
    exchange:  meta.exchangeName||exchange||"NSE",
    ts: new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),
  };
}

const COINGECKO_IDS = {
  BTC:"bitcoin",ETH:"ethereum",BNB:"binancecoin",SOL:"solana",ADA:"cardano",
  MATIC:"matic-network",DOT:"polkadot",AVAX:"avalanche-2",LINK:"chainlink",

  ATOM:"cosmos",TRX:"tron",NEAR:"near",ALGO:"algorand",FTM:"fantom",
  SAND:"the-sandbox",MANA:"decentraland",CRO:"crypto-com-chain",
};
async function fetchCryptoPrice(symbol){
  const sym = (symbol||"").toUpperCase().replace(/USDT$|BUSD$|INR$/i,"").trim();
  const id  = COINGECKO_IDS[sym] || sym.toLowerCase();
  const url = `https://api.coingecko.com/api/v3/simple/price?ids=${encodeURIComponent(id)}&vs_currencies=inr&include_24hr_change=true`;
  try{
    const r = await fetch(url,{signal:AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error("CoinGecko HTTP "+r.status);
    const json = await r.json();
    const d = json[id];
    if(!d?.inr) throw new Error(`No price for "${sym}" (tried id: "${id}")`);
    return {
      price:     d.inr,
      change24h: d.inr_24h_change||0,
      symbol:    sym,
      ts: new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}),
    };
  }catch(e){ throw new Error("CoinGecko: "+e.message); }
}

async function searchMFScheme(name){
  const res = await fetch(`https://api.mfapi.in/mf/search?q=${encodeURIComponent(name.slice(0,40))}`,{signal:AbortSignal.timeout(8000)});
  if(!res.ok) throw new Error("MF search failed");
  const results = await res.json();
  if(!results?.length) throw new Error("No MF found: "+name);
  return results.find(r=>/growth/i.test(r.schemeName)&&!/idcw|dividend/i.test(r.schemeName)) || results[0];
}

function QuickEditModal({asset, onSave, onClose}){
  const isStock  = asset.category==="Stocks";

  const [f, setF] = useState({
    name:        asset.name||"",
    ticker:      asset.ticker||"",
    isin:        asset.isin||"",
    schemeCode:  asset.schemeCode||"",
    qty:         asset.qty!=null?String(asset.qty):"",

    value:       asset.value!=null?String(asset.value):"",
    units:       asset.units!=null?String(asset.units):"",

    purchaseDate:asset.purchaseDate||"",

  const up = (k,v) => setF(p=>({...p,[k]:v}));
  const n  = k => parseFloat(f[k])||0;

  // ── Live P&L calculations ────────────────────────────────────────────────
  const invested   = isStock ? n("qty")*n("buyPrice") : isMF ? n("invested") : isCrypto ? n("qty")*n("buyPrice") : 0;
  const currentVal = isStock ? (n("value")||invested) : isMF ? (n("units")>0&&n("nav")>0?n("units")*n("nav"):n("value")) : isCrypto ? (n("value")||n("qty")*n("buyPrice")) : n("value");
  const pnl        = invested>0 ? currentVal-invested : null;
  const pnlPct     = pnl!==null&&invested>0 ? pnl/invested*100 : null;

  const save = () => {
    const out = {
      ...asset,
      name:        f.name.trim()||asset.name,
      ticker:      f.ticker.toUpperCase().trim(),
      isin:        f.isin.trim(),
      schemeCode:  f.schemeCode.trim(),
      broker:      f.broker.trim(),
      amc:         f.amc.trim(),
      exchange:    f.exchange,
      folio:       f.folio.trim(),
      acNo:        f.acNo.trim(),
      details:     f.details.trim(),
      matDate:     f.matDate,
      purchaseDate:f.purchaseDate,
    };
    if(f.qty!=="")       out.qty       = parseFloat(f.qty);
    if(f.buyPrice!=="")  out.buyPrice  = parseFloat(f.buyPrice);
