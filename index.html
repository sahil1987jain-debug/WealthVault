<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = "wealthvault_v2";

// ── Firebase helpers (safe – returns null if Firebase not configured) ─────────
const FB = window._wvFB || { enabled: false };

// Strip large base64 docs before Firestore (keeps under 1MB limit)
const stripDocsForCloud = (data) => ({
  ...data,
  insurance: (data.insurance||[]).map(({docs,...rest})=>rest)
});

// Save data to Firestore; merge local insurance docs back after
const fbSave = async (uid, data) => {
  if(!FB.enabled) return;
  try {
    const payload = { ...stripDocsForCloud(data), _updatedAt: Date.now() };
    await FB.db.collection("users").doc(uid).set(payload, { merge: true });
  } catch(e) { console.warn("Firestore save:", e.message); throw e; }
};

// Load data from Firestore; merge docs from localStorage
const fbLoad = async (uid) => {
  if(!FB.enabled) return null;
  try {
    const snap = await FB.db.collection("users").doc(uid).get();
    if(!snap.exists) return null;
    const cloud = snap.data();
    // Restore docs from localStorage (they were never uploaded)
    const local = (() => { try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){ return null; } })();
    if(local && cloud){
      cloud.insurance = (cloud.insurance||[]).map(cp => {
        const lp = (local.insurance||[]).find(lx=>lx.id===cp.id);
        return lp?.docs?.length ? { ...cp, docs: lp.docs } : cp;
      });
    }
    delete cloud._updatedAt;
    return cloud;
  } catch(e) { console.warn("Firestore load:", e.message); return null; }
};


const fmt  = n => new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
const fmtS = n => {
  if(n==null||isNaN(n)) return "₹0";
  const abs = Math.abs(n);
  const sign = n < 0 ? "-" : "";
  return sign + "₹" + abs.toLocaleString("en-IN", {maximumFractionDigits:2, minimumFractionDigits:0});
};
const today = () => new Date().toISOString().split("T")[0];

// ── Unified AI caller — auto-detects Claude (sk-ant-) or Gemini (AIzaSy) ─────
// Usage: await callAI(apiKey, prompt, imageParts)
// Returns: { text } or throws Error
async function callAI(apiKey, prompt, imageParts=[]) {
  if(!apiKey||!apiKey.trim()) throw new Error("No API key set. Go to Profile → AI API Key.");
  const key = apiKey.trim();

  // ── Claude ────────────────────────────────────────────────────────────────
  if(key.startsWith("sk-ant-")) {
    const content = [...imageParts, {type:"text",text:prompt}];
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": key,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:16000, messages:[{role:"user",content}]})
    });
    if(!resp.ok){
      const e = await resp.json().catch(()=>({}));
      const msg = e?.error?.message||"";
      if(resp.status===401) throw new Error("Claude API key rejected. Re-enter it in Profile.");
      throw new Error(`Claude API error ${resp.status}: ${msg}`);
    }
    const data = await resp.json();
    return {text: data.content.map(c=>c.text||"").join("")};
  }

  // ── Gemini ────────────────────────────────────────────────────────────────
  if(key.startsWith("AIzaSy")) {
    const parts = [];
    // Convert Claude-style image parts to Gemini format
    imageParts.forEach(p=>{
      if(p.type==="image") parts.push({inlineData:{mimeType:p.source.media_type, data:p.source.data}});
      if(p.type==="document") parts.push({inlineData:{mimeType:"application/pdf", data:p.source.data}});
    });
    parts.push({text: prompt});
    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {method:"POST", headers:{"Content-Type":"application/json"},
       body: JSON.stringify({contents:[{parts}], generationConfig:{maxOutputTokens:8192}})}
    );
    if(!resp.ok){
      const e = await resp.json().catch(()=>({}));
      const msg = e?.error?.message||"";
      if(resp.status===400&&msg.includes("API_KEY")) throw new Error("Gemini API key rejected. Re-enter it in Profile.");
      if(resp.status===403) throw new Error("Gemini API key invalid or not enabled. Check aistudio.google.com.");
      throw new Error(`Gemini API error ${resp.status}: ${msg}`);
    }
    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"";
    return {text};
  }

  throw new Error("Unknown API key format. Use Claude key (sk-ant-...) or Gemini key (AIzaSy...).");
}

// Financial Year helpers (India: Apr 1 – Mar 31)
const getFY = (date) => {
  const d = date ? new Date(date) : new Date();
  const m = d.getMonth(); // 0=Jan
  const y = d.getFullYear();
  return m >= 3 ? y : y - 1; // FY starts Apr (month 3)
};
const fyLabel = (fy) => `FY ${fy}-${String(fy+1).slice(2)}`; // e.g. FY 2025-26
const fyStart = (fy) => new Date(fy, 3, 1);   // Apr 1
const fyEnd   = (fy) => new Date(fy+1, 2, 31, 23, 59, 59); // Mar 31
const inFY = (dateStr, fy) => {
  if(!dateStr) return false;
  const d = new Date(dateStr);
  return d >= fyStart(fy) && d <= fyEnd(fy);
};

// Returns ordered month labels for a FY: Apr→Mar
const fyMonths = (fy) => [
  {m:3,y:fy},{m:4,y:fy},{m:5,y:fy},{m:6,y:fy},{m:7,y:fy},{m:8,y:fy},
  {m:9,y:fy},{m:10,y:fy},{m:11,y:fy},{m:0,y:fy+1},{m:1,y:fy+1},{m:2,y:fy+1}
];

const PIN_KEY          = "wv_pin_hash";

const OTP_EXPIRY_MS    = 15 * 60 * 1000;     // 15 minutes

// Simple but effective hash using Web Crypto (SHA-256)
async function hashPin(pin) {
  const salt = "WealthVault_v2_salt_2024"; // static salt
  const data = new TextEncoder().encode(salt + pin);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

function PinLock({ onUnlock, onSetPin, mode }) {
  const [pin, setPin] = useState("");

  const [lockoutUntil, setLockoutUntil] = useState(() => parseInt(localStorage.getItem(PIN_LOCKOUT_KEY) || "0"));

  const originalPinRef = useRef("");

  const [confPinF,     setConfPinF]     = useState("");
  const newPinFRef = useRef("");

  // Generate a 6-digit OTP, store with expiry, show on screen
  const sendOtp = () => {
    const code = String(Math.floor(100000 + Math.random() * 900000));
    const expiry = Date.now() + OTP_EXPIRY_MS;
    localStorage.setItem(PIN_OTP_KEY, JSON.stringify({code, expiry}));
    setGeneratedCode(code);
    setCodeRevealed(false);
    setForgotStep("showcode");
    setOtpError("");
  };

  const verifyOtp = () => {
    if(!otpInput.trim()){setOtpError("Enter the code from your email");return;}
    try{
      const stored = JSON.parse(localStorage.getItem(PIN_OTP_KEY)||"{}");
      if(!stored.code){setOtpError("No code found — click Send Code first");return;}
      if(Date.now() > stored.expiry){
        localStorage.removeItem(PIN_OTP_KEY);
        setOtpError("Code expired — click Send Code again");
        setForgotStep("send"); setOtpSent(false); return;
      }
      if(otpInput.trim() !== stored.code){setOtpError("Wrong code — check your email");return;}

      localStorage.removeItem(PIN_OTP_KEY);
      setForgotStep("newpin"); setOtpError(""); setOtpInput("");

        if (remaining <= 0) { clearInterval(interval); setLockoutUntil(0); setAttempts(0); localStorage.removeItem(PIN_LOCKOUT_KEY); localStorage.removeItem(PIN_ATTEMPTS_KEY); }

      }
      const hash = await hashPin(originalPinRef.current);
      localStorage.setItem(PIN_KEY, hash);
      localStorage.removeItem(PIN_ATTEMPTS_KEY);
      originalPinRef.current = "";
      setSuccess(true);
      setTimeout(() => onSetPin(), 800);
      return;
    }
    // Unlock mode
    if (lockoutUntil > Date.now()) return;
    const hash = await hashPin(currentPin);
    const stored = localStorage.getItem(PIN_KEY);
    if (hash === stored) {
      localStorage.removeItem(PIN_ATTEMPTS_KEY);
      setSuccess(true);
      setTimeout(() => onUnlock(), 500);
    } else {
      const newAttempts = attempts + 1;
      setAttempts(newAttempts);
      localStorage.setItem(PIN_ATTEMPTS_KEY, newAttempts);
      if (newAttempts >= MAX_ATTEMPTS) {
        const lockUntil = Date.now() + LOCKOUT_MS;
        setLockoutUntil(lockUntil);
        localStorage.setItem(PIN_LOCKOUT_KEY, lockUntil);
        triggerShake(`Too many attempts — locked for 5 minutes`);
      } else {
        triggerShake(`Wrong PIN — ${MAX_ATTEMPTS - newAttempts} attempt${MAX_ATTEMPTS - newAttempts === 1 ? "" : "s"} left`);
      }
    }
  };

  const currentPin = step === "confirm" ? confirmPin : pin;
  const isLocked = lockoutUntil > Date.now();

  const KEYS = [
    ["1","2","3"],
    ["4","5","6"],
    ["7","8","9"],
    ["","0","⌫"],
  ];

  return (
    <div className="pin-screen">
      {/* Logo */}
      <div style={{marginBottom:32,textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:20,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 14px"}}>⚡</div>
        <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>WealthVault</div>
        <div style={{fontSize:12,color:"#555",marginTop:4}}>Your complete financial legacy</div>
        <div style={{fontSize:10,color:"#252535",marginTop:2}}>v2026-03-18-v4</div>
      </div>

      {/* Title */}
      <div style={{fontSize:16,fontWeight:600,marginBottom:6,color:"#aaa"}}>
        {step === "setup" ? "Create a 4–6 digit PIN" : step === "confirm" ? "Confirm your PIN" : "Enter your PIN"}
      </div>
      {step === "setup" && <div style={{fontSize:12,color:"#555",marginBottom:24,textAlign:"center",maxWidth:260}}>Your PIN protects all financial data. It is hashed with SHA-256 — not even you can recover it if forgotten.</div>}
      {step !== "setup" && <div style={{height:20}}/>}

      {/* Lockout message */}
      {isLocked && (
        <div style={{background:"#2d0a0a",border:"1px solid #ef4444",borderRadius:10,padding:"10px 20px",marginBottom:20,textAlign:"center"}}>
          <div style={{fontSize:13,color:"#f87171",fontWeight:600}}>🔒 Locked for {Math.ceil(countdown/60)}:{String(countdown%60).padStart(2,"0")}</div>
          <div style={{fontSize:11,color:"#666",marginTop:4}}>Too many failed attempts</div>
        </div>
      )}

      {/* PIN dots */}
      <div style={{display:"flex",gap:14,marginBottom:32}} id="pin-dots">
        {[0,1,2,3,4,5].map(i => (
          <div key={i} className={`pin-dot${currentPin.length > i ? (shake ? " error" : " filled") : ""}${success ? " filled" : ""}`}
            style={{opacity: i >= 4 && currentPin.length < 4 ? 0.3 : 1}}/>
        ))}
      </div>

      {/* Error */}
      {error && <div style={{fontSize:12,color:"#f87171",marginBottom:16,textAlign:"center",minHeight:18}}>{error}</div>}
      {!error && <div style={{height:34}}/>}

      {/* Keypad */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:14,opacity:isLocked?0.3:1}}>
        {KEYS.flat().map((k,i) => {
          if (k === "") return <div key={i}/>;
          if (k === "⌫") return <button key={i} className="pin-key del" onClick={handleDelete}>⌫</button>;
          return <button key={i} className="pin-key" onClick={() => handleKey(k)} disabled={isLocked}>{k}</button>;
        })}
      </div>

      {/* Forgot PIN — OTP email flow */}
      {step === "unlock" && !forgotOpen && (
        <div style={{marginTop:28,textAlign:"center"}}>
          <button onClick={()=>setForgotOpen(true)}
            style={{background:"none",border:"none",color:"#555",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>
            Forgot PIN?
          </button>
        </div>
      )}

      {step === "unlock" && forgotOpen && (
        <div style={{marginTop:20,width:280,background:"#0e0e18",border:"1px solid #2a2a3a",borderRadius:12,padding:"18px",textAlign:"left"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:"#a78bfa"}}>🔑 Reset PIN via Email</div>
            <button onClick={()=>{setForgotOpen(false);setForgotStep("send");setGeneratedCode("");setCodeRevealed(false);setOtpInput("");setOtpError("");setNewPinF("");setConfPinF("");}}
              style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16}}>×</button>
          </div>

          {/* Step 1: Generate code */}
          {forgotStep==="send"&&(
            <>
              <div style={{fontSize:12,color:"#888",lineHeight:1.7,marginBottom:14}}>
                A one-time reset code will be generated and shown on screen. Note it down and enter it to set a new PIN.
              </div>
              <div style={{fontSize:11,color:"#444",marginBottom:14,lineHeight:1.6}}>
                Recovery email on file:<br/>
                <span style={{color:"#60a5fa",fontWeight:600}}>{RECOVERY_EMAIL}</span>
              </div>
              <button onClick={sendOtp}
                style={{width:"100%",padding:"11px",borderRadius:9,background:"linear-gradient(135deg,#7c3aed,#4f46e5)",
                  border:"none",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                Generate Reset Code →
              </button>
            </>
          )}

          {/* Step 1b: Show code on screen */}
          {forgotStep==="showcode"&&(
            <>
              <div style={{fontSize:11,color:"#888",marginBottom:12,lineHeight:1.6}}>
                Your reset code is shown below. Note it down, then click Continue.
              </div>
              <div style={{background:"#070710",border:"1px solid #2a2a4a",borderRadius:10,padding:"18px",textAlign:"center",marginBottom:14,position:"relative"}}>
                {codeRevealed
                  ? <div style={{fontSize:34,fontWeight:800,letterSpacing:10,color:"#a78bfa",fontFamily:"'DM Mono',monospace"}}>{generatedCode}</div>
                  : <div style={{fontSize:13,color:"#444",padding:"8px 0",cursor:"pointer"}} onClick={()=>setCodeRevealed(true)}>
                      <span style={{fontSize:22,display:"block",marginBottom:4}}>👁</span>
                      Tap to reveal code
                    </div>
                }
                {codeRevealed&&(
                  <div style={{fontSize:10,color:"#333",marginTop:6}}>Valid for 15 minutes · Note it down</div>
                )}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setForgotStep("verify");setOtpError("");}} disabled={!codeRevealed}
                  style={{flex:1,padding:"11px",borderRadius:9,
                    background:codeRevealed?"linear-gradient(135deg,#7c3aed,#4f46e5)":"#1a1a2e",
                    border:"none",color:codeRevealed?"#fff":"#444",fontWeight:700,fontSize:13,

                  I've noted it — Continue →
                </button>
              </div>
              <div style={{fontSize:10,color:"#252535",marginTop:8,lineHeight:1.6}}>
                Reveal the code first, then Continue will unlock.

          {/* Step 2: Verify code */}
          {forgotStep==="verify"&&(
            <>
              <div style={{fontSize:12,color:"#4ade80",marginBottom:4,fontWeight:600}}>✓ Code generated</div>
              <div style={{fontSize:11,color:"#888",marginBottom:12,lineHeight:1.6}}>
                Enter the 6-digit code you just noted down.
              </div>
              <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:6}}>ENTER YOUR CODE</div>
              <input className="input" type="text" inputMode="numeric" maxLength={6}

          {/* Step 4: Confirm new PIN */}
          {forgotStep==="confirm"&&(
            <>
              <div style={{fontSize:11,color:"#888",marginBottom:12}}>Confirm your new PIN</div>
              <input className="input" type="password" inputMode="numeric" maxLength={6}

// ── Firebase Login Screen ─────────────────────────────────────────────────────
function FirebaseLogin({onLogin, onOffline}){
  const [mode, setMode]       = useState("signin"); // signin | signup
  const [email, setEmail]     = useState("");
  const [password, setPassword] = useState("");
  const [name, setName]       = useState("");
  const [busy, setBusy]       = useState(false);
  const [err, setErr]         = useState("");
  const [showPwd, setShowPwd] = useState(false);

  const clearErr = () => setErr("");

  const googleLogin = async () => {
    setBusy(true); setErr("");
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result   = await FB.auth.signInWithPopup(provider);
      onLogin(result.user);
    } catch(e) {
      setErr(e.code==="auth/popup-closed-by-user" ? "Sign-in cancelled." : e.message);
    }
    setBusy(false);
  };

  const emailAuth = async () => {
    if(!email||!password){ setErr("Enter email and password."); return; }
    if(mode==="signup"&&!name){ setErr("Enter your name."); return; }
    setBusy(true); setErr("");
    try {
      let cred;
      if(mode==="signup"){
        cred = await FB.auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName: name });
      } else {
        cred = await FB.auth.signInWithEmailAndPassword(email, password);
      }
      onLogin(cred.user);
    } catch(e) {
      const map = {
        "auth/wrong-password":      "Wrong password.",
        "auth/user-not-found":      "No account with that email.",
        "auth/email-already-in-use":"Email already registered — sign in instead.",
        "auth/weak-password":       "Password must be at least 6 characters.",
        "auth/invalid-email":       "Invalid email address.",
        "auth/invalid-credential":  "Wrong email or password.",
      };
      setErr(map[e.code] || e.message);
    }
    setBusy(false);
  };

  const resetPwd = async () => {
    if(!email){ setErr("Enter your email first, then click Reset."); return; }
    try { await FB.auth.sendPasswordResetEmail(email); setErr("✓ Reset email sent — check your inbox."); }
    catch(e){ setErr(e.message); }
  };

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0f",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px",boxShadow:"0 0 40px rgba(124,58,237,0.4)"}}>⚡</div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,color:"#e8e8f0"}}>WealthVault</div>
          <div style={{fontSize:13,color:"#555",marginTop:4}}>Your personal finance command centre</div>
        </div>

        <div style={{background:"#111118",border:"1px solid #1e1e2e",borderRadius:20,padding:28}}>
          {/* Mode tabs */}
          <div style={{display:"flex",gap:4,background:"#0a0a14",borderRadius:10,padding:4,marginBottom:22}}>
            {[["signin","Sign In"],["signup","Create Account"]].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);clearErr();}}
                style={{flex:1,padding:"8px 0",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,transition:"all .15s",
                  background:mode===m?"linear-gradient(135deg,#1e1b4b,#2e1065)":"transparent",
                  color:mode===m?"#a78bfa":"#555",
                  boxShadow:mode===m?"0 1px 4px rgba(0,0,0,.4)":"none"}}>
                {l}
              </button>
            ))}
          </div>

          {/* Google */}
          <button onClick={googleLogin} disabled={busy}
            style={{width:"100%",padding:"12px",border:"1px solid #2a2a3a",borderRadius:10,background:"#0e0e18",color:"#e8e8f0",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:16,transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#7c3aed"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#2a2a3a"}>
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
          </button>

          {/* Divider */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style={{flex:1,height:"1px",background:"#1a1a2a"}}/>
            <span style={{fontSize:11,color:"#333"}}>or</span>
            <div style={{flex:1,height:"1px",background:"#1a1a2a"}}/>
          </div>

          {/* Form fields */}
          {mode==="signup"&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:5}}>YOUR NAME</div>
              <input className="input" value={name} onChange={e=>{setName(e.target.value);clearErr();}} placeholder="e.g. Rajesh Kumar"/>
            </div>
          )}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:5}}>EMAIL</div>
            <input className="input" type="email" value={email} onChange={e=>{setEmail(e.target.value);clearErr();}} placeholder="you@email.com" autoComplete="email"/>
          </div>
          <div style={{marginBottom:mode==="signin"?6:16}}>
            <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:5}}>PASSWORD</div>
            <div style={{position:"relative"}}>
              <input className="input" type={showPwd?"text":"password"} value={password} onChange={e=>{setPassword(e.target.value);clearErr();}} placeholder={mode==="signup"?"At least 6 characters":"Your password"} autoComplete={mode==="signup"?"new-password":"current-password"}
                onKeyDown={e=>e.key==="Enter"&&emailAuth()}/>
              <span onClick={()=>setShowPwd(v=>!v)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#555",fontSize:14}}>{showPwd?"🙈":"👁"}</span>
            </div>
          </div>

          {mode==="signin"&&(
            <div style={{textAlign:"right",marginBottom:16}}>
              <span onClick={resetPwd} style={{fontSize:11,color:"#555",cursor:"pointer",textDecoration:"underline"}}>Forgot password?</span>
            </div>
          )}

          {err&&<div style={{background:err.startsWith("✓")?"#052e16":"#2d0a0a",border:`1px solid ${err.startsWith("✓")?"#16a34a":"#ef4444"}`,color:err.startsWith("✓")?"#4ade80":"#f87171",borderRadius:8,padding:"10px 14px",fontSize:12,marginBottom:14}}>{err}</div>}

          <button onClick={emailAuth} disabled={busy} className="btn btn-primary"
            style={{width:"100%",padding:"13px",fontSize:14,opacity:busy?0.6:1}}>
            {busy?"⏳ Please wait…":mode==="signup"?"Create Account & Sign In":"Sign In"}
          </button>

          {/* Offline mode */}
          <div style={{textAlign:"center",marginTop:16,paddingTop:14,borderTop:"1px solid #111"}}>
            <button onClick={onOffline}
              style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:12,fontFamily:"inherit",textDecoration:"underline"}}>
              Use offline without an account →
            </button>
          </div>
        </div>

        <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#252535",lineHeight:1.7}}>
          Your data is encrypted and stored in your private Firebase account.<br/>
          WealthVault never sells or shares your financial information.
        </div>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App(){
  const [data,setDataRaw]     = useState(loadData);
  const [tab,setTab]          = useState("dashboard");
  const [modal,setModal]      = useState(null);
  const [notif,setNotif]      = useState(null);
  const [sidebar,setSidebar]  = useState(true);
  const [apiKey,setApiKey]    = useState(()=>localStorage.getItem("wv_apikey")||"");
  const [syncState,setSyncState] = useState({status:"idle",lastSync:localStorage.getItem("wv_lastSync")||null,provider:localStorage.getItem("wv_syncProvider")||null});
  const [activeMember,setActiveMember] = useState("all"); // "all" or a family member id

  // Firebase auth state
  const [authUser,setAuthUser]       = useState(undefined); // undefined = checking, null = signed out, object = signed in
  const [fbStatus,setFbStatus]       = useState("idle");    // idle | syncing | synced | error | offline

  // offlineMode: only honour localStorage flag if Firebase was NOT enabled when it was set.
  // If Firebase is now enabled, clear any stale offline flag so the login screen appears.
  const [offlineMode,setOfflineMode] = useState(()=>{
    if(!FB.enabled) return true; // Firebase not configured — always offline
    const storedOffline = localStorage.getItem("wv_offlineMode")==="true";
    if(storedOffline){
      // Check if the flag was set while Firebase was actually working
      // (we store wv_fb_was_enabled=true when Firebase initialises)
      const wasEnabled = localStorage.getItem("wv_fb_was_enabled")==="true";
      if(!wasEnabled){
        // Stale flag from when Firebase wasn't configured — clear it
        localStorage.removeItem("wv_offlineMode");
        return false;
      }
      return true;
    }
    return false;
  });
  // Mark that Firebase is enabled so future offline choices are respected
  useEffect(()=>{ if(FB.enabled) localStorage.setItem("wv_fb_was_enabled","true"); },[]);

  const saveTimer = useRef(null);

  // PIN gate
  const [pinState,setPinState]=useState(()=>{
    const hasPin=!!localStorage.getItem(PIN_KEY);
    const sessionUnlocked=sessionStorage.getItem("wv_unlocked")==="true";
    if(!hasPin) return "setup";
    if(sessionUnlocked) return "unlocked";
    return "locked";
  });

  // ── Firebase: listen for auth state changes ───────────────────────────────
  useEffect(()=>{
    if(!FB.enabled){ setAuthUser(null); return; }
    const unsub = FB.auth.onAuthStateChanged(async user => {
      setAuthUser(user);
      if(user && !offlineMode){
        // Load from Firestore on login
        setFbStatus("syncing");
        try {
          const cloudData = await fbLoad(user.uid);
          if(cloudData){
            // Cloud has data — load it (cloud is source of truth)
            setDataRaw(cloudData);
            try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudData)); }catch(e){}
            setFbStatus("synced");
          } else {
            // First login — Firestore is empty, push local data up
            const localData = loadData();
            try{
              await fbSave(user.uid, localData);
              setFbStatus("synced");
              console.log("✓ Local data pushed to Firestore on first login");
            } catch(e){
              setFbStatus("error");
              console.warn("Firestore first-save failed:", e);
            }
          }
        } catch(e){
          setFbStatus("error");
          console.warn("Firestore load:", e);
        }
      }
    });
    return ()=>unsub();
  },[]);

  // ── setData: write to localStorage + debounce Firestore ──────────────────
  const setData = fn => {
    setDataRaw(prev=>{
      const next = typeof fn==="function" ? fn(prev) : fn;
      // Always write to localStorage immediately
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); }catch(e){}
      // Auto-cloud-sync (legacy)
      if(localStorage.getItem("wv_autoSync")==="true"){
        setTimeout(()=>window._wvCloudAutoSave&&window._wvCloudAutoSave(next),800);
      }
      // Firestore debounced write
      if(FB.enabled && authUser && !offlineMode){
        clearTimeout(saveTimer.current);
        setFbStatus("syncing");
        saveTimer.current = setTimeout(async()=>{
          try{
            await fbSave(authUser.uid, next);
            setFbStatus("synced");
          }catch(e){
            setFbStatus("error");
            console.warn("Firestore save failed:", e);
          }
        }, 1200);
      }
      return next;
    });
  };

  const saveApiKey = key => { setApiKey(key); localStorage.setItem("wv_apikey",key); };

  // Consolidated totals (used by LegacyTab only — Dashboard computes its own filtered totals)
  const totalAssets   = data.assets.reduce((s,a)=>s+(a.value||0),0);
  const totalLiab     = data.liabilities.reduce((s,l)=>s+(l.value||0),0);
  const netWorth      = totalAssets-totalLiab;
  const totalIncome   = data.income.reduce((s,i)=>{
    if(i.date){ return s+(i.amount||0); }
    const f=i.frequency||"Monthly";
    return s+(f==="Annual"?i.amount/12:f==="Quarterly"?i.amount/3:f==="One-time"?0:i.amount);
  },0);
  const totalExpenses = data.expenses.reduce((s,e)=>s+(e.amount||0),0);
  const cashflow      = totalIncome-totalExpenses;

  const notify = (msg,type="success") => { setNotif({msg,type}); setTimeout(()=>setNotif(null),4000); };

  const lockApp = () => { sessionStorage.removeItem("wv_unlocked"); setPinState("locked"); };

  const signOut = async () => {
    if(FB.enabled) try{ await FB.auth.signOut(); }catch(e){}
    setAuthUser(null);
    sessionStorage.removeItem("wv_unlocked");
    setPinState("locked");
  };

  // ── Auth gate: show login screen if Firebase enabled and not signed in ────
  if(FB.enabled && !offlineMode){
    // Still checking auth state
    if(authUser === undefined){
      return(
        <div style={{minHeight:"100vh",background:"#0a0a0f",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
          <div style={{textAlign:"center"}}>
            <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 16px",boxShadow:"0 0 30px rgba(124,58,237,0.4)"}}>⚡</div>
            <div style={{fontSize:14,color:"#555"}}>Loading WealthVault…</div>
          </div>
        </div>
      );
    }
    if(authUser === null){
      return <FirebaseLogin
        onLogin={user=>setAuthUser(user)}
        onOffline={()=>{ setOfflineMode(true); localStorage.setItem("wv_offlineMode","true"); setAuthUser(null); }}
      />;
    }
  }

  // ── PIN gate ──────────────────────────────────────────────────────────────
  if(pinState==="setup"){
    return <PinLock mode="setup" onUnlock={()=>{sessionStorage.setItem("wv_unlocked","true");setPinState("unlocked");}} onSetPin={()=>{sessionStorage.setItem("wv_unlocked","true");setPinState("unlocked");}}/>;
  }
  if(pinState==="locked"){
    return <PinLock mode="unlock" onUnlock={()=>{sessionStorage.setItem("wv_unlocked","true");setPinState("unlocked");}} onSetPin={()=>{}}/>;
  }

  // ── Sync status label & color for sidebar ────────────────────────────────
  const fbStatusColor = fbStatus==="synced"?"#4ade80":fbStatus==="syncing"?"#fbbf24":fbStatus==="error"?"#f87171":"#333";
  const fbStatusIcon  = fbStatus==="synced"?"●":fbStatus==="syncing"?"◌":fbStatus==="error"?"✗":"○";

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#0a0a0f",minHeight:"100vh",color:"#e8e8f0",display:"flex"}}>
      {/* Sidebar — hidden on mobile, shown on desktop */}
      <div style={{width:sidebar?224:60,background:"#08080f",borderRight:"1px solid #151520",padding:"20px 12px",display:"flex",flexDirection:"column",transition:"width 0.2s",flexShrink:0,height:"100vh",position:"sticky",top:0,overflow:"hidden"}}
        className={`no-print${window.innerWidth<=768?" sidebar-mobile-hidden":""}`}>
        {/* Logo + user */}
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 4px"}}>
            <div style={{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⚡</div>
            {sidebar&&<span style={{fontWeight:700,fontSize:15,letterSpacing:-0.3,whiteSpace:"nowrap"}}>WealthVault</span>}
            {sidebar&&<span style={{fontSize:9,color:"#252535",marginLeft:"auto",fontFamily:"'DM Mono',monospace"}}>v4</span>}
          </div>
          {FB.enabled && authUser && sidebar&&(
            <div style={{margin:"8px 4px 0",background:"#0c0c1c",border:"1px solid #1a1a2a",borderRadius:8,padding:"6px 10px",display:"flex",alignItems:"center",gap:7}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>
                {(authUser.displayName||authUser.email||"U")[0].toUpperCase()}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:600,color:"#ccc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {authUser.displayName||authUser.email?.split("@")[0]}
                </div>
                <div style={{fontSize:9,color:fbStatusColor,fontWeight:700,letterSpacing:.5}}>
                  {fbStatusIcon} {fbStatus==="synced"?"Synced":fbStatus==="syncing"?"Saving…":fbStatus==="error"?"Sync error":"Local"}
                </div>

            </div>
          )}
        </div>

        {NAV_ITEMS.map(item=>(
          <div key={item.id} className={`nav-item${tab===item.id?" active":""}`} onClick={()=>setTab(item.id)} style={{position:"relative"}}>
            <span style={{fontSize:16,flexShrink:0}}>{item.icon}</span>

            {item.id==="smartimport"&&sidebar&&<span style={{marginLeft:"auto",fontSize:9,fontWeight:800,letterSpacing:1,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",color:"white",padding:"1px 5px",borderRadius:4}}>AI</span>}
            {item.id==="cloudsync"&&<span className={`sync-dot ${syncState.status}`} style={{marginLeft:sidebar?"auto":"0",flexShrink:0}}/>}

        <div style={{marginTop:"auto",borderTop:"1px solid #1a1a2a",paddingTop:16}}>
          {FB.enabled && authUser&&(
            <div className="nav-item" onClick={signOut} style={{color:"#888",marginBottom:4}}>

              {sidebar&&<span>Sign Out</span>}

          <div className="nav-item" onClick={lockApp} style={{color:"#f87171",marginBottom:4}}>
            <span style={{fontSize:16}}>🔒</span>
            {sidebar&&<span>Lock App</span>}
          </div>
          <div className="nav-item" onClick={()=>setSidebar(!sidebar)}>
            <span style={{fontSize:16}}>{sidebar?"←":"→"}</span>
            {sidebar&&<span>Collapse</span>}
          </div>
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,overflowY:"auto",padding:"20px 20px 80px",maxHeight:"100vh"}} className="main-content-mobile">
        {notif&&(
          <div style={{position:"fixed",top:20,right:20,zIndex:300,background:notif.type==="success"?"#052e16":notif.type==="info"?"#0a1628":"#2d0a0a",border:`1px solid ${notif.type==="success"?"#16a34a":notif.type==="info"?"#3b82f6":"#ef4444"}`,color:notif.type==="success"?"#4ade80":notif.type==="info"?"#60a5fa":"#f87171",padding:"12px 20px",borderRadius:10,fontSize:13,fontWeight:500,maxWidth:340,zIndex:999}}>
            {notif.type==="success"?"✓":notif.type==="info"?"ℹ":"✗"} {notif.msg}
          </div>
        )}
        {!apiKey&&tab!=="profile"&&(
          <div style={{background:"linear-gradient(135deg,#1e1b4b,#2e1065)",border:"1px solid #4f46e5",borderRadius:14,padding:"14px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:14}}>
            <span style={{fontSize:20}}>🔑</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>Add an AI key to enable Smart Import</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>Free: Gemini key from aistudio.google.com · Paid: Claude key from console.anthropic.com</div>
            </div>
            <button className="btn btn-primary" onClick={()=>setTab("profile")}>Add API Key →</button>
          </div>
        )}
        {tab==="dashboard"&&<Dashboard data={data} netWorth={netWorth} totalAssets={totalAssets} totalLiab={totalLiab} totalIncome={totalIncome} totalExpenses={totalExpenses} cashflow={cashflow} setTab={setTab} activeMember={activeMember} setActiveMember={setActiveMember}/>}
        {tab==="smartimport"&&<SmartImport data={data} setData={setData} notify={notify} apiKey={apiKey} setTab={setTab}/>}
        {tab==="assets"&&<AssetsTab data={data} setData={setData} notify={notify} apiKey={apiKey} activeMember={activeMember} setActiveMember={setActiveMember}/>}
        {tab==="liabilities"&&<LiabilitiesTab data={data} setData={setData} notify={notify} apiKey={apiKey} activeMember={activeMember} setActiveMember={setActiveMember}/>}
        {tab==="insurance"&&<InsuranceTab data={data} setData={setData} notify={notify} apiKey={apiKey} activeMember={activeMember} setActiveMember={setActiveMember}/>}
        {tab==="income"&&<IncomeTab data={data} setData={setData} notify={notify} setTab={setTab} activeMember={activeMember} setActiveMember={setActiveMember}/>}

        {tab==="legacy"&&<LegacyTab data={data} netWorth={netWorth} totalAssets={totalAssets} totalLiab={totalLiab}/>}
        {tab==="profile"&&<ProfileTab data={data} setData={setData} notify={notify} apiKey={apiKey} saveApiKey={saveApiKey} lockApp={lockApp}
          authUser={authUser} fbStatus={fbStatus}
          onSwitchAccount={()=>{if(FB.enabled){FB.auth.signOut().then(()=>setAuthUser(null));} else{setOfflineMode(false);localStorage.removeItem("wv_offlineMode");}}}

            style={{flex:1,display:"inline-flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 0",cursor:"pointer",

            <span style={{fontSize:9,fontWeight:tab===item.id?700:400}}>{item.label}</span>
          </div>
        ))}
      </div>

      {/* Inject mobile nav visibility via script */}
      <style>{`
        @media (max-width: 768px) {
          #mobile-nav { display: flex !important; }
          .sidebar-mobile-hidden { display: none !important; }
          .main-content-mobile { padding: 16px 14px 80px !important; }
        }
      `}</style>
    </div>
  );
}

// ── SMART IMPORT (AI-powered) ─────────────────────────────────────────────────
function SmartImport({data,setData,notify,apiKey,setTab}){
  const [stage,setStage]=useState("upload"); // upload | parsing | review | done
  const [dragOver,setDragOver]=useState(false);
  const [files,setFiles]=useState([]);
  const [parsed,setParsed]=useState(null);      // {assets,liabilities,income,expenses,insurance,raw}
  const [selected,setSelected]=useState({});    // id -> bool
  const [docType,setDocType]=useState("auto");
  const [parsing,setParsing]=useState(false);
  const [parseLog,setParseLog]=useState("");
  const [filePwds,setFilePwds]=useState({});    // {filename: password} for password-protected PDFs
  const [pwdError,setPwdError]=useState(null);  // filename that triggered password error
  const fileRef=useRef();

  const DOC_TYPES=[
    {id:"auto",label:"Auto Detect",icon:"🤖"},
    {id:"bank",label:"Bank Statement",icon:"🏦"},
    {id:"cc",label:"Credit Card Statement",icon:"💳"},
    {id:"demat",label:"Demat / Portfolio",icon:"📊"},
    {id:"mf",label:"Mutual Fund Statement",icon:"📈"},
    {id:"insurance",label:"Insurance Policy",icon:"🛡"},
    {id:"loan",label:"Loan Statement",icon:"🏠"},
    {id:"itr",label:"ITR / Form 16",icon:"📋"},
    {id:"fd",label:"FD / Bank Certificate",icon:"🏛"},
  ];

  const handleFiles=useCallback((fileList)=>{
    const accepted=[...fileList].filter(f=>{
      const name=f.name.toLowerCase();
      return (
        f.type.includes("pdf") ||
        f.type.includes("image") ||
        f.type.includes("csv") ||
        f.type.includes("text") ||
        f.type.includes("spreadsheet") ||
        f.type.includes("excel") ||
        f.type.includes("officedocument") ||
        name.endsWith(".csv") ||
        name.endsWith(".txt") ||
        name.endsWith(".xlsx") ||
        name.endsWith(".xls") ||
        name.endsWith(".xlsm")
      );
    });
    if(accepted.length===0){notify("Please upload PDF, image (JPG/PNG), CSV, XLSX or TXT files","error");return;}
    setFiles(accepted);
    setStage("upload");
    setParsed(null);
  },[notify]);

  const readFileAsBase64=file=>new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>res(reader.result.split(",")[1]);
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });

  const readFileAsText=file=>new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>res(reader.result);
    reader.onerror=rej;
    reader.readAsText(file);
  });

  const readFileAsArrayBuffer=file=>new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>res(reader.result);
    reader.onerror=rej;
    reader.readAsArrayBuffer(file);
  });

  // Render a (possibly password-protected) PDF to JPEG images using PDF.js
  const renderPDFToImages=async(file, password)=>{
    if(!window.pdfjsLib) throw new Error("PDF.js library not loaded. Please refresh the page.");
    setParseLog(`Decrypting and rendering PDF: ${file.name}…`);
    const arrayBuffer=await readFileAsArrayBuffer(file);
    const loadingTask=window.pdfjsLib.getDocument({data:arrayBuffer, password:password||""});

    // Surface wrong-password errors nicely
    const pdf=await loadingTask.promise.catch(err=>{
      if(err?.name==="PasswordException"||err?.message?.toLowerCase().includes("password")){
        throw new Error("PDF_PASSWORD_WRONG");
      }
      throw err;
    });

    const numPages=Math.min(pdf.numPages, 25); // cap at 25 pages to avoid token overflow
    const images=[];
    for(let pg=1;pg<=numPages;pg++){
      setParseLog(`Rendering page ${pg} / ${numPages} of ${file.name}…`);
      const page=await pdf.getPage(pg);
      const viewport=page.getViewport({scale:1.8}); // high enough res to be readable
      const canvas=document.createElement("canvas");
      canvas.width=viewport.width;
      canvas.height=viewport.height;
      const ctx=canvas.getContext("2d");
      await page.render({canvasContext:ctx, viewport}).promise;
      // Compress to JPEG to keep payload small
      images.push(canvas.toDataURL("image/jpeg",0.82).split(",")[1]);
    }
    return images; // array of base64 JPEG strings
  };

  // Convert XLSX/XLS to readable text using SheetJS
  const readXLSXasText=async(file, password)=>{
    if(!window.XLSX) throw new Error("SheetJS library not loaded. Please refresh the page.");
    const buf=await readFileAsArrayBuffer(file);
    const opts={type:"array"};
    if(password) opts.password=password;
    let wb;
    try{
      wb=window.XLSX.read(buf,opts);
    }catch(e){
      const msg=(e.message||"").toLowerCase();
      // SheetJS throws "File is password-protected" or "Encrypted" when wrong/no pwd
      if(msg.includes("password")||msg.includes("encrypt")||msg.includes("protected")){
        throw new Error("XLSX_PASSWORD_REQUIRED:"+file.name);
      }
      throw e;
    }
    let result=`Filename: ${file.name}\n\n`;
    wb.SheetNames.forEach(sheetName=>{
      const ws=wb.Sheets[sheetName];
      const csv=window.XLSX.utils.sheet_to_csv(ws,{blankrows:false});
      // Filter out completely empty lines
      const cleaned=csv.split("\n").filter(r=>r.replace(/,/g,"").trim().length>0).join("\n");
      if(cleaned.length>0){
        result+=`--- Sheet: ${sheetName} ---\n${cleaned}\n\n`;
      }
    });
    // Truncate if too large (API limit)
    if(result.length>80000) result=result.slice(0,80000)+"\n[...truncated for length]";
    return result;
  };

  const isXLSX=file=>{
    const name=file.name.toLowerCase();
    return name.endsWith(".xlsx")||name.endsWith(".xls")||name.endsWith(".xlsm")||
      file.type.includes("spreadsheet")||file.type.includes("excel")||file.type.includes("officedocument");
  };

  const isCSV=file=>{
    const name=file.name.toLowerCase();
    return name.endsWith(".csv")||name.endsWith(".txt")||file.type.includes("csv")||file.type.includes("text");
  };

  const getFileIcon=file=>{
    const name=file.name.toLowerCase();
    if(file.type.includes("pdf")) return "📄";
    if(file.type.includes("image")) return "🖼";
    if(name.endsWith(".xlsx")||name.endsWith(".xls")||name.endsWith(".xlsm")) return "📊";
    if(name.endsWith(".csv")) return "📋";
    return "📃";
  };

  const parseDocuments=async()=>{
    if(!apiKey||!apiKey.trim()){notify("Please add your AI API key in Profile settings","error");return;}
    if(!apiKey.trim().startsWith("sk-ant-")&&!apiKey.trim().startsWith("AIzaSy")){notify("Unknown key format. Use Claude key (sk-ant-...) or Gemini key (AIzaSy...).","error");return;}
    if(files.length===0){notify("Please upload at least one document","error");return;}
    setParsing(true);setStage("parsing");setParseLog("Reading document(s)...");
    setPwdError(null);

    try {
      const messages=[];
      const contentParts=[];

      for(const file of files){
        setParseLog(`Processing: ${file.name}...`);
        if(file.type.includes("image")){
          const b64=await readFileAsBase64(file);
          const mt=file.type.includes("png")?"image/png":file.type.includes("webp")?"image/webp":"image/jpeg";
          contentParts.push({type:"image",source:{type:"base64",media_type:mt,data:b64}});
        } else if(file.type.includes("pdf")){
          const pwd=filePwds[file.name]||"";
          if(pwd){
            // Password provided → render pages to images via PDF.js
            const images=await renderPDFToImages(file, pwd);
            setParseLog(`Rendered ${images.length} pages from ${file.name}, sending to AI…`);
            images.forEach(b64=>{
              contentParts.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}});
            });
          } else {
            // No password → try sending as raw PDF (may fail if protected)
            const b64=await readFileAsBase64(file);
            contentParts.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}});
          }
        } else if(isXLSX(file)){
          setParseLog(`Converting Excel file: ${file.name}...`);
          const pwd=filePwds[file.name]||"";
          const text=await readXLSXasText(file, pwd);
          contentParts.push({type:"text",text:`EXCEL FILE: ${file.name}\n\n${text}`});
        } else {
          // CSV / TXT
          const text=await readFileAsText(file);
          const trimmed=text.length>80000?text.slice(0,80000)+"\n[truncated]":text;
          contentParts.push({type:"text",text:`FILE: ${file.name}\n\n${trimmed}`});
        }
      }

      const docTypeHint=docType==="auto"?"(auto-detect the document type)":(`This is a: ${DOC_TYPES.find(d=>d.id===docType)?.label}`);

      contentParts.push({type:"text",text:`
You are a personal finance data extraction engine for Indian users.
${docTypeHint}

Carefully analyze the uploaded document(s) and extract ALL financial information.
Return ONLY a valid JSON object — no markdown, no explanation, no preamble.

JSON schema:
{
  "documentType": "Bank Statement | Credit Card Statement | Demat Statement | Mutual Fund Statement | Insurance Policy | Loan Statement | ITR/Form16 | FD Certificate | Other",
  "documentSummary": "one-line human summary of what this document is",
  "bankName": "name of bank/institution if detectable",
  "accountHolder": "name if found",
  "statementPeriod": "e.g. Jan 2024 - Mar 2024",
  "assets": [
    {
      "category": "one of: Real Estate | Stocks | Mutual Funds | Fixed Deposits | Gold | EPF/PPF | Bank Savings | NPS | Crypto | Other",
      "name": "full company/fund name",
      "value": 0,

      "ticker": "NSE/BSE ticker symbol if Stocks (e.g. RELIANCE, INFY, HDFCBANK)",
      "isin": "12-character ISIN code if present (e.g. INE002A01018)",
      "exchange": "NSE or BSE if Stocks",
      "broker": "broker/depository name if mentioned (e.g. Zerodha, Groww, CDSL, NSDL)",
      "qty": 0,
      "buyPrice": 0,
      "buyDate": "YYYY-MM-DD or empty string",

      "schemeCode": "AMFI/MFAPI numeric scheme code if Mutual Fund (e.g. 120586)",
      "folio": "folio number if Mutual Fund",
      "units": 0,
      "nav": 0,
      "invested": 0,

      "acNo": "last 4 digits of account number if Bank/FD",
      "intRate": 0,
      "matDate": "YYYY-MM-DD or empty string",

      "details": "any extra info — account number last 4 digits, broker, notes",
      "confidence": "high | medium | low",
      "source": "what line/section of document this came from"
    }
  ],
  "liabilities": [
    {
      "category": "one of: Home Loan | Car Loan | Personal Loan | Credit Cards | Education Loan | Business Loan | BNPL/EMI | Other Debt",
      "name": "descriptive name",
      "value": 0,
      "origAmt": 0,
      "emi": 0,
      "intRate": 0,
      "details": "outstanding balance, EMI, interest rate, tenure remaining",
      "confidence": "high | medium | low",
      "source": "what section this came from"
    }
  ],
  "income": [
    {

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[
                {icon:"🔑", tip:"Invalid API key → Go to Profile and re-enter your API key from console.anthropic.com"},
                {icon:"📄", tip:"PDF not readable → Try uploading a screenshot (JPG/PNG) of the document instead"},
                {icon:"🌐", tip:"Network error → Check your internet connection and try again"},
                {icon:"📏", tip:"File too large → Try a shorter statement (1–2 pages) or a CSV export instead"},
                {icon:"🔄", tip:"API overloaded → Wait 30 seconds and try again"},
              ].map((f,i)=>(
                <div key={i} style={{display:"flex",gap:12,padding:"10px 14px",background:"#0e0e18",border:"1px solid #1a1a2a",borderRadius:8,fontSize:12,color:"#aaa"}}>
                  <span>{f.icon}</span><span>{f.tip}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:12}}>
            <button className="btn btn-primary" onClick={()=>{setStage("upload");setParseLog("");}}>← Try Again</button>
            <button className="btn btn-ghost" onClick={()=>setTab&&setTab("profile")}>🔑 Check API Key</button>
          </div>
        </div>
      )}

      {/* Review Stage */}
      {stage==="review"&&parsed&&(
        <div>
          {/* Summary banner */}
          <div style={{background:"linear-gradient(135deg,#0d1a0d,#0d0d2e)",border:"1px solid #2a4a2a",borderRadius:16,padding:20,marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:"#4ade80",marginBottom:4}}>✓ Document Analysed Successfully</div>
                <div style={{fontSize:13,color:"#888"}}>{parsed.documentType} {parsed.bankName?"· "+parsed.bankName:""} {parsed.statementPeriod?"· "+parsed.statementPeriod:""}</div>
                {parsed.documentSummary&&<div style={{fontSize:12,color:"#666",marginTop:4}}>{parsed.documentSummary}</div>}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {parsed.assets.length>0&&<span className="tag badge-green">{parsed.assets.length} assets</span>}
                {parsed.liabilities.length>0&&<span className="tag badge-red">{parsed.liabilities.length} liabilities</span>}
                {parsed.income.length>0&&<span className="tag badge-blue">{parsed.income.length} income</span>}
                {parsed.expenses.length>0&&<span className="tag badge-yellow">{parsed.expenses.length} expenses</span>}
                {parsed.insurance.length>0&&<span className="tag badge-purple">{parsed.insurance.length} insurance</span>}
              </div>
            </div>
            {parsed.rawInsights&&<div style={{marginTop:12,padding:"10px 14px",background:"rgba(0,0,0,0.3)",borderRadius:8,fontSize:12,color:"#aaa",fontStyle:"italic"}}>💡 {parsed.rawInsights}</div>}
          </div>

          {/* Select all / controls */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:600}}>{totalSelected} of {totalItems} items selected</div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{const s={};allItems.forEach(i=>s[i.id]=true);setSelected(s);}}>Select All</button>
              <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setSelected({})}>Deselect All</button>
            </div>
          </div>

          {/* Grouped sections */}
          {[
            {key:"assets",label:"Assets Detected",color:"#4ade80",badge:"badge-green",
              render:i=><div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,fontWeight:600}}>{i.name}</span>
                  <span className="tag badge-green" style={{fontSize:10}}>{i.category}</span>
                  {i.ticker&&<span style={{fontSize:10,color:"#a78bfa",fontFamily:"'DM Mono',monospace",background:"#1e1b4b",padding:"1px 6px",borderRadius:4}}>{i.ticker}</span>}
                  {i.isin&&<span style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace"}}>{i.isin}</span>}
                </div>
                <div style={{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"}}>
                  {i.qty>0&&<span style={{fontSize:11,color:"#888"}}>Qty: <span style={{color:"#e0e0f0",fontWeight:600}}>{i.qty}</span></span>}
                  {i.buyPrice>0&&<span style={{fontSize:11,color:"#888"}}>Avg Price: <span style={{color:"#fbbf24",fontWeight:600}}>₹{Number(i.buyPrice).toLocaleString("en-IN")}</span></span>}
                  {i.units>0&&<span style={{fontSize:11,color:"#888"}}>Units: <span style={{color:"#e0e0f0",fontWeight:600}}>{i.units}</span></span>}
                  {i.nav>0&&<span style={{fontSize:11,color:"#888"}}>NAV: <span style={{color:"#fbbf24",fontWeight:600}}>₹{i.nav}</span></span>}
                  {i.invested>0&&<span style={{fontSize:11,color:"#888"}}>Invested: <span style={{color:"#60a5fa",fontWeight:600}}>₹{Number(i.invested).toLocaleString("en-IN")}</span></span>}
                  {i.exchange&&<span style={{fontSize:10,color:"#555"}}>{i.exchange}</span>}
                </div>
                {i.details&&<div style={{fontSize:11,color:"#555",marginTop:2}}>{i.details}</div>}
              </div>,
              right:i=><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#4ade80",fontFamily:"'DM Mono',monospace"}}>{fmtS(i.value||0)}</div><ConfTag c={i.confidence}/></div>},
            {key:"liabilities",label:"Liabilities Detected",color:"#f87171",badge:"badge-red",
              render:i=><div><span style={{fontSize:12,fontWeight:600}}>{i.name}</span> <span className="tag badge-red" style={{fontSize:10}}>{i.category}</span>{i.emi>0&&<span style={{fontSize:11,color:"#555",marginLeft:8}}>EMI: ₹{Number(i.emi).toLocaleString("en-IN")}</span>}<div style={{fontSize:11,color:"#555",marginTop:2}}>{i.details}</div></div>,
              right:i=><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#f87171",fontFamily:"'DM Mono',monospace"}}>{fmtS(i.value||0)}</div><ConfTag c={i.confidence}/></div>},
            {key:"income",label:"Income Detected",color:"#60a5fa",badge:"badge-blue",
              render:i=><div><span style={{fontSize:12,fontWeight:600}}>{i.name}</span> <span className="tag badge-blue" style={{fontSize:10}}>{i.source}</span>{i.frequency&&<span style={{fontSize:10,color:"#555",marginLeft:6}}>{i.frequency}</span>}{i.taxable&&<span style={{fontSize:10,color:"#fbbf24",marginLeft:6}}>Taxable</span>}</div>,
              right:i=><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#60a5fa",fontFamily:"'DM Mono',monospace"}}>₹{(i.amount||0).toLocaleString("en-IN")}</div><ConfTag c={i.confidence}/></div>},
            {key:"expenses",label:"Transactions / Expenses",color:"#fbbf24",badge:"badge-yellow",
              render:i=><div><span style={{fontSize:12,fontWeight:600}}>{i.name}</span> <span className="tag badge-yellow" style={{fontSize:10}}>{i.category}</span>{i.date&&<span style={{fontSize:10,color:"#555",marginLeft:6}}>{i.date}</span>}{i.type&&<span style={{fontSize:10,color:"#888",marginLeft:6}}>{i.type}</span>}</div>,
              right:i=><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#fbbf24",fontFamily:"'DM Mono',monospace"}}>₹{(i.amount||0).toLocaleString("en-IN")}</div><ConfTag c={i.confidence}/></div>},
            {key:"insurance",label:"Insurance Policies",color:"#a78bfa",badge:"badge-purple",
              render:i=><div><span style={{fontSize:12,fontWeight:600}}>{i.name}</span> <span className="tag badge-purple" style={{fontSize:10}}>{i.type}</span><div style={{fontSize:11,color:"#555",marginTop:2}}>Policy: {i.policyNo||"N/A"} · Nominee: {i.nominee||"N/A"}</div></div>,
              right:i=><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#a78bfa",fontFamily:"'DM Mono',monospace"}}>{fmtS(i.cover||0)}</div><ConfTag c={i.confidence}/></div>},
          ].map(sec=>{
            const items=parsed[sec.key]||[];
            if(items.length===0)return null;
            return (
              <div key={sec.key} style={{marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:sec.color}}/>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#666"}}>{sec.label}</span>
                  <span style={{fontSize:11,color:"#444",marginLeft:"auto"}}>{items.filter(i=>selected[i.id]).length}/{items.length} selected</span>
                </div>
                {items.map(item=>(
                  <div key={item.id} className={`check-row${selected[item.id]?" selected":""}${item._skip?" skip-row":""}`}
                    onClick={()=>!item._skip&&setSelected(s=>({...s,[item.id]:!s[item.id]}))}
                    style={item._skip?{opacity:0.4,cursor:"default"}:{}}>
                    <div className={`check-box${selected[item.id]&&!item._skip?" checked":""}`}>
                      {item._skip?<span style={{color:"#555",fontSize:11}}>⏭</span>
                        :selected[item.id]&&<span style={{color:"white",fontSize:12,fontWeight:700}}>✓</span>}
                    </div>
                    <div style={{flex:1}}>
                      {sec.render(item)}
                      {/* Import action badge */}
                      {item._importAction&&item._importAction!=="auto"&&(
                        <div style={{marginTop:4}}>
                          {item._importAction==="new"&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:"#052e16",color:"#4ade80",fontWeight:700}}>➕ NEW ENTRY</span>}
                          {item._importAction==="update"&&item._matchId&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:"#1e1b4b",color:"#a78bfa",fontWeight:700}}>✏️ UPDATE: {(data[sec.key]||[]).find(e=>e.id===item._matchId)?.name||"selected entry"}</span>}
                          {item._importAction==="skip"&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:"#1a0a0a",color:"#888",fontWeight:700}}>⏭ SKIPPED</span>}
                        </div>
                      )}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                      {sec.right(item)}
                      <button
                        onClick={e=>{e.stopPropagation();setEditingItem({item,section:sec.key});}}
                        style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:6,color:"#a78bfa",cursor:"pointer",fontSize:11,padding:"3px 9px",fontFamily:"inherit",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>
                        ✏️ Edit
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            );
          })}

          {/* Edit Modal */}
          {editingItem&&(
            <ImportItemEditModal
              item={editingItem.item}
              section={editingItem.section}
              existingItems={data[editingItem.section]||[]}
              onSave={updated=>{
                setParsed(p=>({...p,[editingItem.section]:p[editingItem.section].map(x=>x.id===updated.id?updated:x)}));
                // Auto-select the item if not already selected
                setSelected(s=>({...s,[updated.id]:true}));
                setEditingItem(null);
              }}
              onClose={()=>setEditingItem(null)}
            />
          )}

          {/* Import button */}
          <div style={{position:"sticky",bottom:0,background:"linear-gradient(0deg,#0a0a0f 80%,transparent)",padding:"20px 0 0",display:"flex",gap:12}}>
            <button className="btn btn-primary" style={{flex:1,padding:"14px",fontSize:15}} onClick={applySelected} disabled={totalSelected===0}>
              🔄 Review & Smart Import {totalSelected} Item{totalSelected!==1?"s":""}
            </button>
            <button className="btn btn-ghost" onClick={()=>{setStage("upload");setParsed(null);setFiles([]);}}>
              ✕ Cancel
            </button>
          </div>
          {smartReconcile&&<ReconcileModal results={smartReconcile} dataKey="smart" onApply={applySmartReconcile} onClose={()=>setSmartReconcile(null)}/>}
        </div>
      )}

      {/* Done Stage */}
      {stage==="done"&&(
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:48,marginBottom:16}}>✅</div>
          <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Import Complete!</div>
          <div style={{fontSize:13,color:"#666",marginBottom:24}}>Your financial data has been updated. Check each section to review.</div>
          <div style={{display:"flex",gap:12,justifyContent:"center"}}>
            <button className="btn btn-primary" onClick={()=>{setStage("upload");setFiles([]);setParsed(null);}}>Import Another Document</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── IMPORT ITEM EDIT MODAL ────────────────────────────────────────────────────
function ImportItemEditModal({item, section, existingItems, onSave, onClose}){
  const [form,        setForm]        = useState({...item});
  const [matchSearch, setMatchSearch] = useState("");
  const set    = (k,v) => setForm(f=>({...f,[k]:v}));
  const numField = (k,v) => set(k, v===""?"":parseFloat(v)||0);

  // Derive action label for display
  const actionLabel = form._importAction==="new" ? "➕ Add as New Entry"
    : form._importAction==="update" ? "✏️ Update Existing Entry"
    : form._importAction==="skip"   ? "⏭ Skip (Don't Import)"
    : "🤖 Auto (Smart Match)";

  // Filter existing items for the match picker
  const filteredExisting = (existingItems||[]).filter(e=>{
    const q = matchSearch.toLowerCase();
    return !q || (e.name||"").toLowerCase().includes(q) || (e.category||e.type||e.source||"").toLowerCase().includes(q);
  });

  const F = ({label, fkey, type="text", opts, hint, mono, col}) => (
    <div style={col?{gridColumn:"1/-1"}:{}}>
      <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:4}}>
        {label.toUpperCase()}
        {hint&&<span style={{fontWeight:400,color:"#333",textTransform:"none",marginLeft:6}}>{hint}</span>}
      </div>
      {opts
        ? <select className="input" value={form[fkey]||""} onChange={e=>set(fkey,e.target.value)} style={{fontSize:12}}>
            {opts.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        : <input className="input" type={type} value={form[fkey]??""} style={{fontSize:12,fontFamily:mono?"'DM Mono',monospace":"inherit"}}
            inputMode={type==="number"?"decimal":undefined}
            onChange={e=>type==="number"?numField(fkey,e.target.value):set(fkey,e.target.value)}/>
      }
    </div>
  );

  const ASSET_CATS = ["Stocks","Mutual Funds","Bank","Fixed Deposits","Gold","Real Estate","EPF/PPF","NPS","Crypto","Other"];
  const LIAB_CATS  = ["Home Loan","Car Loan","Personal Loan","Credit Cards","Education Loan","Other"];
  const INC_SRCS   = ["Salary","Freelance","Business","Rental","Dividend","Interest","Capital Gains","Pension","Other"];
  const EXP_CATS   = ["Housing","Food","Transport","Utilities","Healthcare","Insurance","Education","Shopping","Entertainment","SIP","Investment","EMI","Other"];
  const INS_TYPES  = ["Life","Term","Health","Critical Illness","Vehicle","Travel","Home","ULIP","Endowment","Other"];
  const FREQS      = ["Monthly","Quarterly","Annual","One-time","Irregular"];

  const sectionConfig = {
    assets: {
      title:"✏️ Edit Asset",
      fields:[
        <F key="name"     label="Name"        fkey="name" col/>,
        <F key="category" label="Category"    fkey="category" opts={ASSET_CATS}/>,
        <F key="value"    label="Current Value (₹)" fkey="value" type="number"/>,
        <F key="qty"      label="Qty / Shares" fkey="qty" type="number"/>,
        <F key="buyPrice" label="Buy Price (₹)" fkey="buyPrice" type="number"/>,
        <F key="units"    label="Units (MF)"  fkey="units" type="number"/>,
        <F key="nav"      label="NAV (₹)"     fkey="nav" type="number"/>,
        <F key="invested" label="Amount Invested (₹)" fkey="invested" type="number"/>,
        <F key="ticker"   label="Ticker"      fkey="ticker" mono/>,
        <F key="isin"     label="ISIN"        fkey="isin" mono/>,
        <F key="exchange" label="Exchange"    fkey="exchange" opts={["","NSE","BSE","MCX","Other"]}/>,
        <F key="broker"   label="Broker / Bank / AMC" fkey="broker"/>,
        <F key="details"  label="Notes"       fkey="details" col/>,
      ]
    },
    liabilities: {
      title:"✏️ Edit Liability",
      fields:[
        <F key="name"     label="Name"        fkey="name" col/>,
        <F key="category" label="Category"    fkey="category" opts={LIAB_CATS}/>,
        <F key="value"    label="Outstanding (₹)" fkey="value" type="number"/>,
        <F key="emi"      label="EMI / Month (₹)" fkey="emi" type="number"/>,
        <F key="intRate"  label="Interest Rate (%)" fkey="intRate" type="number"/>,
        <F key="matDate"  label="Maturity Date" fkey="matDate" type="date"/>,
        <F key="details"  label="Notes"       fkey="details" col/>,
      ]
    },
    income: {
      title:"✏️ Edit Income Entry",
      fields:[
        <F key="name"     label="Description" fkey="name" col/>,
        <F key="source"   label="Source"      fkey="source" opts={INC_SRCS}/>,
        <F key="amount"   label="Amount (₹)"  fkey="amount" type="number"/>,
        <F key="frequency"label="Frequency"   fkey="frequency" opts={FREQS}/>,
        <div key="taxable" style={{gridColumn:"1/-1"}}>
          <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:4}}>TAXABLE?</div>
          <div style={{display:"flex",gap:10}}>
            {["Taxable","Exempt"].map(opt=>(
              <button key={opt} onClick={()=>set("taxable",opt==="Taxable")}
                style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${(opt==="Taxable"?form.taxable:!form.taxable)?"#7c3aed":"#2a2a3a"}`,
                  background:(opt==="Taxable"?form.taxable:!form.taxable)?"#1e1b4b":"transparent",
                  color:(opt==="Taxable"?form.taxable:!form.taxable)?"#a78bfa":"#555",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
                {opt==="Taxable"?"💰 Taxable":"🟢 Exempt"}
              </button>
            ))}
          </div>
        </div>,
        <F key="date"     label="Date of Receipt" fkey="date" type="date"/>,
        <F key="acNo"     label="Account No"  fkey="acNo" mono/>,
      ]
    },
    expenses: {
      title:"✏️ Edit Expense / Transaction",
      fields:[
        <F key="name"     label="Description" fkey="name" col/>,
        <F key="category" label="Category"    fkey="category" opts={EXP_CATS}/>,
        <F key="amount"   label="Amount (₹)"  fkey="amount" type="number"/>,
        <F key="type"     label="Type"        fkey="type" opts={["","Fixed","Variable"]}/>,
        <F key="date"     label="Date"        fkey="date" type="date"/>,
        <F key="details"  label="Notes"       fkey="details" col/>,
      ]
    },
    insurance: {
      title:"✏️ Edit Insurance Policy",
      fields:[
        <F key="name"     label="Policy Name" fkey="name" col/>,
        <F key="type"     label="Insurance Type" fkey="type" opts={INS_TYPES}/>,
        <F key="cover"    label="Sum Assured (₹)" fkey="cover" type="number"/>,
        <F key="premium"  label="Premium (₹)" fkey="premium" type="number"/>,
        <F key="frequency"label="Frequency"   fkey="frequency" opts={FREQS}/>,
        <F key="maturity" label="Maturity Date" fkey="maturity" type="date"/>,
        <F key="policyNo" label="Policy Number" fkey="policyNo" mono/>,
        <F key="insurer"  label="Insurance Co." fkey="insurer"/>,
        <F key="nominee"  label="Nominee"     fkey="nominee"/>,
        <F key="status"   label="Status"      fkey="status" opts={["Active","Lapsed","Surrendered","Matured"]}/>,
      ]
    },
  };

  const cfg = sectionConfig[section];
  if(!cfg) return null;

  const selectedMatch = form._matchId ? existingItems?.find(e=>e.id===form._matchId) : null;

  return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{width:"min(600px,96vw)",maxHeight:"90vh",overflowY:"auto"}}
        onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:15,fontWeight:700}}>{cfg.title}</div>
          <button style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:20}} onClick={onClose}>×</button>
        </div>
        <div style={{fontSize:11,color:"#444",marginBottom:20}}>Changes apply to this import session. Saved to your data on import confirmation.</div>

        {/* ── IMPORT ACTION SELECTOR ── */}
        <div style={{background:"#080812",border:"1px solid #2a2a3e",borderRadius:12,padding:16,marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",letterSpacing:1.2,marginBottom:12}}>IMPORT ACTION</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {[
              {v:"auto",  icon:"🤖", label:"Auto Detect",         desc:"Let Smart Match decide"},
              {v:"new",   icon:"➕", label:"Add as New Entry",    desc:"Always create new record"},
              {v:"update",icon:"✏️", label:"Update Existing",     desc:"Overwrite a specific entry"},
              {v:"skip",  icon:"⏭", label:"Skip / Don't Import", desc:"Exclude from this import"},
            ].map(opt=>(
              <button key={opt.v} onClick={()=>{set("_importAction",opt.v);if(opt.v!=="update")set("_matchId",null);}}
                style={{padding:"10px 12px",borderRadius:10,border:`1px solid ${form._importAction===opt.v?"#7c3aed":"#1e1e2e"}`,
                  background:form._importAction===opt.v?"linear-gradient(135deg,#1e1b4b,#2e1065)":"#0e0e18",
                  color:form._importAction===opt.v?"#e0d0ff":"#666",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{opt.icon} {opt.label}</div>
                <div style={{fontSize:10,color:form._importAction===opt.v?"#888":"#333"}}>{opt.desc}</div>
              </button>
            ))}
          </div>

          {/* Existing entry picker — shown when action = update */}
          {form._importAction==="update"&&(
            <div style={{borderTop:"1px solid #1a1a2e",paddingTop:12}}>
              <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:8}}>
                SELECT EXISTING ENTRY TO UPDATE
                {selectedMatch&&<span style={{color:"#4ade80",marginLeft:8,textTransform:"none",fontWeight:400}}>✓ {selectedMatch.name}</span>}
              </div>
              <input className="input" value={matchSearch} onChange={e=>setMatchSearch(e.target.value)}
                placeholder="🔍 Search existing entries…" style={{marginBottom:8,fontSize:12}}/>
              {existingItems&&existingItems.length>0
                ? <div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                    {filteredExisting.slice(0,20).map(e=>(
                      <div key={e.id} onClick={()=>set("_matchId",e.id)}
                        style={{padding:"8px 12px",borderRadius:8,cursor:"pointer",
                          background:form._matchId===e.id?"#1e1b4b":"#0a0a18",
                          border:`1px solid ${form._matchId===e.id?"#7c3aed":"#111"}`,
                          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:form._matchId===e.id?"#c4b5fd":"#ccc"}}>{e.name}</div>
                          <div style={{fontSize:10,color:"#444",marginTop:1}}>{e.category||e.type||e.source||""} {e.ticker?`· ${e.ticker}`:""}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:"#4ade80"}}>{fmtS(e.value||e.amount||e.cover||0)}</div>
                          {form._matchId===e.id&&<div style={{fontSize:10,color:"#7c3aed",fontWeight:700}}>✓ Selected</div>}
                        </div>
                      </div>
                    ))}
                    {filteredExisting.length===0&&<div style={{fontSize:12,color:"#444",padding:"8px 12px"}}>No matching entries found</div>}
                  </div>
                : <div style={{fontSize:12,color:"#444",padding:"8px 0"}}>No existing {section} entries to update</div>
              }
            </div>
          )}

          {/* Skip confirmation note */}
          {form._importAction==="skip"&&(
            <div style={{background:"#1a0a0a",border:"1px solid #7f1d1d",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#888",marginTop:4}}>
              ⏭ This item will be excluded from the import even if selected on the review screen.
            </div>
          )}
        </div>

        {/* Confidence badge */}
        {item.confidence&&(
          <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:"#555"}}>AI Confidence:</span>
            <ConfTag c={item.confidence}/>
            <select value={form.confidence||"medium"} onChange={e=>set("confidence",e.target.value)}
              style={{marginLeft:"auto",background:"#0e0e18",border:"1px solid #2a2a3a",borderRadius:6,color:"#888",fontSize:11,padding:"3px 8px",fontFamily:"inherit"}}>
              <option value="high">High confidence</option>
              <option value="medium">Medium</option>
              <option value="low">Low confidence</option>
            </select>
          </div>
        )}

        {/* Fields grid — hidden when action = skip */}
        {form._importAction!=="skip"&&(
          <>
            <div style={{fontSize:11,fontWeight:700,color:"#555",letterSpacing:1.2,marginBottom:10}}>FIELD VALUES</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
              {cfg.fields}
            </div>
          </>
        )}

        {/* Actions */}
        <div style={{display:"flex",gap:10,paddingTop:12,borderTop:"1px solid #1a1a2a"}}>
          <button className="btn btn-primary" style={{flex:1}}
            onClick={()=>{
              // If action=skip, mark it and deselect
              if(form._importAction==="skip"){
                onSave({...form, _skip:true});
              } else if(form._importAction==="update"&&!form._matchId){
                alert("Please select an existing entry to update, or choose a different action.");
                return;
              } else {
                onSave(form);
              }
            }}>
            {form._importAction==="skip"?"⏭ Confirm Skip":"✓ Save Changes"}
          </button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function ConfTag({c}){
  const map={high:{cls:"badge-green",label:"High confidence"},medium:{cls:"badge-yellow",label:"Medium"},low:{cls:"badge-red",label:"Low confidence"}};
  const m=map[c]||map.medium;
  return <span className={`tag ${m.cls}`} style={{fontSize:9,marginTop:2}}>{m.label}</span>;
}
