// ── SMART RECONCILE ENGINE ────────────────────────────────────────────────────
// Matches imported items against existing ones to detect updates vs new entries.

function similarityScore(a, b) {
  // Compare two names: normalise, tokenise, count common words
  const norm = s => (s||"").toLowerCase().replace(/[^a-z0-9\s]/g," ").trim();
  const tokens = s => new Set(norm(s).split(/\s+/).filter(t=>t.length>2));
  const ta = tokens(a), tb = tokens(b);
  const common = [...ta].filter(t=>tb.has(t)).length;
  const union = new Set([...ta,...tb]).size;
  return union>0 ? common/union : 0;
}

function reconcileItems(incoming, existing, keyFields=[]){
  // Returns array of {action:"update"|"add"|"skip", incoming, existing|null, changes}
  const results = [];
  const usedIds = new Set();

  for(const item of incoming){
    // ── MANUAL OVERRIDE from edit modal ──────────────────────────────────────
    if(item._importAction === "new"){
      results.push({action:"add", incoming:item, existing:null, changes:[], score:0, _manualAction:true});
      continue;
    }
    if(item._importAction === "update" && item._matchId){
      const forcedMatch = existing.find(e=>e.id===item._matchId);
      if(forcedMatch){
        const changes = [];
        const compareField = (label, ik) => {
          const iv = item[ik], ev = forcedMatch[ik];
          if(iv==null || iv==="" || iv===0) return;
          if(iv!==ev) changes.push({label, old:ev, new_:iv, key:ik});
        };
        ["value","qty","buyPrice","units","nav","invested","premium","cover","amount","intRate","matDate","sipAmt"].forEach(k=>compareField(k,k));
        usedIds.add(forcedMatch.id);
        results.push({action:changes.length>0?"update":"unchanged", incoming:item, existing:forcedMatch, changes, score:1.0, _manualAction:true});
        continue;
      }
    }
    // ── AUTO MATCH ────────────────────────────────────────────────────────────
    let bestMatch = null, bestScore = 0;

    for(const ex of existing){
      if(usedIds.has(ex.id)) continue;
      let score = 0;

      // Hard match: ISIN, policyNo, acNo, folio — these are definitive
      if(item.isin && ex.isin && item.isin===ex.isin){ score=1.0; }
      else if(item.policyNo && ex.policyNo && item.policyNo===ex.policyNo){ score=1.0; }
      else if(item.acNo && ex.acNo && item.acNo===ex.acNo){ score=1.0; }
      else if(item.folio && ex.folio && item.folio===ex.folio){ score=1.0; }
      else if(item.ticker && ex.ticker && item.ticker===ex.ticker){ score=0.95; }
      else {
        // Name similarity
        score = similarityScore(item.name, ex.name);
        // Boost if category matches
        const catField = item.category||item.type||item.source;
        const exCat = ex.category||ex.type||ex.source;
        if(catField && exCat && catField===exCat) score += 0.1;
      }

      if(score > bestScore){ bestScore=score; bestMatch=ex; }
    }

    if(bestScore >= 0.65 && bestMatch){
      // Found a likely match — compute what changed
      const changes = [];
      const numFmt = v => v!=null ? Number(v).toLocaleString("en-IN") : "—";
      const compareField = (label, ik, ek) => {
        const iv = item[ik], ev = bestMatch[ek||ik];
        // Skip if incoming is null/empty/zero — don't overwrite real data with zeros
        if(iv==null || iv==="" || iv===0) return;
        if(iv!==ev){
          changes.push({label, old: ev, new_: iv, key: ik});
        }
      };
      compareField("Value", "value");
      compareField("Qty", "qty");
      compareField("Buy Price", "buyPrice");
      compareField("Units", "units");
      compareField("NAV", "nav");
      compareField("Invested", "invested");
      compareField("Outstanding", "value");
      compareField("Premium", "premium");
      compareField("Cover", "cover");
      compareField("Amount", "amount");
      compareField("Interest Rate", "intRate");
      compareField("Maturity", "matDate");
      compareField("SIP", "sipAmt");
      usedIds.add(bestMatch.id);
      results.push({action: changes.length>0?"update":"unchanged", incoming:item, existing:bestMatch, changes, score:bestScore});
    } else {
      results.push({action:"add", incoming:item, existing:null, changes:[], score:bestScore});
    }
  }
  return results;
}

// Smart Reconcile Review Modal
function ReconcileModal({results, dataKey, onApply, onClose}){
  const [sel, setSel] = useState(()=>{
    const s={};
    results.forEach((r,i)=>{
      if(r.action==="update"||r.action==="add") s[i]=true;
      else s[i]=false; // unchanged → skip by default
    });
    return s;
  });
  const [fieldSel, setFieldSel] = useState(()=>{
    // For updates, track which specific field changes to apply
    const fs={};
    results.forEach((r,i)=>{
      if(r.action==="update"){
        fs[i]={};
        r.changes.forEach(c=>{ fs[i][c.key]=true; });
      }
    });
    return fs;
  });

  const SECTION_META = {
    assets:      {label:"Asset",      color:"#4ade80", ic:"📈"},
    liabilities: {label:"Liability",  color:"#f87171", ic:"🏦"},
    income:      {label:"Income",     color:"#60a5fa", ic:"💰"},
    expenses:    {label:"Expense",    color:"#fbbf24", ic:"💸"},
    insurance:   {label:"Insurance",  color:"#a78bfa", ic:"🛡️"},
  };

  const fmtV = v => v==null||v===""?"—": typeof v==="number"? v>999?`₹${Number(v).toLocaleString("en-IN")}`:v : String(v);

  const updCount = results.filter((r,i)=>r.action==="update"&&sel[i]).length;
  const addCount = results.filter((r,i)=>r.action==="add"&&sel[i]).length;
  const skipCount = results.filter((r,i)=>!sel[i]).length;

  const apply = () => {
    const updates=[]; const additions=[];
    results.forEach((r,i)=>{
      if(!sel[i]) return;
      if(r.action==="update"){
        // Start from existing record (has the real stored id), then apply selected field changes
        const patch={...r.existing, _section: r._section || r.incoming._section};
        (r.changes||[]).forEach(c=>{ if(fieldSel[i]?.[c.key]!==false) patch[c.key]=r.incoming[c.key]; });
        patch.date=today();
        updates.push(patch);
      } else if(r.action==="add"){
        // Carry _section so applySmartReconcile knows which array to append to
        additions.push({...r.incoming, _section: r._section || r.incoming._section});
      }
    });
    console.log("[ReconcileModal] apply → updates:", updates.length, "additions:", additions.length,
      "sections:", [...new Set([...updates,...additions].map(x=>x._section))]);
    onApply(updates, additions);
  };

  return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#111118",border:"1px solid #2a2a3e",borderRadius:20,padding:"24px 28px",width:"min(700px,96vw)",maxHeight:"88vh",overflowY:"auto"}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>🔄 Smart Import Review</div>
            <div style={{fontSize:12,color:"#555"}}>
              Review each match before committing —
              <span style={{color:"#4ade80",marginLeft:6}}>{updCount} update{updCount!==1?"s":""}</span>
              <span style={{color:"#60a5fa",marginLeft:6}}>{addCount} new</span>
              <span style={{color:"#555",marginLeft:6}}>{skipCount} skip</span>
            </div>
          </div>
          <button style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:20}} onClick={onClose}>×</button>
        </div>

        {/* Legend */}
        <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          {[
            {color:"#1a3a1a",border:"#16a34a",label:"✏️ Update existing entry"},
            {color:"#0a1628",border:"#3b82f6",label:"✨ New entry to add"},
            {color:"#1a1a1a",border:"#2a2a3a",label:"⏭ Unchanged / skip"},
          ].map(l=>(
            <div key={l.label} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#666"}}>
              <div style={{width:12,height:12,borderRadius:3,background:l.color,border:`1px solid ${l.border}`}}/>
              {l.label}
            </div>
          ))}
        </div>

        {/* Results list */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {results.map((r,i)=>{
            const isUpdate = r.action==="update";
            const isAdd    = r.action==="add";
            const isUnchgd = r.action==="unchanged";
            const checked  = !!sel[i];
            const bg       = !checked?"#0e0e16": isUpdate?"#0a1a0a": isAdd?"#080e1a":"#0e0e16";
            const bdr      = !checked?"#1a1a2a": isUpdate?"#16a34a": isAdd?"#3b82f6":"#2a2a3a";

            return(
              <div key={i} style={{background:bg,border:`1px solid ${bdr}`,borderRadius:12,padding:"12px 14px",transition:"all 0.15s"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  {/* Checkbox */}
                  <div onClick={()=>!isUnchgd&&setSel(s=>({...s,[i]:!s[i]}))}
                    style={{width:20,height:20,borderRadius:5,flexShrink:0,marginTop:1,cursor:isUnchgd?"default":"pointer",
                      background:checked?(isUpdate?"#16a34a":isAdd?"#3b82f6":"#333"):"transparent",
                      border:`2px solid ${checked?(isUpdate?"#16a34a":isAdd?"#3b82f6":"#333"):"#333"}`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>
                    {checked&&"✓"}
                  </div>

                  <div style={{flex:1,minWidth:0}}>
                    {/* Action badge + name */}
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:10,
                        background:isUpdate?"#052e16":isAdd?"#0a1628":"#1a1a2a",
                        color:isUpdate?"#4ade80":isAdd?"#60a5fa":"#555"}}>
                        {isUpdate?"✏️ UPDATE":isAdd?"✨ NEW":"⏭ UNCHANGED"}
                      </span>
                      {r.incoming._section&&SECTION_META[r.incoming._section]&&(
                        <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,
                          background:"#1a1a2e",color:SECTION_META[r.incoming._section].color}}>
                          {SECTION_META[r.incoming._section].ic} {SECTION_META[r.incoming._section].label}
                        </span>
                      )}
                      <span style={{fontSize:13,fontWeight:700,color:"#e0e0f0"}}>{r.incoming.name}</span>
                      {r.score>0&&r.score<1&&<span style={{fontSize:10,color:"#444"}}>{Math.round(r.score*100)}% match</span>}
                    </div>

                    {/* Update: show field-by-field diff */}
                    {isUpdate&&r.changes.length>0&&(
                      <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:4}}>
                        <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>Changes to apply:</div>
                        {r.changes.map(c=>(
                          <div key={c.key} style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}>
                            {/* Per-field toggle */}
                            <div onClick={()=>setFieldSel(fs=>({...fs,[i]:{...fs[i],[c.key]:fs[i]?.[c.key]===false}}))}
                              style={{width:16,height:16,borderRadius:3,flexShrink:0,cursor:"pointer",
                                background:fieldSel[i]?.[c.key]===false?"transparent":"#7c3aed",
                                border:"2px solid #7c3aed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>
                              {fieldSel[i]?.[c.key]!==false&&"✓"}
                            </div>
                            <span style={{color:"#888",minWidth:80}}>{c.label}</span>
                            <span style={{color:"#f87171",textDecoration:"line-through",fontFamily:"'DM Mono',monospace"}}>{fmtV(c.old)}</span>
                            <span style={{color:"#555"}}>→</span>
                            <span style={{color:"#4ade80",fontWeight:600,fontFamily:"'DM Mono',monospace"}}>{fmtV(c.new_)}</span>
                          </div>
                        ))}
                        <div style={{fontSize:10,color:"#444",marginTop:4}}>
                          Matched to: <span style={{color:"#666"}}>{r.existing.name}</span>
                        </div>
                      </div>
                    )}

                    {isUpdate&&r.changes.length===0&&(
                      <div style={{fontSize:11,color:"#444"}}>No changes detected vs existing entry "{r.existing.name}"</div>
                    )}

                    {isAdd&&(
                      <div style={{fontSize:11,color:"#555"}}>
                        Will be added as a new entry · Value: <span style={{color:"#60a5fa",fontFamily:"'DM Mono',monospace"}}>{fmtV(r.incoming.value||r.incoming.amount||0)}</span>
                      </div>
                    )}
                  </div>

                  {/* Skip toggle for updates/adds */}
                  {!isUnchgd&&(
                    <button onClick={()=>setSel(s=>({...s,[i]:!s[i]}))}
                      style={{background:"none",border:"1px solid #2a2a3a",borderRadius:6,color:checked?"#555":"#4ade80",cursor:"pointer",fontSize:10,padding:"3px 8px",flexShrink:0,fontFamily:"inherit"}}>
                      {checked?"Skip":"Include"}
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* Action buttons */}
        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-primary" style={{flex:1,padding:11}}
            onClick={apply}
            disabled={updCount+addCount===0}>
            Apply {updCount+addCount} Change{updCount+addCount!==1?"s":""}
            {updCount>0&&` (${updCount} update${updCount!==1?"s":""})`}
            {addCount>0&&` (${addCount} new)`}
          </button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function AssetHoldingCard({asset, onDelete, onEdit, liveQuote, onRefreshSingle, refreshingSingle}){
  const isStock = asset.category==="Stocks";
  const isMF    = asset.category==="Mutual Funds";

  // Cost basis
  const cost = isStock&&asset.buyPrice&&asset.qty ? asset.buyPrice*asset.qty
             : isMF&&asset.invested ? asset.invested
             : null;

  // Current value — prefer live
  const livePrice = liveQuote?.price;
  const liveNav   = liveQuote?.nav;
  const currentVal = isStock&&livePrice&&asset.qty>0 ? livePrice*asset.qty
                   : isMF&&liveNav&&asset.units>0    ? liveNav*asset.units
                   : asset.value;

  // Per-unit cost vs live
  const perUnitCost = isStock&&asset.buyPrice ? asset.buyPrice : isMF&&asset.invested&&asset.units ? asset.invested/asset.units : null;
  const livePerUnit = isStock ? livePrice : isMF ? liveNav : null;

  // P&L (total)
  const pnl    = cost!==null ? currentVal - cost : null;
  const pnlPct = pnl!==null&&cost>0 ? (pnl/cost*100).toFixed(1) : null;

  // Day change
  const prevUnit = liveQuote?.prevClose || liveQuote?.prevNav;
  const dayPnl   = livePerUnit&&prevUnit&&(asset.qty||asset.units)
                 ? (livePerUnit-prevUnit)*(asset.qty||asset.units) : null;
  const dayPct   = livePerUnit&&prevUnit ? ((livePerUnit-prevUnit)/prevUnit*100).toFixed(2) : null;

  const daysTill = asset.matDate ? Math.ceil((new Date(asset.matDate)-new Date())/(86400000)) : null;
  const canRefresh = (isStock&&asset.ticker)||(isMF&&(asset.schemeCode||asset.name));

  return (
    <div className="holding-card" style={{border:liveQuote?"1px solid #1a3a1a":"1px solid #1a1a2a",position:"relative"}}>
      {/* Edit / Delete buttons top-right */}
      <div style={{position:"absolute",top:12,right:12,display:"flex",gap:6,alignItems:"center"}}>
        {liveQuote&&<span style={{fontSize:9,background:"#052e16",color:"#4ade80",padding:"2px 7px",borderRadius:10,fontWeight:700,letterSpacing:.5}}>● LIVE</span>}
        <button onClick={onEdit} title="Edit" style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:6,color:"#888",cursor:"pointer",fontSize:11,padding:"3px 8px"}}>✏️</button>
        <button onClick={onDelete} title="Delete" style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
      </div>

      <div style={{paddingRight:100}}>
        {/* Name + ticker */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
          <div style={{fontSize:13,fontWeight:700}}>{asset.name}</div>
          {asset.ticker&&<span style={{fontSize:10,color:"#a78bfa",fontFamily:"'DM Mono',monospace",background:"#1e1b4b",padding:"1px 7px",borderRadius:4,fontWeight:700}}>{asset.ticker}{isStock?".NS":""}</span>}
          {isMF&&asset.schemeCode&&<span style={{fontSize:10,color:"#555",background:"#1a1a2a",padding:"1px 6px",borderRadius:4}}>#{asset.schemeCode}</span>}
        </div>

        {/* Category tags */}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {asset.broker&&<span className="tag badge-blue" style={{fontSize:10}}>{asset.broker}</span>}
          {asset.bank&&<span className="tag badge-blue" style={{fontSize:10}}>{asset.bank}</span>}
          {asset.exchange&&isStock&&<span className="tag badge-purple" style={{fontSize:10}}>{asset.exchange}</span>}
          {asset.goldType&&<span className="tag badge-yellow" style={{fontSize:10}}>{asset.goldType.split("–")[0].trim()}</span>}
          {asset.fundCat&&<span className="tag badge-purple" style={{fontSize:10}}>{asset.fundCat.split("–")[0].trim()}</span>}
          {asset.acType&&<span className="tag badge-blue" style={{fontSize:10}}>{asset.acType}</span>}
          {asset.intType&&<span className="tag badge-yellow" style={{fontSize:10}}>{asset.intType.split("(")[0].trim()}</span>}
          {asset.scheme&&<span className="tag badge-green" style={{fontSize:10}}>{asset.scheme.split("(")[0].trim()}</span>}
          {!asset.ticker&&isStock&&<span className="tag" style={{fontSize:10,background:"#2d1f00",color:"#f59e0b"}}>⚠ No ticker</span>}
          {isStock&&asset.ticker&&(!asset.qty||asset.qty===0)&&<span className="tag" style={{fontSize:10,background:"#1a1200",color:"#fbbf24"}}>⚠ Add qty & price</span>}
          {isMF&&!asset.schemeCode&&<span className="tag" style={{fontSize:10,background:"#2d1f00",color:"#f59e0b"}}>⚠ No scheme code</span>}
        </div>

        {/* ── VALUE BREAKDOWN ROW ─────────────────────────── */}
        {(isStock||isMF)&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,background:"#080812",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
            {/* Invested / Cost */}
            <div>
              <div style={{fontSize:9,color:"#444",fontWeight:700,letterSpacing:1,marginBottom:3}}>INVESTED</div>
              <div style={{fontSize:13,fontWeight:700,color:"#888",fontFamily:"'DM Mono',monospace"}}>{cost?fmtS(cost):"—"}</div>
              {perUnitCost&&<div style={{fontSize:9,color:"#444",marginTop:2}}>₹{Number(perUnitCost).toLocaleString("en-IN")} {isStock?"/share":"/unit"}</div>}
            </div>
            {/* Current value */}
            <div>
              <div style={{fontSize:9,color:"#444",fontWeight:700,letterSpacing:1,marginBottom:3}}>CURRENT</div>
              <div style={{fontSize:13,fontWeight:800,color:"#4ade80",fontFamily:"'DM Mono',monospace"}}>{fmtS(currentVal)}</div>
              {livePerUnit&&<div style={{fontSize:9,color:"#a78bfa",marginTop:2}}>₹{Number(livePerUnit).toLocaleString("en-IN")} {isStock?"LTP":"NAV"}</div>}
            </div>
            {/* Overall P&L */}
            <div>
              <div style={{fontSize:9,color:"#444",fontWeight:700,letterSpacing:1,marginBottom:3}}>TOTAL P&L</div>
              {pnl!==null
                ?<><div style={{fontSize:13,fontWeight:700,fontFamily:"'DM Mono',monospace"}} className={pnl>=0?"pnl-pos":"pnl-neg"}>{pnl>=0?"+":""}{fmtS(pnl)}</div>
                   <div style={{fontSize:9,fontWeight:700,marginTop:2}} className={pnl>=0?"pnl-pos":"pnl-neg"}>{pnl>=0?"+":""}{pnlPct}%</div></>
                :<div style={{fontSize:13,color:"#444"}}>—</div>}
            </div>
            {/* Day P&L */}
            <div>
              <div style={{fontSize:9,color:"#444",fontWeight:700,letterSpacing:1,marginBottom:3}}>TODAY</div>
              {dayPnl!==null
                ?<><div style={{fontSize:13,fontWeight:700,fontFamily:"'DM Mono',monospace"}} className={dayPnl>=0?"pnl-pos":"pnl-neg"}>{dayPnl>=0?"+":""}{fmtS(dayPnl)}</div>
                   <div style={{fontSize:9,fontWeight:700,marginTop:2}} className={dayPnl>=0?"pnl-pos":"pnl-neg"}>{dayPnl>=0?"+":""}{dayPct}%</div></>
                :<div style={{fontSize:11,color:"#333"}}>— refresh</div>}
            </div>
          </div>
        )}

        {/* Holding details row */}
        <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
          {asset.qty>0&&<div style={{fontSize:11,color:"#666"}}>Qty <span style={{color:"#aaa",fontWeight:600}}>{asset.qty}</span></div>}
          {asset.units>0&&<div style={{fontSize:11,color:"#666"}}>Units <span style={{color:"#aaa",fontWeight:600}}>{parseFloat(asset.units).toFixed(3)}</span></div>}
          {!isStock&&!isMF&&asset.value>0&&<div style={{fontSize:13,fontWeight:800,color:"#4ade80",fontFamily:"'DM Mono',monospace"}}>{fmtS(asset.value)}</div>}
          {asset.intRate>0&&<div style={{fontSize:11,color:"#666"}}>Rate <span style={{color:"#4ade80",fontWeight:600}}>{asset.intRate}%</span></div>}
          {asset.sipAmt>0&&<div style={{fontSize:11,color:"#666"}}>SIP <span style={{color:"#60a5fa",fontWeight:600}}>₹{Number(asset.sipAmt).toLocaleString("en-IN")}/mo</span></div>}
          {asset.rental>0&&<div style={{fontSize:11,color:"#666"}}>Rent <span style={{color:"#4ade80",fontWeight:600}}>₹{Number(asset.rental).toLocaleString("en-IN")}/mo</span></div>}
          {asset.area>0&&<div style={{fontSize:11,color:"#666"}}>Area <span style={{color:"#aaa"}}>{asset.area} sqft</span></div>}
          {asset.folio&&<div style={{fontSize:11,color:"#666"}}>Folio <span style={{color:"#aaa"}}>{asset.folio}</span></div>}
          {asset.acNo&&<div style={{fontSize:11,color:"#666"}}>A/C <span style={{color:"#aaa"}}>{asset.acNo}</span></div>}
          {daysTill!==null&&<div style={{fontSize:11,color:"#666"}}>Matures <span style={{color:daysTill<90?"#f87171":"#fbbf24",fontWeight:600}}>{daysTill<0?"Matured":daysTill+" days"}</span></div>}
          {canRefresh&&<button onClick={onRefreshSingle} disabled={refreshingSingle}
            style={{marginLeft:"auto",background:liveQuote?"#052e16":"#0e0e18",border:`1px solid ${liveQuote?"#16a34a":"#2a2a3a"}`,borderRadius:6,color:liveQuote?"#4ade80":"#666",cursor:"pointer",fontSize:10,padding:"3px 10px",display:"flex",alignItems:"center",gap:4}}>
            <span style={refreshingSingle?{display:"inline-block",animation:"spin 1s linear infinite"}:{}}>{refreshingSingle?"⟳":"⟳"}</span>
            {refreshingSingle?"…":"Refresh"}
          </button>}
        </div>
        {liveQuote?.ts&&<div style={{fontSize:10,color:"#1a4a1a",marginTop:6}}>Live as of {liveQuote.ts}</div>}
        {asset.details&&<div style={{fontSize:11,color:"#3a3a4a",marginTop:4,fontStyle:"italic"}}>{asset.details}</div>}
        {asset.date&&<div style={{fontSize:10,color:"#333",marginTop:6,fontFamily:"'DM Mono',monospace",borderTop:"1px solid #111",paddingTop:5}}>Last updated: {asset.date}</div>}
      </div>
    </div>
  );
}

// ── LIVE PRICE REFRESH PANEL ──────────────────────────────────────────────────
function LivePricePanel({assets, liveData, setLiveData, notify, category, onSavePrices}){
  const [refreshing, setRefreshing] = useState(false);
  const [progress, setProgress] = useState({done:0,total:0});
  const [lastTs, setLastTs] = useState(null);
  const [errors, setErrors] = useState([]);
  const [autoMin, setAutoMin] = useState(0); // 0=off, 15, 30
  const autoRef = useRef(null);

  const isStocks = category==="Stocks";
  const isMF     = category==="Mutual Funds";
  const isCrypto = category==="Crypto";
  if(!isStocks&&!isMF&&!isCrypto) return null;

  const liveKeys  = Object.keys(liveData).filter(id=>assets.some(a=>String(a.id)===id));
  const liveCount = liveKeys.length;
  const liveTotal = assets.reduce((s,a)=>{
    const q=liveData[a.id]; if(!q) return s+(a.value||0);
    if(isStocks&&a.qty>0)   return s+q.price*a.qty;
    if(isMF&&a.units>0)     return s+q.nav*a.units;
    if(isCrypto&&a.qty>0)   return s+q.price*a.qty;
    return s+(a.value||0);
  },0);

  const refreshAll = async()=>{
    if(!assets.length){notify("No holdings to refresh","error");return;}
    setRefreshing(true); setErrors([]);
    const errs=[]; const newData={...liveData};
    for(let i=0;i<assets.length;i++){
      const a=assets[i];
      setProgress({done:i,total:assets.length});
      try{
        if(isStocks){
          if(!a.ticker) throw new Error("no ticker — click ✏️ Edit to add NSE symbol");
          newData[a.id]=await fetchYahooQuote(a.ticker, a.exchange);
        } else if(isMF) {
          let code=a.schemeCode;
          if(!code){const m=await searchMFScheme(a.name);code=m.schemeCode;}
          newData[a.id]=await fetchMFNav(code);
        } else if(isCrypto) {
          const sym=a.ticker||a.symbol||a.name.split(" ")[0];
          newData[a.id]=await fetchCryptoPrice(sym);
        }
      }catch(e){ errs.push(a.name+": "+e.message); }
    }
    setLiveData(newData);
    const ts=new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    setLastTs(ts);
    setProgress({done:assets.length,total:assets.length});
    setErrors(errs);
    setRefreshing(false);
    const ok=assets.length-errs.length;
    if(ok>0) notify(`✓ Updated ${ok} ${isStocks?"price"+(ok>1?"s":""):isCrypto?"crypto price"+(ok>1?"s":""):"NAV"+(ok>1?"s":"")}!`);
    if(errs.length) notify(`⚠ ${errs.length} failed`,"error");
    return newData;
  };

  // Auto-refresh timer
  useEffect(()=>{
    if(autoRef.current) clearInterval(autoRef.current);
    if(autoMin>0){
      autoRef.current=setInterval(()=>refreshAll(),autoMin*60*1000);
    }
    return()=>{ if(autoRef.current) clearInterval(autoRef.current); };
  },[autoMin,assets.length]);

  return(
    <div style={{background:"#071a07",border:"1px solid #1a3a1a",borderRadius:14,padding:16,marginBottom:20}}>
      {/* Header row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:liveCount>0?12:0}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
            <span style={{fontSize:16}}>{isStocks?"📡":isCrypto?"₿":"🔄"}</span>
            <span style={{fontSize:13,fontWeight:700}}>
              {isStocks?"Live Stock Prices (Yahoo Finance / NSE)":isCrypto?"Live Crypto Prices (CoinGecko)":"Live MF NAV (MFAPI.in / AMFI)"}
            </span>
            {liveCount>0&&<span style={{fontSize:10,background:"#052e16",color:"#4ade80",padding:"2px 8px",borderRadius:10,fontWeight:700}}>● {liveCount} live</span>}
          </div>
          <div style={{fontSize:11,color:"#444",lineHeight:1.5}}>
            {isStocks
              ?`${assets.filter(a=>a.ticker).length}/${assets.length} have NSE tickers · Click ✏️ to add/edit`
              :isCrypto
                ?`Uses ticker symbol (BTC, ETH, SOL…) · Click ✏️ to set symbol`
                :`${assets.length} fund${assets.length!==1?"s":""} · Uses scheme code or auto-searches`}
            {lastTs&&<span style={{color:"#1a5a1a",marginLeft:8}}>· Updated {lastTs}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {/* Auto-refresh selector */}
          <select value={autoMin} onChange={e=>setAutoMin(Number(e.target.value))}
            style={{fontSize:11,padding:"4px 8px",background:"#0a0a14",border:"1px solid #2a2a3a",borderRadius:6,color:"#888",fontFamily:"inherit",cursor:"pointer"}}>
            <option value={0}>Manual</option>
            <option value={15}>Auto 15 min</option>
            <option value={30}>Auto 30 min</option>
            <option value={60}>Auto 1 hr</option>
          </select>
          {liveCount>0&&<div style={{fontSize:12,fontWeight:700,color:"#4ade80",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>{fmtS(liveTotal)}<span style={{fontSize:10,color:"#555",fontWeight:400}}> live</span></div>}
          <button className="btn btn-primary" onClick={refreshAll} disabled={refreshing} style={{fontSize:12,padding:"8px 14px",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
            {refreshing
              ?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>{progress.done}/{progress.total}</>
              :<><span>⟳</span>Refresh All</>}
          </button>
          {liveCount>0&&<button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setLiveData({})}>Clear</button>}
        </div>
      </div>

      {/* Live ticker chips */}

            onClick={()=>onSavePrices(liveData)}>

          ⚠ {assets.filter(a=>!a.ticker).length} stock{assets.filter(a=>!a.ticker).length>1?"s":""} missing NSE ticker — click ✏️ Edit to add it
        </div>
      )}
    </div>
  );
}

// ── SHARED: Donut Chart ───────────────────────────────────────────────────────
function DonutChart({segs, size=160, hole=50}){
  const total=segs.reduce((s,d)=>s+(d.value||0),0);
  if(!total) return(
    <div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:4}}>
      <div style={{fontSize:28,opacity:.2}}>◎</div>
      <div style={{fontSize:10,color:"#333"}}>No data</div>
    </div>
  );
  const cx=size/2, cy=size/2, r=size/2-6;
  const toXY=(ang,rad)=>{const a=(ang-90)*Math.PI/180;return[cx+rad*Math.cos(a),cy+rad*Math.sin(a)];};
  let ang=0;
  const paths=segs.filter(s=>s.value>0).map((s,i)=>{
    const sw=Math.min(s.value/total*360,359.99);
    const end=ang+sw;
    const[x1,y1]=toXY(ang,r);const[x2,y2]=toXY(end,r);
    const[x3,y3]=toXY(end,hole);const[x4,y4]=toXY(ang,hole);
    const lg=sw>180?1:0;
    const d=`M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,${lg},1,${x2.toFixed(1)},${y2.toFixed(1)} L${x3.toFixed(1)},${y3.toFixed(1)} A${hole},${hole},0,${lg},0,${x4.toFixed(1)},${y4.toFixed(1)} Z`;
    ang=end;
    return <path key={i} d={d} fill={s.color} stroke="#08080f" strokeWidth="2"/>;
  });
  const n=segs.filter(s=>s.value>0).length;
  return(
    <svg width={size} height={size} style={{flexShrink:0}}>
      {paths}
      <text x={cx} y={cy-5} textAnchor="middle" fill="#d0d0e8" fontSize="15" fontWeight="700" fontFamily="DM Sans,sans-serif">{n}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#444" fontSize="8" fontFamily="DM Sans,sans-serif">TYPES</text>
    </svg>
  );
}

function AssetsTab({data,setData,notify,apiKey,activeMember,setActiveMember}){
  const family=data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];
  const filterItems=items=>activeMember==="all"?items:items.filter(i=>(i.memberId||"self")===activeMember);
  const [formCat,setFormCat]             = useState(null);
  const [showForm,setShowForm]           = useState(false);
  const [editAsset,setEditAsset]         = useState(null);
  const [importPreview,setImportPreview] = useState(null);
  const [reconcileData,setReconcileData] = useState(null);
  const [liveData,setLiveData]           = useState({});
  const [refreshingSingle,setRefreshingSingle] = useState(null);

  const total     = data.assets.reduce((s,a)=>s+(a.value||0),0);
  const liveTotal = data.assets.reduce((s,a)=>{
    const q=liveData[a.id]; if(!q) return s+a.value;
    if(a.category==="Stocks"&&a.qty>0)       return s+q.price*a.qty;
    if(a.category==="Mutual Funds"&&a.units>0) return s+q.nav*a.units;
    return s+a.value;
  },0);
  const hasLive   = Object.keys(liveData).length>0;
  const display   = hasLive?liveTotal:total;
  const visibleAssets = filterItems(data.assets);
  const catTotal  = cat => visibleAssets.filter(a=>a.category===cat).reduce((s,a)=>s+(a.value||0),0);

  const addAsset  = asset => { const mid=activeMember==="all"?"self":activeMember; setData(d=>({...d,assets:[...d.assets,{id:Date.now()+Math.random(),memberId:mid,...asset}]})); setShowForm(false); notify("✓ Asset added"); };
  const delAsset  = id    => { setData(d=>({...d,assets:d.assets.filter(a=>a.id!==id)})); notify("Removed"); };
  const saveEdit  = upd   => { setData(d=>({...d,assets:d.assets.map(a=>a.id===upd.id?{...upd,date:today()}:a)})); setEditAsset(null); notify("✓ Updated"); };
  const openAdd   = cat   => { setFormCat(cat); setShowForm(true); };

  const makeHandleParsed = cat => parsed => {
    const existing = data.assets.filter(a=>!cat||a.category===cat);
    setReconcileData(reconcileItems(parsed,existing)); setImportPreview(parsed);
  };
  const applyReconcile = (updates,additions) => {
    const cleanU=updates.map(({_section,...r})=>r);
    const cleanA=additions.map(({_section,...r})=>({...r,id:Date.now()+Math.random()+Math.random()}));
    setData(d=>{const newA=d.assets.map(a=>{const u=cleanU.find(u=>u.id===a.id);return u?u:a;});return {...d,assets:[...newA,...cleanA]};});
    const msg=[]; if(updates.length) msg.push(`${updates.length} updated`); if(additions.length) msg.push(`${additions.length} added`);
    notify(`✓ ${msg.join(" · ")}`); setReconcileData(null); setImportPreview(null);
  };
  const makeSaveLivePrices = cat => live => {
    const isS=cat==="Stocks", isMF=cat==="Mutual Funds", isCR=cat==="Crypto"; let count=0;
    const newA=data.assets.map(a=>{
      const q=live[a.id]; if(!q||a.category!==cat) return a;
      const v=isS&&a.qty>0?q.price*a.qty:isMF&&a.units>0?q.nav*a.units:isCR&&a.qty>0?q.price*a.qty:a.value;
      count++; return {...a,value:Math.round(v),currentPrice:(isS||isCR)?q.price:a.currentPrice,nav:isMF?q.nav:a.nav,date:today()};
    });
    setData(d=>({...d,assets:newA})); notify(`✓ Saved live prices for ${count} holding${count>1?"s":""}!`);
  };
  const handleRefreshSingle = async asset => {
    setRefreshingSingle(asset.id);
    try{
      let q;
      if(asset.category==="Stocks"){ if(!asset.ticker) throw new Error("No ticker"); q=await fetchYahooQuote(asset.ticker,asset.exchange); }
      else if(asset.category==="Crypto"){ const sym=asset.ticker||asset.symbol||asset.name.split(" ")[0]; q=await fetchCryptoPrice(sym); }
      else { let c=asset.schemeCode; if(!c){const m=await searchMFScheme(asset.name);c=m.schemeCode;} q=await fetchMFNav(c); }
      setLiveData(d=>({...d,[asset.id]:q})); notify(`✓ ${asset.name} updated`);
    }catch(e){notify("Refresh failed: "+e.message,"error");}
    setRefreshingSingle(null);
  };
  const renderCard = a => (
    <AssetHoldingCard key={a.id} asset={a} liveQuote={liveData[a.id]}
      onDelete={()=>delAsset(a.id)} onEdit={()=>setEditAsset(a)}
      onRefreshSingle={()=>handleRefreshSingle(a)} refreshingSingle={refreshingSingle===a.id}/>
  );

  const donutSegs = ASSET_TABS.filter(t=>t.cat&&catTotal(t.cat)>0)
    .map(t=>({label:t.label, value:catTotal(t.cat), color:t.color||"#888", icon:t.icon}));
  const activeCats  = ASSET_TABS.filter(t=>t.cat&&catTotal(t.cat)>0).length;
  const filteredTotal = visibleAssets.reduce((s,a)=>s+(a.value||0),0);

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:700}}>Assets</div>
          <div style={{fontSize:13,color:"#555",marginTop:3}}>
            Net value: <span style={{color:"#4ade80",fontWeight:800,fontSize:17,fontFamily:"'DM Mono',monospace"}}>{fmtS(display)}</span>
            {hasLive&&<span style={{fontSize:10,color:"#1a6a1a",marginLeft:8,background:"#0a1a0a",border:"1px solid #1a3a1a",borderRadius:8,padding:"2px 8px"}}>● LIVE</span>}
          </div>
        </div>
      </div>

      <FamilyMemberBar family={family} active={activeMember} setActive={setActiveMember}/>
      {/* Import/reconcile banners */}
      {importPreview?.length>0&&!reconcileData&&(
        <div style={{background:"#0d1a0d",border:"1px solid #16a34a",borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:700}}>✓ Extracted {importPreview.length} holding{importPreview.length!==1?"s":""}</div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-primary" style={{fontSize:12}} onClick={()=>setReconcileData(reconcileItems(importPreview,data.assets))}>Review & Apply</button>
              <button className="btn btn-ghost"   style={{fontSize:12}} onClick={()=>setImportPreview(null)}>Discard</button>
            </div>
          </div>
          {importPreview.slice(0,4).map((a,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 10px",background:"#111",borderRadius:6,marginBottom:3,fontSize:12}}>
              <span>{a.name}</span><span style={{color:"#4ade80",fontFamily:"'DM Mono',monospace"}}>{fmtS(a.value||0)}</span>
            </div>
          ))}
          {importPreview.length>4&&<div style={{fontSize:11,color:"#555",textAlign:"center",marginTop:4}}>+{importPreview.length-4} more</div>}
        </div>
      )}
      {reconcileData&&<ReconcileModal results={reconcileData} dataKey="assets" onApply={applyReconcile} onClose={()=>{setReconcileData(null);setImportPreview(null);}}/>}

      {/* Donut summary */}
      <TabSummaryCard
        segs={donutSegs} grandTotal={display} legendTitle="ALLOCATION BY CATEGORY"
        stats={[
          {value:activeCats,   label:"CATEGORIES", color:"#4ade80"},
          {value:data.assets.length, label:"HOLDINGS",   color:"#a78bfa"},
        ]}
      />

      {/* Category accordions */}
      {ASSET_TABS.filter(t=>t.cat).map(t=>{
        const items = visibleAssets.filter(a=>a.category===t.cat);
        const isLive = t.cat==="Stocks"||t.cat==="Mutual Funds"||t.cat==="Crypto";
        const extra=(
          <div>
            {isLive&&<LivePricePanel assets={items} liveData={liveData} setLiveData={setLiveData} notify={notify} category={t.cat} onSavePrices={makeSaveLivePrices(t.cat)}/>}
            <div style={{marginBottom:8}}>
              <AssetUploadZone cat={t.cat} onParsed={makeHandleParsed(t.cat)} notify={notify} apiKey={apiKey}/>
            </div>
          </div>
        );
        return(
          <CatRow key={t.id} tab={t} items={items} grandTotal={display}
            renderItem={renderCard} onAdd={openAdd} extra={extra}/>
        );
      })}

      {data.assets.length===0&&(
        <div style={{textAlign:"center",padding:"48px 20px",color:"#333"}}>
          <div style={{fontSize:52,marginBottom:12}}>🏦</div>
          <div style={{fontSize:16,fontWeight:600,color:"#444",marginBottom:6}}>No assets yet</div>
          <div style={{fontSize:13,color:"#333"}}>Tap any category above to expand it and add your first holding</div>
        </div>
      )}

      {showForm&&formCat&&<AssetForm cat={formCat} onSave={addAsset} onClose={()=>{setShowForm(false);setFormCat(null);}}/>}
      {editAsset&&<QuickEditModal asset={editAsset} onSave={saveEdit} onClose={()=>setEditAsset(null)}/>}
    </div>
  );
}

function LiabForm({cat, onSave, onClose, initial}){
  const schema  = LIAB_SCHEMA[cat] || LIAB_SCHEMA["Other Debt"];
  const init    = initial ? {...initial} : schema.reduce((o,f)=>({...o,[f.k]:""}),{category:cat});
  const [form,setForm] = useState(init);
  const isEdit  = !!initial;
  const save = () => {
    if(schema.filter(f=>f.req).some(f=>!form[f.k])){ alert("Fill required fields"); return; }
    onSave({...form, category:cat, value:parseFloat(form.value)||0,
      origAmt:parseFloat(form.origAmt)||undefined, emi:parseFloat(form.emi)||undefined,
      intRate:parseFloat(form.intRate)||undefined, creditLim:parseFloat(form.creditLim)||undefined,
      annualFee:parseFloat(form.annualFee)||undefined, months:parseFloat(form.months)||undefined,
      date:today()});
  };
  return (
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal modal-wide" onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:700}}>{isEdit?"✏️ Edit":"Add"} {cat}</div>
          <span style={{fontSize:11,color:"#555",marginLeft:"auto",background:"#1a1a2a",padding:"3px 10px",borderRadius:20}}>* required</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {schema.map(f=>(
            <div key={f.k} style={{gridColumn:f.k==="details"||f.k==="property"||f.k==="address"?"1 / -1":"auto"}}>
              <div style={{fontSize:10,color:f.req?"#a78bfa":"#555",marginBottom:5,fontWeight:700,letterSpacing:1}}>{f.l}{f.req&&" *"}</div>
              {f.type==="select"
                ?<select className="input" value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}><option value="">Select…</option>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
                :<input className="input" type={f.type||"text"} value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})} placeholder={f.ph||""}/>}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save}>{isEdit?"Save Changes":"Add "+cat}</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function LiabUploadZone({cat, onParsed, notify, apiKey}){
  const [busy,setBusy]=useState(false); const fileRef=useRef();
  const process = async(file)=>{
    if(!apiKey){notify("Add Claude API key in Profile for AI import","error");return;}
    setBusy(true);
    try{
      let part;
      if(file.type.includes("pdf")){const b64=await new Promise((r,rj)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.onerror=rj;rd.readAsDataURL(file);});part={type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}};}
      else if(file.type.includes("image")){const b64=await new Promise((r,rj)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.onerror=rj;rd.readAsDataURL(file);});part={type:"image",source:{type:"base64",media_type:file.type.includes("png")?"image/png":"image/jpeg",data:b64}};}
      else{const txt=await new Promise((r,rj)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=rj;rd.readAsText(file);});part={type:"text",text:txt.slice(0,60000)};}
      const prompt = `Extract all ${cat} details from this document. Return ONLY a JSON array: [{"name":"","value":0,"lender":"","emi":0,"intRate":0,"origAmt":0,"startDate":"","endDate":"","details":""}]. All amounts as plain numbers.`;
      const mediaParts = part.type!=="text" ? [part] : [];
      const textPart   = part.type==="text"  ? part.text : "";
      const aiResult = await callAI(apiKey, textPart ? textPart+"\n\n"+prompt : prompt, mediaParts);
      const raw=aiResult.text;
      const s=raw.indexOf("["),e=raw.lastIndexOf("]");
      if(s===-1)throw new Error("No data found");
      const parsed=JSON.parse(raw.slice(s,e+1));
      onParsed(parsed.map(p=>({...p,id:Date.now()+Math.random(),category:cat,date:today()})));
      notify(`✓ Extracted ${parsed.length} item${parsed.length!==1?"s":""}!`);
    }catch(e){notify("Import failed: "+e.message,"error");}
    setBusy(false);
  };
  return <div className="mini-upload" onClick={()=>!busy&&fileRef.current.click()} style={{opacity:busy?0.6:1}}>
    <input ref={fileRef} type="file" accept=".pdf,.csv,.jpg,.jpeg,.png" onChange={e=>process(e.target.files[0])} style={{display:"none"}}/>
    {busy?<div style={{fontSize:12,color:"#a78bfa"}} className="pulse">⟳ AI reading…</div>:<><div style={{fontSize:20,marginBottom:4}}>📤</div><div style={{fontSize:12,fontWeight:600,color:"#888"}}>Upload Statement</div><div style={{fontSize:11,color:"#444",marginTop:4}}>{LIAB_UPLOAD_HINTS[cat]||"Upload PDF or CSV"}</div></>}
  </div>;
}

function LiabilitiesTab({data,setData,notify,apiKey,activeMember,setActiveMember}){
  const family=data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];
  const filterItems=items=>activeMember==="all"?items:items.filter(i=>(i.memberId||"self")===activeMember);
  const [formCat,setFormCat]             = useState(null);
  const [showForm,setShowForm]           = useState(false);
  const [editItem,setEditItem]           = useState(null);
  const [preview,setPreview]             = useState(null);
  const [reconcileData,setReconcileData] = useState(null);

  const visibleLiab = filterItems(data.liabilities);
  const total    = visibleLiab.reduce((s,l)=>s+(l.value||0),0);
  const catTotal = cat => visibleLiab.filter(l=>l.category===cat).reduce((s,l)=>s+(l.value||0),0);
  const add      = item => { const mid=activeMember==="all"?"self":activeMember; setData(d=>({...d,liabilities:[...d.liabilities,{id:Date.now()+Math.random(),memberId:mid,...item}]})); setShowForm(false); notify("✓ Liability added"); };
  const saveEdit = item => { setData(d=>({...d,liabilities:d.liabilities.map(l=>l.id===item.id?item:l)})); setEditItem(null); notify("✓ Updated"); };
  const del      = id   => { setData(d=>({...d,liabilities:d.liabilities.filter(l=>l.id!==id)})); notify("Removed"); };
  const openAdd  = cat  => { setFormCat(cat); setShowForm(true); };

  const makeHandleParsed = cat => parsed => {
    const existing=data.liabilities.filter(l=>!cat||l.category===cat);
    setReconcileData(reconcileItems(parsed,existing)); setPreview(parsed);
  };
  const applyReconcile = (updates,additions) => {
    const cleanU=updates.map(({_section,...r})=>r);
    const cleanA=additions.map(({_section,...r})=>({...r,id:Date.now()+Math.random()+Math.random()}));
    setData(d=>{const newL=d.liabilities.map(l=>{const u=cleanU.find(u=>u.id===l.id);return u?u:l;});return{...d,liabilities:[...newL,...cleanA]};});
    const msg=[]; if(updates.length) msg.push(`${updates.length} updated`); if(additions.length) msg.push(`${additions.length} added`);
    notify(`✓ ${msg.join(" · ")}`); setReconcileData(null); setPreview(null);
  };

  const donutSegs = LIAB_TABS.filter(t=>t.cat&&catTotal(t.cat)>0)
    .map(t=>({label:t.label, value:catTotal(t.cat), color:t.color||"#f87171", icon:t.icon}));

  const totalEMI = visibleLiab.filter(l=>l.emi).reduce((s,l)=>s+(l.emi||0),0);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:700}}>Liabilities</div>
          <div style={{fontSize:13,color:"#555",marginTop:3}}>
            Total debt: <span style={{color:"#f87171",fontWeight:800,fontSize:17,fontFamily:"'DM Mono',monospace"}}>{fmtS(total)}</span>
            {totalEMI>0&&<><span style={{color:"#555",margin:"0 6px"}}>·</span><span style={{color:"#fbbf24",fontWeight:600}}>EMIs: {fmtS(totalEMI)}/mo</span></>}
          </div>
        </div>
      </div>

      {preview?.length>0&&!reconcileData&&(
        <div style={{background:"#1a0a0a",border:"1px solid #ef4444",borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:700}}>⚠ Review {preview.length} extracted items</div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-primary" style={{fontSize:12}} onClick={()=>setReconcileData(reconcileItems(preview,data.liabilities))}>Review & Apply</button>
              <button className="btn btn-ghost"   style={{fontSize:12}} onClick={()=>setPreview(null)}>Discard</button>
            </div>
          </div>
          {preview.slice(0,4).map((a,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 10px",background:"#111",borderRadius:6,marginBottom:3,fontSize:12}}><span>{a.name}</span><span style={{color:"#f87171",fontFamily:"'DM Mono',monospace"}}>{fmtS(a.value||0)}</span></div>)}
        </div>
      )}
      <FamilyMemberBar family={family} active={activeMember} setActive={setActiveMember}/>
      {reconcileData&&<ReconcileModal results={reconcileData} dataKey="liabilities" onApply={applyReconcile} onClose={()=>{setReconcileData(null);setPreview(null);}}/>}

      <TabSummaryCard
        segs={donutSegs} grandTotal={total} legendTitle="DEBT BY TYPE"
        stats={[
          {value:donutSegs.length,           label:"DEBT TYPES", color:"#f87171"},
          {value:data.liabilities.length,    label:"ACCOUNTS",   color:"#fbbf24"},
        ]}
      />

      {LIAB_TABS.filter(t=>t.cat).map(t=>{
        const items = visibleLiab.filter(l=>l.category===t.cat);
        const extra = <div style={{marginBottom:8}}><LiabUploadZone cat={t.cat} onParsed={makeHandleParsed(t.cat)} notify={notify} apiKey={apiKey}/></div>;
        return(
          <CatRow key={t.id} tab={t} items={items} grandTotal={total}
            renderItem={item=><LiabCard key={item.id} item={item} onDelete={()=>del(item.id)} onEdit={()=>setEditItem(item)}/>}
            onAdd={openAdd} extra={extra}/>
        );
      })}

      {data.liabilities.length===0&&(
        <div style={{textAlign:"center",padding:"48px 20px",color:"#333"}}>
          <div style={{fontSize:52,marginBottom:12}}>🏦</div>
          <div style={{fontSize:16,fontWeight:600,color:"#444",marginBottom:6}}>No liabilities yet</div>
          <div style={{fontSize:13,color:"#333"}}>Expand a category above to add your loans and debts</div>
        </div>
      )}

      {showForm&&formCat&&<LiabForm cat={formCat} onSave={add} onClose={()=>{setShowForm(false);setFormCat(null);}}/>}
      {editItem&&<LiabForm cat={editItem.category} initial={editItem} onSave={item=>saveEdit({...editItem,...item,id:editItem.id})} onClose={()=>setEditItem(null)}/>}
    </div>
  );
}

function InsForm({cat,onSave,onClose,initial}){
  const schema=INS_SCHEMA[cat]||INS_SCHEMA["Other Insurance"];
  const init=initial
    ? {...initial}
    : schema.reduce((o,f)=>({...o,[f.k]:""}),{type:cat});
  const [form,setForm]=useState(init);
  const isEdit=!!initial;
  const save=()=>{
    if(schema.filter(f=>f.req).some(f=>!form[f.k])){alert("Fill required fields");return;}
    onSave({...form,type:cat,cover:parseFloat(form.cover)||0,premium:parseFloat(form.premium)||0,
      fundValue:parseFloat(form.fundValue)||undefined,sumBonus:parseFloat(form.sumBonus)||undefined,
      status:form.status||"Active",date:today()});
  };
  return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal modal-wide" onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>{isEdit?"✏️ Edit":"Add"} {cat} Policy</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {schema.map(f=>(
            <div key={f.k} style={{gridColumn:f.k==="details"||f.k==="riders"||f.k==="members"?"1 / -1":"auto"}}>
              <div style={{fontSize:10,color:f.req?"#a78bfa":"#555",marginBottom:5,fontWeight:700,letterSpacing:1}}>{f.l}{f.req&&" *"}</div>
              {f.type==="select"
                ?<select className="input" value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}>
                  <option value="">Select…</option>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
                :<input className="input" type={f.type||"text"} value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})} placeholder={f.ph||""}/>
              }
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save}>{isEdit?"Save Changes":"Add Policy"}</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── Policy Document Repository Modal ─────────────────────────────────────────
function PolicyDocsModal({item, onSave, onClose}){
  const [docs, setDocs]       = useState(item.docs||[]);
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef();

  const ACCEPT = ".pdf,.jpg,.jpeg,.png,.webp,.xlsx,.xls,.doc,.docx";

  const handleFiles = async(files)=>{
    setUploading(true);
    const newDocs=[...docs];
    for(const f of Array.from(files)){
      const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});
      newDocs.push({id:Date.now()+Math.random(),name:f.name,type:f.type||"application/octet-stream",data:b64,size:f.size,uploadedAt:today()});
    }
    setDocs(newDocs);
    setUploading(false);
  };

  const removeDoc = id => setDocs(d=>d.filter(x=>x.id!==id));

  const downloadDoc = doc => {
    const a=document.createElement("a");
    a.href=doc.data;
    a.download=doc.name;
    a.click();
  };

  const printDoc = doc => {
    const win=window.open("","_blank");
    if(!win) return;
    if(doc.type.includes("image")){
      win.document.write(`<html><body style="margin:0"><img src="${doc.data}" style="max-width:100%;display:block"/></body></html>`);
      win.document.close();
      win.onload=()=>{win.print();};
    } else if(doc.type.includes("pdf")){
      win.document.write(`<html><body style="margin:0"><embed src="${doc.data}" type="application/pdf" width="100%" height="100%"/></body></html>`);
      win.document.close();
      setTimeout(()=>win.print(),800);
    } else {
      alert("Print is supported for PDF and image files. For Excel/Word, please download and open in the respective app.");
      win.close();
    }
  };

  const getIcon = doc => {
    if(doc.type.includes("pdf"))   return "📄";
    if(doc.type.includes("image")) return "🖼";
    if(doc.name.match(/\.xlsx?$/i)) return "📊";
    if(doc.name.match(/\.docx?$/i)) return "📝";
    return "📎";
  };

  const fmtSize = b => b>1048576?(b/1048576).toFixed(1)+" MB":(b/1024).toFixed(0)+" KB";

  const canPrint = doc => doc.type.includes("pdf")||doc.type.includes("image");

  return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal modal-wide" onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{maxHeight:"88vh",overflowY:"auto"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:20}}>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700}}>📁 Policy Document Repository</div>
            <div style={{fontSize:12,color:"#555",marginTop:3}}>{item.name} · {item.insurer||""}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:20,padding:"0 4px"}}>×</button>
        </div>

        {/* Upload zone */}
        <div
          style={{border:"2px dashed #1e1e38",borderRadius:12,padding:"24px 16px",textAlign:"center",marginBottom:16,cursor:"pointer",background:"#08080f",transition:"border-color .2s"}}
          onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#7c3aed";}}
          onDragLeave={e=>{e.currentTarget.style.borderColor="#1e1e38";}}
          onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#1e1e38";handleFiles(e.dataTransfer.files);}}
          onClick={()=>fileRef.current?.click()}
        >
          <input ref={fileRef} type="file" multiple accept={ACCEPT} style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
          <div style={{fontSize:32,marginBottom:8}}>📎</div>
          <div style={{fontSize:13,fontWeight:600,color:"#888",marginBottom:6}}>Drop files here or click to attach</div>
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
            {[{ext:"PDF",c:"#f87171"},{ext:"JPG/PNG",c:"#fbbf24"},{ext:"XLSX",c:"#4ade80"},{ext:"DOCX",c:"#60a5fa"}].map(t=>(
              <span key={t.ext} style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,background:`${t.c}18`,color:t.c,border:`1px solid ${t.c}33`}}>{t.ext}</span>
            ))}
          </div>
          {uploading&&<div style={{fontSize:12,color:"#7c3aed",marginTop:8}}>Reading files…</div>}
        </div>

        {/* Documents list */}
        {docs.length===0
          ?<div style={{textAlign:"center",padding:"28px 0",color:"#2a2a3a",fontSize:13}}>No documents attached yet</div>
          :<div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,color:"#333",textTransform:"uppercase",marginBottom:10}}>ATTACHED DOCUMENTS ({docs.length})</div>
            {docs.map(doc=>(
              <div key={doc.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#0c0c18",border:"1px solid #111",borderRadius:10,marginBottom:6}}>
                <div style={{fontSize:28,flexShrink:0}}>{getIcon(doc)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#ccc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.name}</div>
                  <div style={{fontSize:11,color:"#444",marginTop:2}}>{fmtSize(doc.size)} · Added {doc.uploadedAt}</div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button onClick={()=>downloadDoc(doc)}
                    style={{padding:"6px 12px",background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:7,color:"#7c3aed",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                    ⬇ Download
                  </button>
                  {canPrint(doc)&&(
                    <button onClick={()=>printDoc(doc)}
                      style={{padding:"6px 12px",background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:7,color:"#60a5fa",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                      🖨 Print
                    </button>
                  )}
                  <button onClick={()=>removeDoc(doc.id)}
                    style={{padding:"6px 10px",background:"none",border:"1px solid #2a1a1a",borderRadius:7,color:"#555",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
                    ×
                  </button>
                </div>
              </div>
            ))}
          </div>
        }

        {/* Storage note */}
        <div style={{fontSize:10,color:"#252535",marginTop:10,textAlign:"center",lineHeight:1.6}}>
          Documents are stored locally in your browser. Export a backup from Cloud Sync to preserve them.
        </div>

        {/* Footer */}
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={()=>onSave(docs)}>
            Save ({docs.length} document{docs.length!==1?"s":""})
          </button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function InsuranceTab({data,setData,notify,apiKey,activeMember,setActiveMember}){
  const family=data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];
  const filterItems=items=>activeMember==="all"?items:items.filter(i=>(i.memberId||"self")===activeMember);
  const [formCat,setFormCat]   = useState(null);
  const [showForm,setShowForm] = useState(false);
  const [editItem,setEditItem] = useState(null);
  const [docsItem,setDocsItem] = useState(null);

  const visibleIns   = filterItems(data.insurance);
  const totalCover   = visibleIns.reduce((s,i)=>s+(i.cover||0),0);
  const totalPremium = visibleIns.reduce((s,i)=>s+(i.frequency==="Monthly"?i.premium*12:i.premium||0),0);
  const catCover     = cat => visibleIns.filter(i=>i.type===cat).reduce((s,p)=>s+(p.cover||0),0);

  const add     = item => { const mid=activeMember==="all"?"self":activeMember; setData(d=>({...d,insurance:[...d.insurance,{id:Date.now()+Math.random(),memberId:mid,...item}]})); setShowForm(false); notify("✓ Policy added"); };
  const saveEdit= item => { setData(d=>({...d,insurance:d.insurance.map(i=>i.id===item.id?item:i)})); setEditItem(null); notify("✓ Policy updated"); };
  const del     = id   => { setData(d=>({...d,insurance:d.insurance.filter(i=>i.id!==id)})); notify("Removed"); };
  const openAdd = cat  => { setFormCat(cat); setShowForm(true); };

  const saveDocs = (id, docs) => {
    setData(d=>({...d,insurance:d.insurance.map(i=>i.id===id?{...i,docs}:i)}));
    setDocsItem(null);
    notify(`✓ ${docs.length} document${docs.length!==1?"s":""} saved`);
  };

  const expiringSoon = visibleIns.filter(p=>p.maturity&&Math.ceil((new Date(p.maturity)-new Date())/86400000)<=30&&Math.ceil((new Date(p.maturity)-new Date())/86400000)>=0);
  const donutSegs = INS_TABS.filter(t=>t.cat&&catCover(t.cat)>0)
    .map(t=>({label:t.label, value:catCover(t.cat), color:t.color||"#4ade80", icon:t.icon}));
  const activePolicies = visibleIns.filter(i=>i.status==="Active"||!i.status).length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:700}}>Insurance</div>
          <div style={{fontSize:13,color:"#555",marginTop:3}}>
            Cover: <span style={{color:"#4ade80",fontWeight:800,fontSize:16,fontFamily:"'DM Mono',monospace"}}>{fmtS(totalCover)}</span>
            <span style={{color:"#555",margin:"0 6px"}}>·</span>
            Annual premium: <span style={{color:"#a78bfa",fontWeight:700}}>{fmtS(totalPremium)}</span>
          </div>
        </div>
      </div>

      {expiringSoon.length>0&&(
        <div style={{background:"#2d1f0a",border:"1px solid #d97706",borderRadius:12,padding:"12px 16px",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:4}}>⚠ {expiringSoon.length} polic{expiringSoon.length===1?"y":"ies"} expiring within 30 days!</div>
          {expiringSoon.map(p=><div key={p.id} style={{fontSize:12,color:"#888"}}>{p.name} — expires {p.maturity}</div>)}
        </div>
      )}

      <TabSummaryCard
        segs={donutSegs} grandTotal={totalCover} legendTitle="COVER BY POLICY TYPE"
        stats={[
          {value:activePolicies,        label:"ACTIVE", color:"#4ade80"},
          {value:data.insurance.length, label:"TOTAL",  color:"#a78bfa"},
        ]}
      />

      <FamilyMemberBar family={family} active={activeMember} setActive={setActiveMember}/>
      {INS_TABS.filter(t=>t.cat).map(t=>{
        const items = visibleIns.filter(i=>i.type===t.cat);
        return(
          <CatRow key={t.id} tab={t} items={items} grandTotal={totalCover}
            renderItem={item=>(
              <InsCard key={item.id} item={item}
                onDelete={()=>del(item.id)}
                onEdit={()=>setEditItem(item)}
                onDocs={()=>setDocsItem(item)}
              />
            )}
            onAdd={openAdd}/>
        );
      })}

      {data.insurance.length===0&&(
        <div style={{textAlign:"center",padding:"48px 20px",color:"#333"}}>
          <div style={{fontSize:52,marginBottom:12}}>🛡</div>
          <div style={{fontSize:16,fontWeight:600,color:"#444",marginBottom:6}}>No insurance policies yet</div>
          <div style={{fontSize:13,color:"#333"}}>Expand a category above to add your policies</div>
        </div>
      )}

      {showForm&&formCat&&<InsForm cat={formCat} onSave={add} onClose={()=>{setShowForm(false);setFormCat(null);}}/>}
      {editItem&&<InsForm cat={editItem.type} initial={editItem} onSave={item=>saveEdit({...editItem,...item,id:editItem.id})} onClose={()=>setEditItem(null)}/>}
      {docsItem&&<PolicyDocsModal item={docsItem} onSave={docs=>saveDocs(docsItem.id,docs)} onClose={()=>setDocsItem(null)}/>}
    </div>
  );
}

function IncForm({cat, onSave, onClose, initial}){
  const schema = INC_SCHEMA[cat]||INC_SCHEMA["Other Income"];
  const init = initial
    ? {...initial}
    : {...schema.reduce((o,f)=>({...o,[f.k]:""}),{}), source:cat, date:today(), frequency:"Monthly"};
  const [form,setForm] = useState(init);
  const isEdit = !!initial;
  const justFocused = useRef(false);

  const Field = ({f}) => {
    const isNum = f.type==="number";
    return (
      <div style={{gridColumn:f.k==="details"?"1/-1":"auto"}}>
        <div style={{fontSize:10,color:f.req?"#a78bfa":"#555",marginBottom:5,fontWeight:700,letterSpacing:1}}>{f.l}{f.req&&" *"}</div>
        {f.type==="select"
          ? <select className="input" value={form[f.k]||""} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))}>
              <option value="">Select…</option>
              {f.opts.map(o=><option key={o} value={o}>{o}</option>)}
            </select>
          : <input className="input"
              type={isNum?"text":f.type||"text"}
              inputMode={isNum?"decimal":undefined}
              value={form[f.k]||""}
              onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))}
              onMouseDown={()=>{if(isNum)justFocused.current=true;}}
              onFocus={e=>{if(isNum&&justFocused.current){e.target.select();justFocused.current=false;}}}
              placeholder={f.ph||""}/>
        }
      </div>
    );
  };

  const save = () => {
    if(schema.filter(f=>f.req).some(f=>!form[f.k])){alert("Fill required fields");return;}
    const nums = ['amount','ctc','bonus','deposit','annualTurnover','basic','hra','pf','yieldPct','intRate','escalation'];
    const out = {...form, source:cat, frequency:form.frequency||"Monthly", date:form.date||today()};
    nums.forEach(k=>{ if(out[k]!==undefined&&out[k]!=="") out[k]=parseFloat(out[k])||0; });
    out.taxable = out.taxable!=="No";
    onSave(out);
  };

  return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal modal-wide" onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:700}}>{isEdit?"✏️ Edit":"+"} {cat} Income</div>
          <button style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:20}} onClick={onClose}>×</button>
        </div>
        {/* Date row always first */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:4}}>
          <div>
            <div style={{fontSize:10,color:"#a78bfa",marginBottom:5,fontWeight:700,letterSpacing:1}}>DATE OF RECEIPT *</div>
            <input className="input" type="date" value={form.date||today()} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#555",marginBottom:5,fontWeight:700,letterSpacing:1}}>FREQUENCY</div>
            <select className="input" value={form.frequency||"Monthly"} onChange={e=>setForm(p=>({...p,frequency:e.target.value}))}>
              {["Monthly","Quarterly","Annual","One-time","Irregular"].map(o=><option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {schema.filter(f=>f.k!=="frequency").map(f=><Field key={f.k} f={f}/>)}
        </div>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save}>{isEdit?"Save Changes":"Add Income"}</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

  const family=data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];
  const filterItems=items=>activeMember==="all"?items:items.filter(i=>(i.memberId||"self")===activeMember);
  const [formCat,setFormCat] = useState(null);
  const [showForm,setShowForm] = useState(false);
  const [editItem,setEditItem] = useState(null);

  const visibleIncome = filterItems(data.income);
  const totalAnnual  = visibleIncome.reduce((s,i)=>s+(i.amount||0),0);
  const totalMonthly = visibleIncome.reduce((s,i)=>{
    if(i.date) return s+(i.amount||0);
    const f=i.frequency||"Monthly";
    return s+(f==="Annual"?i.amount/12:f==="Quarterly"?i.amount/3:f==="One-time"?0:i.amount);
  },0);
  const taxable  = visibleIncome.filter(i=>i.taxable!==false&&i.taxable!=="No").reduce((s,i)=>s+(i.amount||0),0);
  const catTotal = cat => visibleIncome.filter(i=>i.source===cat).reduce((s,i)=>s+(i.amount||0),0);

  const add     = item => { const mid=activeMember==="all"?"self":activeMember; setData(d=>({...d,income:[...d.income,{id:Date.now()+Math.random(),memberId:mid,...item}]})); setShowForm(false); notify("✓ Income added"); };
  const save    = item => { setData(d=>({...d,income:d.income.map(i=>i.id===item.id?item:i)})); setEditItem(null); notify("✓ Updated"); };
  const del     = id   => { setData(d=>({...d,income:d.income.filter(i=>i.id!==id)})); notify("Removed"); };
  const openAdd = cat  => { setFormCat(cat); setShowForm(true); };

  const donutSegs = INC_TABS.filter(t=>t.cat&&catTotal(t.cat)>0)
    .map(t=>({label:t.label, value:catTotal(t.cat), color:t.color||"#4ade80", icon:t.icon}));

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:700}}>Income</div>
          <div style={{fontSize:13,color:"#555",marginTop:3}}>
            Total: <span style={{color:"#4ade80",fontWeight:800,fontSize:17,fontFamily:"'DM Mono',monospace"}}>{fmtS(totalAnnual)}</span>
            <span style={{color:"#555",margin:"0 6px"}}>·</span>
            Monthly est.: <span style={{color:"#60a5fa",fontWeight:600}}>{fmtS(totalMonthly)}</span>
          </div>
        </div>
        <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setTab&&setTab("smartimport")}>🤖 Smart Import</button>
      </div>

      <TabSummaryCard
        segs={donutSegs} grandTotal={totalAnnual} legendTitle="INCOME BY SOURCE"
        stats={[
          {value:fmtS(taxable), label:"TAXABLE",  color:"#fbbf24", big:true},
          {value:visibleIncome.length, label:"ENTRIES", color:"#4ade80"},
        ]}
      />

      <FamilyMemberBar family={family} active={activeMember} setActive={setActiveMember}/>
      {INC_TABS.filter(t=>t.cat).map(t=>{
        const items=[...visibleIncome.filter(i=>i.source===t.cat)].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
        return(
          <CatRow key={t.id} tab={t} items={items} grandTotal={totalAnnual}
            renderItem={item=><IncCard key={item.id} item={item} onEdit={()=>setEditItem(item)} onDelete={()=>del(item.id)}/>}
            onAdd={openAdd}/>
        );
      })}

      {data.income.length===0&&(
        <div style={{textAlign:"center",padding:"48px 20px",color:"#333"}}>
          <div style={{fontSize:52,marginBottom:12}}>💰</div>
          <div style={{fontSize:16,fontWeight:600,color:"#444",marginBottom:6}}>No income entries yet</div>
          <div style={{fontSize:13,color:"#333"}}>Expand a category above to record your income sources</div>
        </div>
      )}

      {showForm&&formCat&&<IncForm cat={formCat} onSave={add} onClose={()=>{setShowForm(false);setFormCat(null);}}/>}
      {editItem&&<IncForm cat={editItem.source} initial={editItem} onSave={save} onClose={()=>setEditItem(null)}/>}
    </div>
  );
}

function ExpForm({cat,onSave,onClose,initial}){
  const schema  = EXP_SCHEMA[cat]||EXP_SCHEMA["Other Expense"];
  const init    = initial ? {...initial} : schema.reduce((o,f)=>({...o,[f.k]:""}),{category:cat});
  const [form,setForm] = useState(init);
  const isEdit  = !!initial;
  const save = () => {
    if(schema.filter(f=>f.req).some(f=>!form[f.k])){alert("Fill required fields");return;}
    onSave({...form,category:cat,amount:parseFloat(form.amount)||0,type:form.type||"Variable",date:form.date||today()});
  };
  return(
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal modal-wide" onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>{isEdit?"✏️ Edit":"Add"} {cat} Expense</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {schema.map(f=>(
            <div key={f.k} style={{gridColumn:f.k==="details"?"1 / -1":"auto"}}>
              <div style={{fontSize:10,color:f.req?"#a78bfa":"#555",marginBottom:5,fontWeight:700,letterSpacing:1}}>{f.l}{f.req&&" *"}</div>
              {f.type==="select"
                ?<select className="input" value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}><option value="">Select…</option>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
                :<input className="input" type={f.type||"text"} value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})} placeholder={f.ph||""}/>}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save}>{isEdit?"Save Changes":"Add Expense"}</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}
