function ExpensesTab({data,setData,notify,activeMember,setActiveMember}){
  const family=data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];
  const filterItems=items=>activeMember==="all"?items:items.filter(i=>(i.memberId||"self")===activeMember);
  const [formCat,setFormCat]       = useState(null);
  const [showForm,setShowForm]     = useState(false);
  const [editItem,setEditItem]     = useState(null);
  const [smsMode,setSmsMode]           = useState(false);
  const [smsText,setSmsText]           = useState("");
  const [smsInputMode,setSmsInputMode] = useState("file"); // "file" | "paste"
  const [smsFileName,setSmsFileName]   = useState("");
  const [smsFileLoading,setSmsFileLoading] = useState(false);
  const smsFileRef = useRef();
  const [smsFromDate,setSmsFromDate]   = useState(()=>{ const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().split("T")[0]; });
  const [smsToDate,setSmsToDate]       = useState(today);
  const [smsParsed,setSmsParsed]       = useState(null);
  const [smsSelected,setSmsSelected]   = useState({});
  const [smsParsing,setSmsParsing]     = useState(false);
  const [showBudgets,setShowBudgets]   = useState(false);
  const [budgetDraft,setBudgetDraft]   = useState(()=>({...(data.budgets||{})}));

  // Parse XML backup (SMS Backup & Restore app format)
  const parseXMLBackup = (xmlText) => {
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, "text/xml");
      const smses = doc.querySelectorAll("sms, mms");
      const lines = [];
      smses.forEach(sms => {
        const body = sms.getAttribute("body") || "";
        const type = sms.getAttribute("type"); // 1=received, 2=sent
        // Only process received SMS (type=1) — bank alerts are always received
        if(type === "1" && body.trim()) lines.push(body.trim());
      });
      return lines.join("\n");
    } catch(e) {
      return "";
    }
  };

  // Parse CSV backup
  const parseCSVBackup = (csvText) => {
    const lines = csvText.split("\n").slice(1); // skip header
    const bodies = [];
    lines.forEach(line => {
      // Common CSV columns: date, address, type, body
      // Try to extract just the body/message column
      const cols = line.match(/("([^"]*)")|([^,]+)/g) || [];
      // Find the longest column — that's usually the SMS body
      const longest = cols.reduce((a,b) => (b.replace(/"/g,"").length > a.length ? b.replace(/"/g,"") : a), "");
      if(longest.length > 20 && /INR|Rs\.|debited|credited/i.test(longest)) bodies.push(longest);
    });
    return bodies.join("\n");
  };

  const handleSMSFile = (file) => {
    if(!file) return;
    setSmsFileLoading(true);
    setSmsFileName(file.name);
    const reader = new FileReader();
    reader.onload = (e) => {
      const content = e.target.result;
      let text = "";
      if(file.name.endsWith(".xml")) {
        text = parseXMLBackup(content);
        if(!text) { notify("Could not parse XML — check it's from SMS Backup & Restore app","error"); setSmsFileLoading(false); return; }
      } else if(file.name.endsWith(".csv")) {
        text = parseCSVBackup(content);
        if(!text) { notify("Could not find bank SMS in CSV file","error"); setSmsFileLoading(false); return; }
      } else {
        // Plain text file
        text = content;
      }
      const lineCount = text.split("\n").filter(l=>l.trim()).length;
      setSmsText(text);
      notify(`✓ Loaded ${lineCount} messages from ${file.name}`);
      setSmsFileLoading(false);
    };
    reader.onerror = () => { notify("Could not read file","error"); setSmsFileLoading(false); };
    reader.readAsText(file);
  };

  const visibleExp = filterItems(data.expenses);
  const total    = visibleExp.reduce((s,e)=>s+(e.frequency==="Annual"?e.amount/12:e.frequency==="Quarterly"?e.amount/3:e.amount||0),0);
  const fixed    = visibleExp.filter(e=>e.type==="Fixed").reduce((s,e)=>s+(e.frequency==="Annual"?e.amount/12:e.amount||0),0);
  const variable = total-fixed;
  const catTotal = cat => visibleExp.filter(e=>e.category===cat).reduce((s,e)=>s+(e.frequency==="Annual"?e.amount/12:e.amount||0),0);

  const add      = item => { const mid=activeMember==="all"?"self":activeMember; setData(d=>({...d,expenses:[...d.expenses,{id:Date.now()+Math.random(),memberId:mid,...item}]})); setShowForm(false); notify("✓ Expense added"); };
  const saveEdit = item => { setData(d=>({...d,expenses:d.expenses.map(e=>e.id===item.id?item:e)})); setEditItem(null); notify("✓ Updated"); };
  const del      = id   => { setData(d=>({...d,expenses:d.expenses.filter(e=>e.id!==id)})); notify("Removed"); };
  const openAdd  = cat  => { setFormCat(cat); setShowForm(true); };
  const saveBudgets = () => {
    const clean={};
    Object.entries(budgetDraft).forEach(([k,v])=>{ const n=parseFloat(v)||0; if(n>0) clean[k]=n; });
    setData(d=>({...d,budgets:clean}));
    setShowBudgets(false);
    notify("✓ Budgets saved");
  };

  // ── Smart SMS Parser ───────────────────────────────────────────────────────
  const MERCHANT_CATS = {
    zomato:"Dining",swiggy:"Dining",dominos:"Dining",mcdonalds:"Dining",kfc:"Dining",starbucks:"Dining",dunzo:"Dining",
    bigbasket:"Groceries",dmart:"Groceries",reliance:"Groceries",blinkit:"Groceries",zepto:"Groceries",jiomart:"Groceries",
    amazon:"Shopping",flipkart:"Shopping",myntra:"Shopping",meesho:"Shopping",ajio:"Shopping",nykaa:"Shopping",
    uber:"Transport",ola:"Transport",rapido:"Transport",petrol:"Transport",fuel:"Transport",irctc:"Transport",
    netflix:"Entertainment",hotstar:"Entertainment",spotify:"Entertainment",youtube:"Entertainment",bookmyshow:"Entertainment",
    hospital:"Medical",pharmacy:"Medical",medplus:"Medical",apollo:"Medical","1mg":"Medical",pharmeasy:"Medical",
    school:"Education",college:"Education",udemy:"Education",coursera:"Education",byjus:"Education",
    lic:"Insurance Premium",hdfc_life:"Insurance Premium",
    emi:"EMI",home_loan:"EMI",car_loan:"EMI",
    sip:"SIP/Investment",mutual:"SIP/Investment",zerodha:"SIP/Investment",groww:"SIP/Investment",kuvera:"SIP/Investment",
    electricity:"Utilities",water:"Utilities",gas:"Utilities",broadband:"Utilities",postpaid:"Utilities",jio:"Utilities",airtel:"Utilities",
  };
  const guessCategory = name => {
    const n=(name||"").toLowerCase().replace(/[\s\-_]/g,"");
    for(const [k,c] of Object.entries(MERCHANT_CATS)) if(n.includes(k)) return c;
    return "Other Expense";
  };
  const parseDate = text => {
    const months={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
    let m;
    if((m=text.match(/(\d{2})[\/\-](\d{2})[\/\-](\d{4})/))) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
    if((m=text.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s*'?(\d{2,4})/i))) return `${m[3].length===2?"20"+m[3]:m[3]}-${months[m[2].toLowerCase().slice(0,3)]}-${m[1].padStart(2,"0")}`;
    if((m=text.match(/(\d{4})[\/\-](\d{2})[\/\-](\d{2})/))) return `${m[1]}-${m[2]}-${m[3]}`;
    if((m=text.match(/(\d{2})[\/\-](\d{2})[\/\-](\d{2})(?!\d)/))) return `20${m[3]}-${m[2]}-${m[1]}`;
    return today();
  };

  const parseSMSRegex = (text, fromD, toD) => {
    const lines=text.split(/\n/).filter(l=>l.trim().length>10);
    const txns=[];
    lines.forEach((line,idx)=>{
      const amtM=line.match(/(?:INR|Rs\.?|₹)\s*([\d,]+(?:\.\d{1,2})?)/i);
      if(!amtM) return;
      const amount=parseFloat(amtM[1].replace(/,/g,""));
      if(!amount||amount<1) return;
      const isDebit =/debited|spent|paid|purchase|withdrawn|debit/i.test(line);
      const isCredit=/credited|received|credit|deposit|refund/i.test(line);
      if(!isDebit&&!isCredit) return;
      const txnDate=parseDate(line);
      if(txnDate<fromD||txnDate>toD) return;
      const mM=line.match(/(?:at|to|from|by)\s+([A-Za-z][A-Za-z0-9\s&.\-]{1,28}?)(?:\s+on|\s+for|\.|\s*,|\s+Ref|\s+UPI|\s+via|$)/i);
      const name=mM?mM[1].trim():(isCredit?"Bank Credit":"Bank Txn");
      txns.push({id:`sms_${idx}_${Date.now()}`,name,amount,date:txnDate,type:isDebit?"expense":"credit",category:isDebit?guessCategory(name):"Other Income",raw:line.slice(0,70)});
    });
    return txns;
  };

  const handleSMSParse = async () => {
    if(!smsText.trim()){notify("Paste your SMS messages first","error");return;}
    setSmsParsing(true);
    let txns=[];
    const hasValidKey = apiKey && (apiKey.trim().startsWith("sk-ant-")||apiKey.trim().startsWith("AIzaSy"));
    if(hasValidKey){
      try{
        const prompt=`Extract ALL bank/payment transactions from these SMS messages. Return ONLY a valid JSON array, no markdown, no explanation.
Include only transactions between ${smsFromDate} and ${smsToDate}.
Each item: {"name":"merchant","amount":number,"date":"YYYY-MM-DD","type":"expense|credit","category":"one of [EMI,Groceries,Utilities,Insurance Premium,SIP/Investment,Medical,Dining,Transport,Shopping,Entertainment,Education,Travel,Other Expense] for expense or Other Income for credit","raw":"first 50 chars of SMS"}
SMS:
${smsText.slice(0,8000)}`;
        const aiResult = await callAI(apiKey, prompt);
        const raw = aiResult.text;
        const s=raw.indexOf("["),e=raw.lastIndexOf("]");
        if(s!==-1){ txns=JSON.parse(raw.slice(s,e+1)).filter(t=>t.amount>0).map((t,i)=>({...t,id:`ai_${i}_${Date.now()}`})); }
        else throw new Error("No JSON");
      }catch(err){
        console.warn("AI SMS fallback to regex:",err.message);
        txns=parseSMSRegex(smsText,smsFromDate,smsToDate);
      }
    } else {
      txns=parseSMSRegex(smsText,smsFromDate,smsToDate);
    }
    if(!txns.length){notify("No transactions found in that date range","info");setSmsParsing(false);return;}
    setSmsParsed(txns);
    const sel={};
    txns.forEach(t=>{ sel[t.id]=t.type==="expense"; });
    setSmsSelected(sel);
    setSmsParsing(false);
  };

  const applySelectedSMS = () => {
    const chosen=smsParsed.filter(t=>smsSelected[t.id]);
    const expenses=chosen.filter(t=>t.type==="expense");
    const credits=chosen.filter(t=>t.type==="credit");
    const mid=activeMember==="all"?"self":activeMember;
    setData(d=>({
      ...d,
      expenses:[...d.expenses,...expenses.map(t=>({id:Date.now()+Math.random(),name:t.name,amount:t.amount,date:t.date,category:t.category,type:"Variable",frequency:"Monthly",memberId:mid}))],
      income:[...d.income,...credits.map(t=>({id:Date.now()+Math.random(),name:t.name,amount:t.amount,date:t.date,source:"Other Income",frequency:"Monthly",memberId:mid}))],
    }));
    notify(`✓ Added ${expenses.length} expense${expenses.length!==1?"s":""}${credits.length>0?` + ${credits.length} income`:""}`);
    setSmsParsed(null); setSmsSelected({}); setSmsMode(false); setSmsText("");
  };

  const donutSegs = EXP_TABS.filter(t=>t.cat&&catTotal(t.cat)>0)
    .map(t=>({label:t.label, value:catTotal(t.cat), color:t.color||"#f87171", icon:t.icon}))
    .sort((a,b)=>b.value-a.value);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:700}}>Expenses</div>
          <div style={{fontSize:13,color:"#555",marginTop:3}}>Monthly outflow: <span style={{color:"#f87171",fontWeight:800,fontSize:17,fontFamily:"'DM Mono',monospace"}}>{fmtS(total)}</span></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{setBudgetDraft({...(data.budgets||{})});setShowBudgets(!showBudgets);}}>🎯 Budgets</button>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setSmsMode(!smsMode)}>📱 SMS Import</button>
        </div>
      </div>

      {/* Budget editor */}
      {showBudgets&&(
        <div className="stat-card" style={{marginBottom:14,background:"#0a0a14",border:"1px solid #2a2a4a"}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>🎯 Monthly Budgets — set limits per category</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {EXP_TABS.filter(t=>t.cat).map(t=>(
              <div key={t.cat} style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14,flexShrink:0}}>{t.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:"#555",marginBottom:3,fontWeight:700}}>{t.label}</div>
                  <input className="input" type="number" style={{fontSize:12,padding:"5px 10px"}}
                    value={budgetDraft[t.cat]||""}
                    onChange={e=>setBudgetDraft(b=>({...b,[t.cat]:e.target.value}))}
                    placeholder="0 = no limit"/>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary" style={{fontSize:12}} onClick={saveBudgets}>Save Budgets</button>
            <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setShowBudgets(false)}>Cancel</button>
          </div>
        </div>
      )}

      {smsMode&&!smsParsed&&(
        <div className="stat-card" style={{marginBottom:14,background:"#0d0d1a",border:"1px solid #2a2a4a"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:600}}>📱 Smart SMS Analyser</div>
            <button onClick={()=>{setSmsMode(false);setSmsText("");setSmsFileName("");}} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:18}}>×</button>
          </div>

          {/* Input mode tabs */}
          <div style={{display:"flex",gap:6,marginBottom:14,background:"#070710",borderRadius:10,padding:4}}>
            {[{id:"file",icon:"📂",label:"Upload Backup File"},
              {id:"paste",icon:"📋",label:"Paste SMS Text"}].map(m=>(
              <button key={m.id} onClick={()=>setSmsInputMode(m.id)}
                style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,transition:"all .15s",
                  background:smsInputMode===m.id?"linear-gradient(135deg,#1e1b4b,#2e1065)":"transparent",
                  color:smsInputMode===m.id?"#a78bfa":"#555"}}>
                {m.icon} {m.label}
              </button>
            ))}
          </div>

          {/* Date range — shown in both modes */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div>
              <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:5}}>FROM DATE</div>
              <input className="input" type="date" value={smsFromDate} onChange={e=>setSmsFromDate(e.target.value)}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:5}}>TO DATE</div>
              <input className="input" type="date" value={smsToDate} onChange={e=>setSmsToDate(e.target.value)}/>
            </div>
          </div>

          {/* FILE UPLOAD MODE */}
          {smsInputMode==="file"&&(
            <>
              {/* App recommendations */}
              <div style={{background:"#070710",border:"1px solid #1a1a2e",borderRadius:8,padding:"12px 14px",marginBottom:12,fontSize:11,color:"#666",lineHeight:2}}>
                <div style={{color:"#a78bfa",fontWeight:700,marginBottom:6}}>📲 Recommended free backup apps:</div>
                <div>
                  <span style={{color:"#4ade80",fontWeight:700}}>Android → SMS Backup & Restore</span>
                  <span style={{color:"#555"}}> (Play Store, free)</span>
                </div>
                <div style={{color:"#888",marginLeft:0,fontSize:10,marginBottom:6}}>Open app → Back Up Now → saves .xml file → transfer to PC → upload here</div>
                <div>
                  <span style={{color:"#60a5fa",fontWeight:700}}>iPhone → iMazing / SMS Export</span>
                  <span style={{color:"#555"}}> (exports CSV)</span>
                </div>
                <div style={{color:"#888",fontSize:10,marginBottom:6}}>Connect iPhone to PC → iMazing → Messages → Export as CSV → upload here</div>
                <div style={{color:"#333",fontSize:10,borderTop:"1px solid #111",paddingTop:6}}>
                  Supported formats: <span style={{color:"#aaa"}}>.xml</span> (SMS Backup & Restore), <span style={{color:"#aaa"}}>.csv</span> (iMazing / any export), <span style={{color:"#aaa"}}>.txt</span> (plain text)
                </div>
              </div>

              {/* Drop zone */}
              <input ref={smsFileRef} type="file" accept=".xml,.csv,.txt" style={{display:"none"}}
                onChange={e=>handleSMSFile(e.target.files[0])}/>
              <div onClick={()=>smsFileRef.current.click()}
                onDragOver={e=>e.preventDefault()}
                onDrop={e=>{e.preventDefault();handleSMSFile(e.dataTransfer.files[0]);}}
                style={{border:"2px dashed #2a2a4a",borderRadius:12,padding:"28px",textAlign:"center",cursor:"pointer",
                  background:"#070710",transition:"border-color .15s",marginBottom:10}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#7c3aed"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#2a2a4a"}>
                {smsFileLoading
                  ? <div style={{color:"#a78bfa",fontSize:13}}>⟳ Loading file…</div>
                  : smsFileName
                    ? <div>
                        <div style={{fontSize:20,marginBottom:6}}>✅</div>
                        <div style={{fontSize:13,color:"#4ade80",fontWeight:600}}>{smsFileName}</div>
                        <div style={{fontSize:11,color:"#555",marginTop:4}}>{smsText.split("\n").filter(l=>l.trim()).length} messages loaded · click to change file</div>
                      </div>
                    : <div>
                        <div style={{fontSize:28,marginBottom:8}}>📂</div>
                        <div style={{fontSize:13,color:"#aaa",fontWeight:600}}>Drop your SMS backup file here</div>
                        <div style={{fontSize:11,color:"#555",marginTop:4}}>or click to browse · .xml · .csv · .txt</div>
                      </div>
                }
              </div>
            </>
          )}

          {/* PASTE MODE */}
          {smsInputMode==="paste"&&(
            <>
              <div style={{background:"#070710",border:"1px solid #1a1a2e",borderRadius:8,padding:"10px 12px",marginBottom:10,fontSize:11,color:"#666",lineHeight:1.8}}>
                <div style={{color:"#a78bfa",fontWeight:700,marginBottom:4}}>How to copy SMS manually:</div>
                <div>📱 <span style={{color:"#aaa"}}>iPhone:</span> Messages → search "debited" or "INR" → copy bank SMS → paste below</div>
                <div>📱 <span style={{color:"#aaa"}}>Android:</span> Messages → search "debited" → long press → Select All → Copy → paste below</div>
              </div>
              <textarea className="input" style={{height:130,resize:"vertical",fontSize:12,lineHeight:1.6}}
                value={smsText} onChange={e=>setSmsText(e.target.value)}
                placeholder={`INR 2500 debited from AC XX1234 at ZOMATO on 15-03-2026\nINR 1200 debited from AC XX1234 to SWIGGY on 16-03-2026\nINR 50000 credited to AC XX1234 from SALARY on 01-03-2026`}/>
            </>
          )}

          <div style={{display:"flex",gap:8,marginTop:12,alignItems:"center"}}>
            <button className="btn btn-primary" onClick={handleSMSParse}
              disabled={smsParsing||(!smsText.trim())}
              style={{flex:1}}>
              {smsParsing
                ? <><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span> Analysing…</>
                : apiKey ? "🤖 Analyse with AI" : "🔍 Analyse"}
            </button>
            {!apiKey&&<div style={{fontSize:10,color:"#555",maxWidth:120}}>Add API key in Profile for smarter detection</div>}
          </div>
          {smsText.trim()&&<div style={{fontSize:10,color:"#333",marginTop:6,textAlign:"center"}}>{smsText.split("\n").filter(l=>l.trim()).length} lines loaded · {smsFromDate} → {smsToDate}</div>}
        </div>
      )}

      {/* Confirmation screen */}
      {smsMode&&smsParsed&&(
        <div className="stat-card" style={{marginBottom:14,background:"#0d0d1a",border:"1px solid #2a2a4a"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:14,fontWeight:600}}>✓ Review Transactions</div>
            <button onClick={()=>{setSmsParsed(null);setSmsSelected({});}} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:12}}>← Back</button>
          </div>
          <div style={{fontSize:12,color:"#555",marginBottom:12}}>
            Found <span style={{color:"#a78bfa",fontWeight:700}}>{smsParsed.length}</span> transactions from {smsFromDate} to {smsToDate}.
            Tick/untick each one before adding.
          </div>

          {/* Select all / deselect all */}
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{const s={};smsParsed.forEach(t=>s[t.id]=true);setSmsSelected(s);}}>Select All</button>
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setSmsSelected({})}>Deselect All</button>
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{const s={};smsParsed.filter(t=>t.type==="expense").forEach(t=>s[t.id]=true);setSmsSelected(s);}}>Expenses Only</button>
            <div style={{marginLeft:"auto",fontSize:12,color:"#a78bfa",fontWeight:700,alignSelf:"center"}}>
              {Object.values(smsSelected).filter(Boolean).length} selected
            </div>
          </div>

          {/* Transaction list */}
          <div style={{maxHeight:360,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
            {smsParsed.map(t=>{
              const isSel=!!smsSelected[t.id];
              const isExp=t.type==="expense";
              return(
                <div key={t.id} onClick={()=>setSmsSelected(s=>({...s,[t.id]:!s[t.id]}))}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,cursor:"pointer",
                    background:isSel?"#1a1a2e":"#070710",border:`1px solid ${isSel?(isExp?"#7c3aed":"#16a34a"):"#111"}`,transition:"all .1s"}}>
                  <input type="checkbox" checked={isSel} onChange={()=>{}} onClick={e=>e.stopPropagation()} style={{width:15,height:15,flexShrink:0,cursor:"pointer"}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#e8e8f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div>
                    <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,padding:"1px 6px",borderRadius:6,background:isExp?"#2d0a0a":"#052e16",color:isExp?"#f87171":"#4ade80",fontWeight:700}}>
                        {isExp?"Expense":"Income"}
                      </span>
                      <span style={{fontSize:10,color:"#555"}}>{t.category}</span>
                      <span style={{fontSize:10,color:"#444"}}>{t.date}</span>
                    </div>
                    {t.raw&&<div style={{fontSize:10,color:"#333",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.raw}</div>}
                  </div>
                  {/* Editable category */}
                  <select value={t.category} onClick={e=>e.stopPropagation()}
                    onChange={e=>{ const c=e.target.value; setSmsParsed(p=>p.map(x=>x.id===t.id?{...x,category:c}:x)); }}
                    style={{fontSize:10,padding:"3px 6px",background:"#111",border:"1px solid #2a2a3a",borderRadius:6,color:"#888",fontFamily:"inherit",maxWidth:130}}>
                    {EXP_TABS.filter(et=>et.cat).map(et=><option key={et.cat} value={et.cat}>{et.cat}</option>)}
                    <option value="Other Income">Other Income</option>
                  </select>
                  <div style={{fontSize:13,fontWeight:700,color:isExp?"#f87171":"#4ade80",fontFamily:"'DM Mono',monospace",flexShrink:0,minWidth:70,textAlign:"right"}}>
                    {isExp?"-":"+"}₹{t.amount.toLocaleString("en-IN")}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button className="btn btn-primary" style={{flex:1}} onClick={applySelectedSMS}
              disabled={!Object.values(smsSelected).some(Boolean)}>
              ✓ Add {Object.values(smsSelected).filter(Boolean).length} Selected Transactions
            </button>
            <button className="btn btn-ghost" onClick={()=>{setSmsParsed(null);setSmsSelected({});setSmsMode(false);setSmsText("");}}>Cancel</button>
          </div>
        </div>
      )}

      <TabSummaryCard
        segs={donutSegs} grandTotal={total} legendTitle="SPENDING BREAKDOWN"

// Lets the user paste their Firebase config directly in the app.
// Config is saved to localStorage so it survives HTML file updates.
function FirebaseConfigCard({authUser, fbStatus, onSwitchAccount, notify}){
  const FIELDS = [
    {k:"apiKey",            l:"API KEY",              ph:"AIzaSy..."},
    {k:"authDomain",        l:"AUTH DOMAIN",          ph:"yourproject.firebaseapp.com"},
    {k:"projectId",         l:"PROJECT ID",           ph:"yourproject-12345"},
    {k:"storageBucket",     l:"STORAGE BUCKET",       ph:"yourproject-12345.appspot.com"},
    {k:"messagingSenderId", l:"MESSAGING SENDER ID",  ph:"123456789012"},
    {k:"appId",             l:"APP ID",               ph:"1:123456789:web:abc123"},
  ];
  const loadSaved = () => {
    try{ const s=localStorage.getItem("wv_fb_config"); return s?JSON.parse(s):{}; }catch(e){ return {}; }
  };
  const [cfg, setCfg]         = useState(loadSaved);
  const [showForm, setShowForm] = useState(false);
  const [saved, setSaved]      = useState(false);

  const saveConfig = () => {
    // Validate all fields filled
    if(FIELDS.some(f=>!cfg[f.k]||cfg[f.k].includes("YOUR_"))){
      notify("Fill in all Firebase config fields","error"); return;
    }
    localStorage.setItem("wv_fb_config", JSON.stringify(cfg));
    setSaved(true);
    notify("✓ Firebase config saved — reload the page to connect");
    setTimeout(()=>setSaved(false),3000);
  };
  const clearConfig = () => {
    localStorage.removeItem("wv_fb_config");
    setCfg({});
    notify("Firebase config cleared");
  };

  const isConnected = FB.enabled && authUser;
  const hasSaved    = !!localStorage.getItem("wv_fb_config");

  return(
    <div className="stat-card" style={{marginBottom:20,background:"linear-gradient(135deg,#0a0a1e,#0d1a2e)",border:"1px solid #1e3a5f"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <span style={{fontSize:16}}>☁</span>
        <span style={{fontSize:12,fontWeight:700,color:"#60a5fa",letterSpacing:.5}}>FIREBASE CLOUD SYNC</span>
        {hasSaved&&<span style={{marginLeft:"auto",fontSize:10,background:"#052e16",color:"#4ade80",border:"1px solid #16a34a",borderRadius:8,padding:"2px 8px",fontWeight:700}}>✓ Config saved</span>}
      </div>

      {isConnected
        /* ── Signed in view ── */
        ?<div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,flexShrink:0}}>
              {(authUser.displayName||authUser.email||"U")[0].toUpperCase()}
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>{authUser.displayName||"User"}</div>
              <div style={{fontSize:11,color:"#555"}}>{authUser.email}</div>
            </div>
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div style={{fontSize:11,fontWeight:700,color:fbStatus==="synced"?"#4ade80":fbStatus==="syncing"?"#fbbf24":"#f87171"}}>
                {fbStatus==="synced"?"● Synced":fbStatus==="syncing"?"◌ Saving…":fbStatus==="error"?"✗ Error":"○ Idle"}
              </div>
            </div>
          </div>
          <div style={{fontSize:12,color:"#555",marginBottom:14,lineHeight:1.7}}>
            Your data auto-syncs to Firebase every time you make a change.
            Firebase config is saved in your browser — no need to re-enter it when you update the app.
          </div>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={onSwitchAccount}>↩ Sign Out &amp; Switch Account</button>
        </div>

        /* ── Not connected view ── */
        :<div>
          {!FB.enabled&&!hasSaved&&(
            <div style={{fontSize:12,color:"#888",marginBottom:14,lineHeight:1.7}}>
              Enter your Firebase config once below — it will be saved in this browser permanently.
              You'll never need to re-enter it, even when the HTML file is updated.
            </div>
          )}
          {hasSaved&&!FB.enabled&&(
            <div style={{fontSize:12,color:"#4ade80",marginBottom:14,lineHeight:1.7,background:"#052e16",padding:"10px 12px",borderRadius:8,border:"1px solid #16a34a"}}>

          <button className="btn btn-ghost" style={{fontSize:12,marginBottom:showForm?14:0}} onClick={()=>setShowForm(v=>!v)}>

          {showForm&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                {FIELDS.map(f=>(
                  <div key={f.k}>
                    <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:4}}>{f.l}</div>
                    <input className="input" style={{fontSize:12}} value={cfg[f.k]||""} onChange={e=>setCfg(c=>({...c,[f.k]:e.target.value}))} placeholder={f.ph}/>

  );
}

// ── CHANGE PIN CARD (requires current PIN verification) ──────────────────────
function ChangePinCard({notify}){
  const [open,      setOpen]      = useState(false);
  const [step,      setStep]      = useState("verify"); // verify | newpin | confirm
  const [curPin,    setCurPin]    = useState("");
  const [newPin,    setNewPin]    = useState("");
  const [confPin,   setConfPin]   = useState("");
  const [err,       setErr]       = useState("");
  const [busy,      setBusy]      = useState(false);
  const newPinRef = useRef("");

  const reset = () => { setStep("verify"); setCurPin(""); setNewPin(""); setConfPin(""); setErr(""); newPinRef.current=""; };

  const verifyCurrent = async () => {
    if(curPin.length<4){setErr("Enter your current PIN");return;}
    setBusy(true);
    const hash    = await hashPin(curPin);
    const stored  = localStorage.getItem(PIN_KEY);
    if(!stored){ setErr("No PIN set — use Lock button"); setBusy(false); return; }
    if(hash!==stored){ setErr("Wrong current PIN"); setBusy(false); setCurPin(""); return; }
    setErr(""); setStep("newpin"); setCurPin(""); setBusy(false);
  };

  const submitNew = async () => {
    if(newPin.length<4){setErr("New PIN must be at least 4 digits");return;}
    newPinRef.current = newPin;
    setStep("confirm"); setNewPin(""); setErr("");
  };

  const submitConfirm = async () => {
    if(confPin!==newPinRef.current){setErr("PINs don't match — try again");setConfPin(""); newPinRef.current=""; setStep("newpin");return;}
    setBusy(true);
    const hash = await hashPin(newPinRef.current);
    localStorage.setItem(PIN_KEY, hash);
    localStorage.removeItem(PIN_ATTEMPTS_KEY);
    localStorage.removeItem(PIN_LOCKOUT_KEY);
    newPinRef.current="";
    notify("✓ PIN changed successfully");
    setOpen(false); reset(); setBusy(false);
  };

  if(!open) return(
    <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{reset();setOpen(true);}}>
      🔑 Change PIN
    </button>
  );

  return(
    <div style={{background:"#0a0a14",border:"1px solid #2a2a3a",borderRadius:10,padding:"16px",marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:700,color:"#a78bfa",marginBottom:12}}>
        {step==="verify"?"🔑 Verify Current PIN":step==="newpin"?"🔑 Enter New PIN":"🔑 Confirm New PIN"}
      </div>

      {step==="verify"&&(
        <>
          <div style={{fontSize:11,color:"#555",marginBottom:10}}>Enter your current PIN to continue</div>
          <input className="input" type="password" inputMode="numeric" maxLength={6}
            value={curPin} onChange={e=>setCurPin(e.target.value.replace(/\D/g,""))}
            onFocus={e=>e.target.select()}
            placeholder="Current PIN"
            style={{fontFamily:"'DM Mono',monospace",letterSpacing:6,fontSize:18,textAlign:"center",marginBottom:10}}/>
          {err&&<div style={{fontSize:11,color:"#f87171",marginBottom:8}}>{err}</div>}
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary" style={{flex:1,fontSize:12}} onClick={verifyCurrent} disabled={busy}>
              {busy?"Verifying…":"Verify →"}
            </button>
            <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{setOpen(false);reset();}}>Cancel</button>
          </div>
        </>
      )}

      {step==="newpin"&&(
        <>
          <div style={{fontSize:11,color:"#555",marginBottom:10}}>Enter a new PIN (4–6 digits)</div>
          <input className="input" type="password" inputMode="numeric" maxLength={6}
            value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/g,""))}
            onFocus={e=>e.target.select()}
            placeholder="New PIN"
            autoFocus
            style={{fontFamily:"'DM Mono',monospace",letterSpacing:6,fontSize:18,textAlign:"center",marginBottom:10}}/>
          {err&&<div style={{fontSize:11,color:"#f87171",marginBottom:8}}>{err}</div>}
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary" style={{flex:1,fontSize:12}} onClick={submitNew}>Next →</button>
            <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{setOpen(false);reset();}}>Cancel</button>
          </div>
        </>
      )}

      {step==="confirm"&&(
        <>
          <div style={{fontSize:11,color:"#555",marginBottom:10}}>Re-enter new PIN to confirm</div>
          <input className="input" type="password" inputMode="numeric" maxLength={6}
            value={confPin} onChange={e=>setConfPin(e.target.value.replace(/\D/g,""))}
            onFocus={e=>e.target.select()}
            placeholder="Confirm PIN"
            autoFocus
            style={{fontFamily:"'DM Mono',monospace",letterSpacing:6,fontSize:18,textAlign:"center",marginBottom:10}}/>
          {err&&<div style={{fontSize:11,color:"#f87171",marginBottom:8}}>{err}</div>}
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary" style={{flex:1,fontSize:12}} onClick={submitConfirm} disabled={busy}>
              {busy?"Saving…":"Save New PIN ✓"}
            </button>
            <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{setOpen(false);reset();}}>Cancel</button>
          </div>
        </>
      )}
    </div>
  );
}

function ReorganiseTab({data, setData, notify}){
  const family = data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];

  // ── shared state ──────────────────────────────────────────────────────────
  const [mode,     setMode]     = useState("member");   // "member" | "category"
  const [segId,    setSegId]    = useState("assets");
  const [selected, setSelected] = useState({});         // id -> bool
  const [filter,   setFilter]   = useState("all");      // "all" | memberId | catName
  const [search,   setSearch]   = useState("");

  // target for the operation
  const [targetMember, setTargetMember] = useState("");
  const [targetCat,    setTargetCat]    = useState("");
  const [applying,     setApplying]     = useState(false);
  const [lastResult,   setLastResult]   = useState(null); // {count, type, what}

  const seg = REORG_SEGMENTS.find(s=>s.id===segId);
  const allItems = seg.getItems(data)||[];

  // Filtered items shown in the list
  const filteredItems = allItems.filter(item=>{
    const matchSeg   = filter==="all"||
      (mode==="member" ? (item.memberId||"self")===filter : seg.getCat(item)===filter);
    const matchSearch = !search || item.name?.toLowerCase().includes(search.toLowerCase());
    return matchSeg && matchSearch;
  });

  // Reset selection when segment or filter changes
  const resetSel = () => setSelected({});
  const toggleItem = id => setSelected(s=>({...s,[String(id)]:!s[String(id)]}));
  const toggleAll  = () => {
    const allSel = filteredItems.every(i=>selected[String(i.id)]);
    const next={};
    if(!allSel) filteredItems.forEach(i=>{ next[String(i.id)]=true; });
    setSelected(next);
  };
  const selectedIds = Object.entries(selected).filter(([,v])=>v).map(([k])=>k);
  const selCount    = selectedIds.length;

  // Apply re-tag (member)
  const applyMember = () => {
    if(!targetMember){notify("Choose a target member","error");return;}
    if(!selCount){notify("Select at least one item","error");return;}
    setApplying(true);
    const idSet = new Set(selectedIds.map(String));
    setData(d=>{
      const newItems = (seg.getItems(d)||[]).map(item=>
        idSet.has(String(item.id)) ? {...item,memberId:targetMember} : item
      );
      return {...d,[seg.key]:newItems};
    });
    const tname = family.find(m=>m.id===targetMember)?.name||targetMember;
    notify(`✓ ${selCount} item${selCount>1?"s":""} moved to ${tname}`);
    setLastResult({count:selCount,type:"member",what:tname});
    setSelected({}); setApplying(false);
  };

  // Apply re-categorise
  const applyCat = () => {
    if(!targetCat){notify("Choose a target category","error");return;}
    if(!selCount){notify("Select at least one item","error");return;}
    setApplying(true);
    const idSet = new Set(selectedIds.map(String));
    setData(d=>{
      const newItems = (seg.getItems(d)||[]).map(item=>
        idSet.has(String(item.id)) ? seg.setCat(item,targetCat) : item
      );
      return {...d,[seg.key]:newItems};
    });
    notify(`✓ ${selCount} item${selCount>1?"s":""} moved to ${targetCat}`);
    setLastResult({count:selCount,type:"category",what:targetCat});
    setSelected({}); setApplying(false);
  };

  const getMemberName = id => family.find(m=>m.id===id)?.name||(id==="self"?"Me":id);
  const getMemberColor= id => family.find(m=>m.id===id)?.color||"#888";

  // per-segment summary for filter chips
  const memberCounts = {};
  allItems.forEach(i=>{ const m=i.memberId||"self"; memberCounts[m]=(memberCounts[m]||0)+1; });
  const catCounts = {};
  allItems.forEach(i=>{ const c=seg.getCat(i)||"Unknown"; catCounts[c]=(catCounts[c]||0)+1; });

  return(
    <div>
      {/* ── Header ── */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:700}}>⇄ Reorganise</div>
        <div style={{fontSize:13,color:"#555",marginTop:3}}>Move entries between family members or change their category</div>
      </div>

      {/* ── Mode toggle ── */}
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        {[
          {id:"member",   icon:"👤", label:"Retag to Member",   desc:"Move entries between family members"},
          {id:"category", icon:"🏷",  label:"Recategorise",     desc:"Change the category/type of entries"},
        ].map(m=>(
          <div key={m.id} onClick={()=>{setMode(m.id);resetSel();setFilter("all");setSearch("");}}
            style={{flex:1,padding:"14px 18px",borderRadius:14,cursor:"pointer",transition:"all .15s",
              background:mode===m.id?"linear-gradient(135deg,#1e1b4b,#2e1065)":"#0c0c1c",
              border:`1px solid ${mode===m.id?"#7c3aed":"#1e1e2e"}`}}>
            <div style={{fontSize:20,marginBottom:6}}>{m.icon}</div>
            <div style={{fontSize:13,fontWeight:700,color:mode===m.id?"#a78bfa":"#aaa"}}>{m.label}</div>
            <div style={{fontSize:11,color:"#555",marginTop:2}}>{m.desc}</div>
          </div>
        ))}
      </div>

      {/* ── Segment selector ── */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {REORG_SEGMENTS.map(s=>(
          <button key={s.id} onClick={()=>{setSegId(s.id);resetSel();setFilter("all");setSearch("");}}
            style={{padding:"7px 16px",borderRadius:20,border:`1px solid ${segId===s.id?s.color:"#2a2a3a"}`,
              background:segId===s.id?`${s.color}22`:"transparent",
              color:segId===s.id?s.color:"#666",cursor:"pointer",fontSize:12,fontWeight:segId===s.id?700:400,
              fontFamily:"inherit",transition:"all .15s"}}>
            {s.icon} {s.label} <span style={{fontSize:10,opacity:.6}}>({allItems.length})</span>
          </button>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:16,alignItems:"start"}}>

        {/* ── Left: item list ── */}
        <div>
          {/* Filter chips + search */}
          <div style={{background:"#0a0a14",border:"1px solid #1a1a2e",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <span style={{fontSize:10,color:"#444",fontWeight:700,letterSpacing:1,alignSelf:"center"}}>
                {mode==="member"?"BY MEMBER:":"BY CATEGORY:"}
              </span>
              <button onClick={()=>{setFilter("all");resetSel();}}
                style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${filter==="all"?"#60a5fa":"#2a2a3a"}`,
                  background:filter==="all"?"#60a5fa22":"transparent",color:filter==="all"?"#60a5fa":"#666",
                  cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                All ({allItems.length})
              </button>
              {mode==="member"
                ? family.map(m=>(memberCounts[m.id]>0)&&(
                    <button key={m.id} onClick={()=>{setFilter(m.id);resetSel();}}
                      style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${filter===m.id?m.color:"#2a2a3a"}`,
                        background:filter===m.id?`${m.color}22`:"transparent",color:filter===m.id?m.color:"#666",
                        cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                      {m.name} ({memberCounts[m.id]||0})
                    </button>
                  ))
                : Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).map(([cat,cnt])=>(
                    <button key={cat} onClick={()=>{setFilter(cat);resetSel();}}
                      style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${filter===cat?seg.color:"#2a2a3a"}`,
                        background:filter===cat?`${seg.color}22`:"transparent",color:filter===cat?seg.color:"#666",
                        cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                      {cat} ({cnt})
                    </button>
                  ))
              }
            </div>
            <input className="input" placeholder="Search by name…" value={search}
              onChange={e=>{setSearch(e.target.value);resetSel();}}
              style={{fontSize:12,padding:"7px 12px"}}/>
          </div>

          {/* Select all bar */}
          {filteredItems.length>0&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"8px 12px",background:"#0c0c1c",borderRadius:10,marginBottom:8,border:"1px solid #1a1a2e"}}>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12,color:"#888"}}>
                <input type="checkbox"
                  checked={filteredItems.length>0&&filteredItems.every(i=>selected[i.id])}
                  onChange={toggleAll}
                  style={{width:15,height:15,cursor:"pointer"}}/>
                Select all {filteredItems.length} shown
              </label>
              {selCount>0&&(
                <span style={{fontSize:12,fontWeight:700,color:seg.color}}>{selCount} selected</span>
              )}
            </div>
          )}

          {/* Item rows */}
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:"60vh",overflowY:"auto"}}>
            {filteredItems.length===0&&(
              <div style={{textAlign:"center",padding:"40px 0",color:"#333",fontSize:13}}>
                No entries found in this view
              </div>
            )}
            {filteredItems.map(item=>{
              const isSel = !!selected[String(item.id)];
              const memberColor = getMemberColor(item.memberId||"self");
              const memberName  = getMemberName(item.memberId||"self");
              const catName     = seg.getCat(item)||"—";
              return(
                <div key={item.id} onClick={()=>toggleItem(item.id)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,cursor:"pointer",
                    background:isSel?"#1a1a2e":"#0c0c1c",
                    border:`1px solid ${isSel?seg.color:"#1a1a2e"}`,transition:"all .1s"}}>
                  <input type="checkbox" checked={isSel} onChange={()=>toggleItem(item.id)}
                    onClick={e=>e.stopPropagation()}
                    style={{width:15,height:15,cursor:"pointer",flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#e8e8f0",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                    <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,
                        background:`${seg.color}22`,color:seg.color,fontWeight:600}}>{catName}</span>
                      <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,
                        background:`${memberColor}22`,color:memberColor,fontWeight:600}}>👤 {memberName}</span>
                    </div>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:"#888",fontFamily:"'DM Mono',monospace",flexShrink:0}}>
                    {fmtS(item.value||item.amount||item.cover||0)}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── Right: action panel ── */}
        <div style={{position:"sticky",top:0}}>

          {/* Last result badge */}
          {lastResult&&(
            <div style={{background:"#052e16",border:"1px solid #16a34a",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#4ade80"}}>
              ✓ {lastResult.count} item{lastResult.count>1?"s":""} moved to <strong>{lastResult.what}</strong>
            </div>
          )}

          <div style={{background:"#0c0c1c",border:"1px solid #1e1e2e",borderRadius:14,padding:"18px"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:14,color:"#e8e8f0"}}>
              {mode==="member"?"📍 Move to Member":"🏷 Move to Category"}
            </div>

            {/* Selection summary */}
            <div style={{background:"#070710",borderRadius:8,padding:"10px 12px",marginBottom:14}}>
              <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:4}}>SELECTED</div>
              <div style={{fontSize:18,fontWeight:800,color:selCount>0?seg.color:"#333"}}>{selCount}</div>
              <div style={{fontSize:11,color:"#444",marginTop:1}}>
                {selCount===0?"No items selected yet":`item${selCount>1?"s":""} from ${seg.label}`}
              </div>
            </div>

            {mode==="member"?(
              <>
                <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:8}}>TARGET MEMBER</div>
                {family.map(m=>(
                  <div key={m.id} onClick={()=>setTargetMember(m.id)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,cursor:"pointer",
                      marginBottom:6,transition:"all .1s",
                      background:targetMember===m.id?`${m.color}22`:"#070710",
                      border:`1px solid ${targetMember===m.id?m.color:"#1e1e2e"}`}}>
                    <div style={{width:28,height:28,borderRadius:8,background:`${m.color}22`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:m.color,flexShrink:0}}>
                      {m.name[0]?.toUpperCase()}
                    </div>
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color:targetMember===m.id?m.color:"#aaa"}}>{m.name}</div>
                      <div style={{fontSize:10,color:"#555"}}>{m.relation}</div>
                    </div>
                    {targetMember===m.id&&<span style={{marginLeft:"auto",fontSize:14,color:m.color}}>✓</span>}
                  </div>
                ))}
                <button onClick={applyMember} disabled={!selCount||!targetMember||applying}
                  style={{width:"100%",marginTop:14,padding:"12px",borderRadius:10,
                    background:selCount&&targetMember?"linear-gradient(135deg,#7c3aed,#4f46e5)":"#1a1a2e",
                    border:`1px solid ${selCount&&targetMember?"#7c3aed":"#2a2a3a"}`,
                    color:selCount&&targetMember?"#fff":"#444",cursor:selCount&&targetMember?"pointer":"not-allowed",
                    fontWeight:700,fontSize:13,fontFamily:"inherit",transition:"all .15s"}}>
                  {applying?"Moving…":`Move ${selCount||0} item${selCount!==1?"s":""} →`}
                </button>
              </>
            ):(
              <>
                <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,letterSpacing:1,marginBottom:8}}>TARGET CATEGORY</div>
                <div style={{maxHeight:280,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                  {seg.cats.map(cat=>(
                    <div key={cat} onClick={()=>setTargetCat(cat)}
                      style={{padding:"8px 12px",borderRadius:8,cursor:"pointer",transition:"all .1s",
                        background:targetCat===cat?`${seg.color}22`:"#070710",
                        border:`1px solid ${targetCat===cat?seg.color:"#1e1e2e"}`,
                        color:targetCat===cat?seg.color:"#888",fontSize:12,
                        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      {cat}
                      {targetCat===cat&&<span style={{fontSize:12}}>✓</span>}
                    </div>
                  ))}
                </div>
                <button onClick={applyCat} disabled={!selCount||!targetCat||applying}
                  style={{width:"100%",marginTop:14,padding:"12px",borderRadius:10,
                    background:selCount&&targetCat?"linear-gradient(135deg,#7c3aed,#4f46e5)":"#1a1a2e",
                    border:`1px solid ${selCount&&targetCat?"#7c3aed":"#2a2a3a"}`,
                    color:selCount&&targetCat?"#fff":"#444",cursor:selCount&&targetCat?"pointer":"not-allowed",
                    fontWeight:700,fontSize:13,fontFamily:"inherit",transition:"all .15s"}}>
                  {applying?"Moving…":`Recategorise ${selCount||0} item${selCount!==1?"s":""} →`}
                </button>
              </>
            )}

            {/* Tip */}
            <div style={{fontSize:10,color:"#252535",marginTop:14,lineHeight:1.7}}>
              Tip: Use filter chips to narrow down by member or category, then select all with one click.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ReportsTab({data,activeMember,setActiveMember}){
  const family = data.family||[{id:"self",name:"Me",relation:"Self",color:"#a78bfa"}];
  const filterItems = items => activeMember==="all"?items:items.filter(i=>(i.memberId||"self")===activeMember);

  const rdata = {
    ...data,
    assets:      filterItems(data.assets),
    liabilities: filterItems(data.liabilities),
    income:      filterItems(data.income),
    expenses:    filterItems(data.expenses),
    insurance:   filterItems(data.insurance),
  };
  const [activeReport, setActiveReport] = useState("networth");
  const [vaultPin,     setVaultPin]     = useState("");
  const [vaultUnlocked,setVaultUnlocked]= useState(false);
  const [vaultItems,   setVaultItems]   = useState([]);
  const [vaultErr,     setVaultErr]     = useState("");
  const reportRef = useRef(null);

  // ── TOTALS (uses filtered rdata) ─────────────────────────────────────────────
  const totalAssets   = rdata.assets.reduce((s,a)=>s+(a.value||0),0);
  const totalLiab     = rdata.liabilities.reduce((s,l)=>s+(l.value||0),0);
  const netWorth      = totalAssets - totalLiab;
  const totalInc      = rdata.income.reduce((s,i)=>s+(i.amount||0),0);
  const totalExp      = rdata.expenses.reduce((s,e)=>s+(e.amount||0),0);
  const surplus       = totalInc - totalExp;
  const totalPremium  = rdata.insurance.reduce((s,i)=>s+(i.premium||0),0);
  const totalCover    = rdata.insurance.reduce((s,i)=>s+(i.cover||0),0);
  const totalEMI      = rdata.liabilities.reduce((s,l)=>s+(l.emi||0),0);

  const assetCats = {};
  rdata.assets.forEach(a=>{ assetCats[a.category]=(assetCats[a.category]||0)+(a.value||0); });
  const assetCatList = Object.entries(assetCats).sort((a,b)=>b[1]-a[1]);

  const reportDate = new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});
  const activeType = REPORT_TYPES.find(r=>r.id===activeReport);

  // ── UNLOCK VAULT for report ──────────────────────────────────────────────────
  const unlockVaultForReport = async() => {
    const hash = await hashVaultPin(vaultPin);
    const stored = localStorage.getItem(PWD_VAULT_PIN);
    if(!stored){ setVaultErr("No vault PIN set. Create vault first."); return; }
    if(hash!==stored){ setVaultErr("Wrong PIN"); return; }
    const enc = localStorage.getItem(PWD_KEY);
    const items = enc ? decryptVault(enc, vaultPin) : [];
    if(items===null){ setVaultErr("Decryption failed"); return; }
    setVaultItems(items||[]);
    setVaultUnlocked(true);
    setVaultErr("");
  };

  // ── PER-REPORT EXCEL EXPORT ──────────────────────────────────────────────────
  const exportReportExcel = () => {
    const wb = XLSX.utils.book_new();
    const genDate = new Date().toLocaleDateString("en-IN");
    const header = [["WealthVault — "+activeType?.label, "", `Generated: ${genDate}`],
                    ["Name", data.profile?.name||""], ["PAN", data.profile?.pan||""], []];

    if(activeReport==="networth"){
      const rows=[
        ...header,
        ["ASSETS","",""],
        ["Category","Value (₹)","% of Total"],
        ...assetCatList.map(([cat,val])=>[cat, val, totalAssets>0?((val/totalAssets)*100).toFixed(1)+"%":"0%"]),
        ["TOTAL ASSETS", totalAssets,"100%"], [],
        ["LIABILITIES","",""],
        ["Name","Outstanding (₹)",""],
        ...data.liabilities.map(l=>[l.name, l.value||0,""]),
        ["TOTAL LIABILITIES", totalLiab,""], [],
        ["NET WORTH", netWorth,""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Net Worth");
    }
    else if(activeReport==="assets"){
      const rows=[
        ...header,
        ["Name","Category","Current Value (₹)","Qty/Units","Buy Price/NAV","Cost Basis (₹)","P&L (₹)","Ticker/Code","Broker/Bank","Date"],
        ...data.assets.map(a=>{
          const cost=a.qty&&a.buyPrice?a.qty*a.buyPrice:(a.invested||0);
          const pnl=cost?a.value-cost:"";
          return[a.name,a.category,a.value||0,a.qty||a.units||"",a.buyPrice||a.nav||"",cost||"",pnl,a.ticker||a.schemeCode||a.acNo||"",a.broker||a.bank||a.amc||"",a.date||a.buyDate||""];
        }),
        ["TOTAL","",totalAssets,"","","","","","",""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Assets");
    }
    else if(activeReport==="liabilities"){
      const rows=[
        ...header,
        ["Name","Category","Outstanding (₹)","EMI/Month (₹)","Interest Rate (%)","Maturity","Details"],
        ...data.liabilities.map(l=>[l.name,l.category||"",l.value||0,l.emi||"",l.intRate||"",l.matDate||"",l.details||""]),
        ["TOTAL","",totalLiab,"Total EMI:",totalEMI,"",""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Liabilities");
    }
    else if(activeReport==="income"){
      const rows=[
        ...header,
        ["Source","Name","Amount (₹)","Frequency","Taxable?","Date","Account"],
        ...data.income.map(i=>[i.source||"",i.name||"",i.amount||0,i.frequency||"",i.taxable?"Yes":"No",i.date||"",i.acNo||""]),
        ["TOTAL","",totalInc,"","","",""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Income");
    }
    else if(activeReport==="expenses"){
      const rows=[
        ...header,
        ["Category","Name","Amount (₹)","Type","Date","Notes"],
        ...data.expenses.map(e=>[e.category||"",e.name||"",e.amount||0,e.type||"",e.date||"",e.notes||""]),
        ["TOTAL","",totalExp,"","",""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Expenses");
    }
    else if(activeReport==="cashflow"){
      const rows=[
        ...header,
        ["Cash Flow Summary",""],
        ["Total Income", totalInc],
        ["Total Expenses", totalExp],
        ["Net Surplus / Deficit", surplus],
        ["Savings Rate", totalInc>0?((surplus/totalInc)*100).toFixed(1)+"%":"0%"],
        [],
        ["INCOME DETAILS",""],
        ["Source","Name","Amount (₹)","Frequency","Taxable?"],
        ...data.income.map(i=>[i.source||"",i.name||"",i.amount||0,i.frequency||"",i.taxable?"Yes":"No"]),
        ["Total Income","",totalInc,"",""],
        [],
        ["EXPENSE DETAILS",""],
        ["Category","Name","Amount (₹)","Type"],
        ...data.expenses.map(e=>[e.category||"",e.name||"",e.amount||0,e.type||""]),
        ["Total Expenses","",totalExp,""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Cash Flow");
    }
    else if(activeReport==="insurance"){
      const rows=[
        ...header,
        ["Policy Name","Type","Sum Assured (₹)","Premium (₹)","Frequency","Maturity/Renewal","Status","Policy No.","Nominee","Insurer"],
        ...data.insurance.map(i=>[i.name||"",i.type||"",i.cover||0,i.premium||0,i.frequency||"",i.maturity||"",i.status||"Active",i.policyNo||"",i.nominee||"",i.insurer||""]),
        ["TOTAL","",totalCover,totalPremium,"","","","","",""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Insurance");
    }
    else if(activeReport==="pwdvault"){
      if(!vaultUnlocked){ alert("Please unlock the vault first to export."); return; }
      const rows=[
        ["WealthVault — Password Vault Index (CONFIDENTIAL)", "", `Generated: ${genDate}`],
        ["⚠ This file contains sensitive data. Keep it secure.","",""],
        [],
        ["Title","Category","URL/App","Fields Stored","Last Updated","Notes"],
        ...vaultItems.map(v=>[
          v.title||"",
          v.category||"",
          v.url||"",
          (v.fields||[]).map(f=>f.label||f.type).join(", "),
          v.updatedAt||"",
          v.notes||"",
        ]),
        ["TOTAL ENTRIES", vaultItems.length,"","","",""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Password Vault Index");
    }
    else if(activeReport==="tax"){
      const taxable = data.income.filter(i=>i.taxable).reduce((s,i)=>s+(i.amount||0),0);
      const rows=[
        ...header,
        ["Tax Planning Summary",""],
        ["Total Income",totalInc],
        ["Taxable Income",taxable],
        ["Exempt Income",totalInc-taxable],
        [],
        ["Income Details",""],
        ["Name","Amount (₹)","Frequency","Taxable?"],
        ...data.income.map(i=>[i.name||"",i.amount||0,i.frequency||"",i.taxable?"Taxable":"Exempt"]),
        ["Total",totalInc,"",""],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Tax Planning");
    }

    XLSX.writeFile(wb, `WealthVault_${activeType?.label.replace(/[^a-z0-9]/gi,"_")}_${new Date().toISOString().split("T")[0]}.xlsx`);
  };

  // ── ALL-REPORTS EXCEL (full workbook) ────────────────────────────────────────
  const exportAllExcel = () => {
    const wb   = XLSX.utils.book_new();
    const genD = new Date().toLocaleDateString("en-IN");
    // Summary
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ["WealthVault — Full Financial Report","",`Generated: ${genD}`],
      ["Name", data.profile?.name||""],["PAN", data.profile?.pan||""],["Phone",data.profile?.phone||""],
      [],
      ["SUMMARY",""],
      ["Total Assets", totalAssets],["Total Liabilities", totalLiab],["Net Worth", netWorth],
      ["Total Income", totalInc],["Total Expenses", totalExp],["Net Surplus", surplus],
      ["Total Insurance Cover", totalCover],["Total Premium", totalPremium],
    ]), "Summary");

    // Assets
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ["Name","Category","Value (₹)","Qty","Buy Price","Cost Basis","P&L","Ticker","Broker","Date"],
      ...data.assets.map(a=>{ const c=a.qty&&a.buyPrice?a.qty*a.buyPrice:(a.invested||0); return[a.name,a.category,a.value||0,a.qty||a.units||"",a.buyPrice||a.nav||"",c||"",c?a.value-c:"",a.ticker||a.schemeCode||"",a.broker||a.bank||a.amc||"",a.date||""]; }),
      ["TOTAL","",totalAssets],
    ]), "Assets");

    // Liabilities
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ["Name","Category","Outstanding (₹)","EMI (₹)","Rate (%)","Maturity","Details"],
      ...data.liabilities.map(l=>[l.name,l.category||"",l.value||0,l.emi||"",l.intRate||"",l.matDate||"",l.details||""]),
      ["TOTAL","",totalLiab,"",totalEMI],
    ]), "Liabilities");

    // Income
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ["Source","Name","Amount (₹)","Frequency","Taxable?","Date"],
      ...data.income.map(i=>[i.source||"",i.name||"",i.amount||0,i.frequency||"",i.taxable?"Yes":"No",i.date||""]),
      ["TOTAL","",totalInc],
    ]), "Income");

    // Expenses
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ["Category","Name","Amount (₹)","Type","Date"],
      ...data.expenses.map(e=>[e.category||"",e.name||"",e.amount||0,e.type||"",e.date||""]),
      ["TOTAL","",totalExp],
    ]), "Expenses");

    // Insurance
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ["Policy Name","Type","Sum Assured (₹)","Premium (₹)","Frequency","Maturity","Status","Policy No.","Nominee"],
      ...data.insurance.map(i=>[i.name||"",i.type||"",i.cover||0,i.premium||0,i.frequency||"",i.maturity||"",i.status||"Active",i.policyNo||"",i.nominee||""]),
      ["TOTAL","",totalCover,totalPremium],
    ]), "Insurance");

    // Cash Flow
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ["Cash Flow Summary",""],
      ["Total Income", totalInc],["Total Expenses", totalExp],["Net Surplus", surplus],
      ["Savings Rate", totalInc>0?((surplus/totalInc)*100).toFixed(1)+"%":"0%"],
    ]), "Cash Flow");

    XLSX.writeFile(wb, `WealthVault_FullReport_${new Date().toISOString().split("T")[0]}.xlsx`);
  };

  // ── PRINT / PDF ───────────────────────────────────────────────────────────────
  const handlePrint = () => window.print();

  // ── INDIVIDUAL REPORT RENDERERS ───────────────────────────────────────────────
  const renderNetWorth = () => (
    <div>
      <RptKPIs kpis={[
        {label:"Total Assets",      value:fmtS(totalAssets),  color:"#4ade80", sub:`${data.assets.length} holdings`},
        {label:"Total Liabilities", value:fmtS(totalLiab),    color:"#f87171", sub:`${data.liabilities.length} loans`},
        {label:"Net Worth",         value:fmtS(netWorth),      color:netWorth>=0?"#a78bfa":"#f87171"},
        {label:"Debt-to-Asset",     value:totalAssets>0?((totalLiab/totalAssets)*100).toFixed(0)+"%":"0%", color:"#fbbf24", sub:"Lower is better"},
      ]}/>
      <RptSection title="Asset Allocation" icon="📊">
        {assetCatList.map(([cat,val])=>(
          <RptBar key={cat} label={cat} value={val} total={totalAssets} color={CAT_COLORS[cat]||"#a78bfa"}
            sub={`${data.assets.filter(a=>a.category===cat).length} holding(s)`}/>
        ))}
      </RptSection>
      <RptSection title="Liabilities Breakdown" icon="🏦">
        <RptTable
          headers={["Liability","Category","Outstanding","EMI/Month","Rate"]}
          rows={data.liabilities.map(l=>[
            l.name, l.category||"—",
            {v:fmtS(l.value||0),color:"#f87171"},
            l.emi?{v:fmtS(l.emi)+"/mo",color:"#fb923c"}:{v:"—",color:"#444"},
            l.intRate?{v:l.intRate+"%",color:"#fbbf24"}:{v:"—",color:"#444"},
          ])}
          totals={["Total Liabilities","",{v:fmtS(totalLiab),color:"#f87171"},{v:fmtS(totalEMI)+"/mo",color:"#fb923c"},"—"]}
        />
      </RptSection>
    </div>
  );

  const renderAssets = () => {
    const stocks = data.assets.filter(a=>a.category==="Stocks");
    const mfs    = data.assets.filter(a=>a.category==="Mutual Funds");
    const fds    = data.assets.filter(a=>a.category==="Fixed Deposits");
    const gold   = data.assets.filter(a=>a.category==="Gold");
    const realty = data.assets.filter(a=>a.category==="Real Estate");
    const others = data.assets.filter(a=>!["Stocks","Mutual Funds","Fixed Deposits","Gold","Real Estate"].includes(a.category));
    const totalInvested = data.assets.reduce((s,a)=>{
      const c=a.qty&&a.buyPrice?a.qty*a.buyPrice:(a.invested||0); return s+c;
    },0);
    const totalPnL = totalInvested ? totalAssets - totalInvested : 0;

    return(
      <div>
        <RptKPIs kpis={[
          {label:"Total Portfolio Value", value:fmtS(totalAssets),   color:"#4ade80"},
          {label:"Total Invested",        value:fmtS(totalInvested), color:"#60a5fa"},
          {label:"Overall P&L",           value:(totalPnL>=0?"+":"")+fmtS(totalPnL), color:totalPnL>=0?"#4ade80":"#f87171",
            sub:totalInvested>0?((totalPnL/totalInvested)*100).toFixed(1)+"% return":""},
          {label:"Total Holdings",        value:data.assets.length,  color:"#a78bfa"},
        ]}/>
        <RptSection title="Allocation by Category" icon="📊">
          {assetCatList.map(([cat,val])=>(
            <RptBar key={cat} label={cat} value={val} total={totalAssets} color={CAT_COLORS[cat]||"#a78bfa"}/>
          ))}
        </RptSection>
        {stocks.length>0&&<RptSection title={`Stocks (${stocks.length})`} icon="📈">
          <RptTable
            headers={["Company","Ticker","Broker","Qty","Buy Price","Invested","Current Value","P&L","Return %"]}
            rows={stocks.map(s=>{
              const cost=s.qty&&s.buyPrice?s.qty*s.buyPrice:null;
              const pnl=cost?s.value-cost:null;
