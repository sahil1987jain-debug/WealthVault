  const renderTax = () => {
    const taxableInc  = data.income.filter(i=>i.taxable).reduce((s,i)=>s+(i.amount||0),0);
    const pfContrib   = data.assets.filter(a=>a.category==="EPF/PPF").reduce((s,a)=>s+((a.empContrib||0)+(a.employer==="Self"?0:a.empContrib||0)),0);
    const sipDeduction= Math.min(data.expenses.filter(e=>e.category==="SIP").reduce((s,e)=>s+(e.amount||0),0), 150000);
    const sec80C      = Math.min(pfContrib + sipDeduction, 150000);
    const sec80D      = Math.min(data.insurance.filter(i=>["Health","Critical Illness"].includes(i.type)).reduce((s,i)=>s+(i.premium||0),0), 25000);
    const stdDeduction= 75000;
    const totalDeductions = sec80C + sec80D + stdDeduction;
    const taxableAfterDed = Math.max(taxableInc - totalDeductions, 0);
    const calcTaxNew = (inc) => {
      if(inc<=300000) return 0; let tax=0;
      if(inc>300000) tax+=Math.min(inc-300000,400000)*0.05;
      if(inc>700000) tax+=Math.min(inc-700000,300000)*0.10;
      if(inc>1000000) tax+=Math.min(inc-1000000,200000)*0.15;
      if(inc>1200000) tax+=Math.min(inc-1200000,300000)*0.20;
      if(inc>1500000) tax+=(inc-1500000)*0.30;
      return Math.round(tax);
    };
    const calcTaxOld = (inc) => {
      if(inc<=250000) return 0; let tax=0;
      if(inc>250000) tax+=Math.min(inc-250000,250000)*0.05;
      if(inc>500000) tax+=Math.min(inc-500000,500000)*0.20;
      if(inc>1000000) tax+=(inc-1000000)*0.30;
      return Math.round(tax);
    };
    const taxNew  = calcTaxNew(taxableInc);
    const taxOld  = calcTaxOld(taxableAfterDed);
    const better  = taxNew <= taxOld ? "New" : "Old";
    return(
      <div>
        <RptKPIs kpis={[
          {label:"Total Income",         value:fmtS(totalInc),      color:"#4ade80"},
          {label:"Taxable Income",        value:fmtS(taxableInc),    color:"#fbbf24"},
          {label:"Est. Tax (New Regime)", value:fmtS(taxNew),        color:"#f87171"},
          {label:"Recommended Regime",   value:better+" Regime",    color:better==="New"?"#4ade80":"#a78bfa", sub:`Saves ~${fmtS(Math.abs(taxNew-taxOld))}`},
        ]}/>
        <RptSection title="Income for Tax" icon="₹">
          <RptTable
            headers={["Name","Amount (₹)","Frequency","Taxable?"]}
            rows={data.income.map(i=>[
              i.name||"—",
              {v:fmtS(i.amount||0),color:"#4ade80"},
              i.frequency||"—",
              i.taxable?{v:"Taxable",color:"#fbbf24"}:{v:"Exempt",color:"#4ade80"},
            ])}
            totals={["Total",{v:fmtS(totalInc),color:"#4ade80"},"",""]}
          />
        </RptSection>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          <RptSection title="Old Regime Deductions (Est.)" icon="📉">
            {[["Standard Deduction (Sec 16)",stdDeduction],["Sec 80C (PF+ELSS+PPF)",sec80C],["Sec 80D (Health Insurance)",sec80D]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"#0e0e18",borderRadius:8,marginBottom:6}}>
                <span style={{fontSize:12,color:"#888"}}>{l}</span>
                <span style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:"#4ade80"}}>₹{v.toLocaleString("en-IN")}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"#0a0a12",borderRadius:8,borderTop:"1px solid #2a2a3e"}}>
              <span style={{fontSize:12,fontWeight:700,color:"#ccc"}}>Total Deductions</span>
              <span style={{fontSize:13,fontFamily:"'DM Mono',monospace",color:"#a78bfa",fontWeight:700}}>₹{totalDeductions.toLocaleString("en-IN")}</span>
            </div>
          </RptSection>
          <RptSection title="Tax Comparison" icon="⚖️">
            {[{regime:"New Regime",tax:taxNew,note:"No deductions, lower slabs"},{regime:"Old Regime",tax:taxOld,note:`After ₹${(totalDeductions/1000).toFixed(0)}K deductions`}].map(r=>(
              <div key={r.regime} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"#0e0e18",borderRadius:10,marginBottom:8,border:`1px solid ${better===r.regime.split(" ")[0]?"#16a34a":"#1e1e2e"}`}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:better===r.regime.split(" ")[0]?"#4ade80":"#f87171"}}>{r.regime} {better===r.regime.split(" ")[0]&&"✓"}</div>
                  <div style={{fontSize:11,color:"#555"}}>{r.note}</div>
                </div>
                <div style={{fontSize:16,fontWeight:800,fontFamily:"'DM Mono',monospace",color:better===r.regime.split(" ")[0]?"#4ade80":"#f87171"}}>{fmtS(r.tax)}</div>
              </div>
            ))}
            <div style={{fontSize:11,color:"#444",marginTop:8,fontStyle:"italic"}}>* Estimate only. Consult a CA for precise numbers.</div>
          </RptSection>
        </div>
      </div>
    );
  };

  // ── Investment P&L Report ──────────────────────────────────────────────────
  const renderPnL = () => {
    const inv = rdata.assets.filter(a=>["Stocks","Mutual Funds","Crypto"].includes(a.category)&&(a.invested>0||a.buyPrice>0));
    const totalInvested = inv.reduce((s,a)=>{
      const cost = a.category==="Mutual Funds" ? (a.invested||0) : (a.qty||0)*(a.buyPrice||0);
      return s+cost;
    },0);
    const totalCurrent = inv.reduce((s,a)=>s+(a.value||0),0);
    const totalPnl = totalCurrent - totalInvested;
    const rows = inv.map(a=>{
      const cost = a.category==="Mutual Funds" ? (a.invested||0) : (a.qty||0)*(a.buyPrice||0);
      const pnl  = (a.value||0) - cost;
      const pct  = cost>0 ? (pnl/cost*100).toFixed(1) : 0;
      return [
        a.name,
        a.category,
        {v:fmtS(cost), color:"#aaa"},
        {v:fmtS(a.value||0), color:"#4ade80"},
        {v:(pnl>=0?"+":"")+fmtS(pnl), color:pnl>=0?"#4ade80":"#f87171"},
        {v:(pnl>=0?"+":"")+pct+"%", color:pnl>=0?"#4ade80":"#f87171"},
      ];
    }).sort((a,b)=>(b[4].v>a[4].v?1:-1));
    return(<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[
          {l:"Total Invested",  v:fmtS(totalInvested), c:"#aaa"},
          {l:"Current Value",   v:fmtS(totalCurrent),  c:"#4ade80"},
          {l:"Total P&L",       v:(totalPnl>=0?"+":"")+fmtS(totalPnl), c:totalPnl>=0?"#4ade80":"#f87171"},
        ].map(s=>(
          <div key={s.l} className="rpt-kpi">
            <div style={{fontSize:10,color:"#555",marginBottom:4}}>{s.l}</div>
            <div className="rpt-kpi-val" style={{color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>
      <RptTable
        headers={["Holding","Category","Invested","Current Value","P&L (₹)","P&L (%)"]}
        rows={rows}
        totals={["TOTAL","",{v:fmtS(totalInvested),color:"#aaa"},{v:fmtS(totalCurrent),color:"#4ade80"},{v:(totalPnl>=0?"+":"")+fmtS(totalPnl),color:totalPnl>=0?"#4ade80":"#f87171"},""]}
      />
    </div>);
  };

  // ── EMI Schedule Report ────────────────────────────────────────────────────
  const renderEmiSchedule = () => {
    const loans = rdata.liabilities.filter(l=>l.emi>0);
    const totalEmi = loans.reduce((s,l)=>s+(l.emi||0),0);
    const totalOut = loans.reduce((s,l)=>s+(l.value||0),0);
    const rows = loans.map(l=>{
      const daysLeft = l.endDate ? Math.ceil((new Date(l.endDate)-new Date())/86400000) : null;
      const paidPct  = l.origAmt>0 ? ((l.origAmt-l.value)/l.origAmt*100).toFixed(0) : null;
      return [
        l.name,
        l.lender||"—",
        {v:fmtS(l.emi)+"/mo", color:"#f87171"},
        {v:fmtS(l.value), color:"#f87171"},
        l.intRate>0?{v:l.intRate+"%",color:"#fbbf24"}:"—",
        l.emiDate||"—",
        daysLeft!==null ? {v:daysLeft<0?"Overdue":Math.round(daysLeft/30)+"mo left", color:daysLeft<90?"#f87171":"#aaa"} : "—",
        paidPct!==null ? {v:paidPct+"% paid", color:"#4ade80"} : "—",
      ];
    });
    return(<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[
          {l:"Total Monthly EMI",  v:fmtS(totalEmi)+"/mo", c:"#f87171"},
          {l:"Total Outstanding",  v:fmtS(totalOut),        c:"#f87171"},
          {l:"Active Loans",       v:loans.length,          c:"#fbbf24"},
        ].map(s=>(
          <div key={s.l} className="rpt-kpi">
            <div style={{fontSize:10,color:"#555",marginBottom:4}}>{s.l}</div>
            <div className="rpt-kpi-val" style={{color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>
      <RptTable
        headers={["Loan","Lender","EMI","Outstanding","Rate","Due Date","Remaining","Progress"]}
        rows={rows}
        totals={["TOTAL","",{v:fmtS(totalEmi)+"/mo",color:"#f87171"},{v:fmtS(totalOut),color:"#f87171"},"","","",""]}
      />
    </div>);
  };

  const RENDERERS = {
    networth:    renderNetWorth,
    assets:      renderAssets,
    pnl:         renderPnL,
    liabilities: renderLiabilities,
    emischedule: renderEmiSchedule,
    income:      renderIncome,
    expenses:    renderExpenses,
    cashflow:    renderCashFlow,
    insurance:   renderInsurance,
    pwdvault:    renderPwdVault,
    tax:         renderTax,
  };

  return(
    <div style={{display:"flex",gap:20,alignItems:"flex-start"}} className="rpt-layout">
      {/* ── Left sidebar ── */}
      <div className="no-print rpt-sidebar" style={{width:200,flexShrink:0,position:"sticky",top:0}}>
        {/* Member filter */}
        {family.length>1&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#555",marginBottom:8}}>Viewing</div>
            {[{id:"all",name:"Consolidated",color:"#60a5fa"},...family].map(m=>(
              <div key={m.id} onClick={()=>setActiveMember(m.id)}
                style={{padding:"7px 10px",borderRadius:8,cursor:"pointer",marginBottom:4,transition:"all .15s",
                  background:activeMember===m.id?`${m.color}22`:"transparent",
                  border:`1px solid ${activeMember===m.id?m.color:"transparent"}`,
                  color:activeMember===m.id?m.color:"#666",fontSize:12,fontWeight:activeMember===m.id?700:400}}>
                {m.id==="all"?"👨‍👩‍👧 ":""}{m.name}
              </div>
            ))}
          </div>
        )}
        <div style={{fontSize:11,fontWeight:800,letterSpacing:2,textTransform:"uppercase",color:"#555",marginBottom:14}}>Reports</div>
        {REPORT_TYPES.map(r=>(
          <div key={r.id} onClick={()=>setActiveReport(r.id)}
            style={{padding:"11px 14px",borderRadius:10,cursor:"pointer",marginBottom:6,transition:"all 0.15s",
              background:activeReport===r.id?"linear-gradient(135deg,#1e1b4b,#2e1065)":"transparent",
              border:activeReport===r.id?"1px solid #3730a3":"1px solid transparent",
              color:activeReport===r.id?"#a78bfa":"#666"}}>
            <div style={{fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>
              <span>{r.icon}</span><span>{r.label}</span>
            </div>
            <div style={{fontSize:11,color:activeReport===r.id?"#555":"#444",marginTop:3,paddingLeft:24}}>{r.desc}</div>
          </div>
        ))}
        {/* Full export section */}
        <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #1e1e2e"}}>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#444",marginBottom:8}}>Full Export</div>
          <button onClick={handlePrint} style={{width:"100%",padding:"9px",marginBottom:7,borderRadius:8,background:"#1e1b4b",border:"1px solid #3730a3",color:"#a78bfa",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
            🖨️ Print All Reports
          </button>
          <button onClick={exportAllExcel} style={{width:"100%",padding:"9px",borderRadius:8,background:"#052e16",border:"1px solid #16a34a",color:"#4ade80",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
            📊 Full Excel (All Sheets)
          </button>
        </div>
      </div>

      {/* ── Main report area ── */}
      <div ref={reportRef} style={{flex:1,minWidth:0}}>
        {/* Report header with per-report export buttons */}
        <div style={{background:"linear-gradient(135deg,#111118,#1a1a2e)",border:"1px solid #2a2a3e",borderRadius:16,padding:"20px 24px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:9,color:"#555",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>WealthVault Report</div>
            <div style={{fontSize:22,fontWeight:800,color:"#e8e8f0"}}>{activeType?.icon} {activeType?.label}</div>
            {family.length>1&&(
              <div style={{fontSize:11,color:"#60a5fa",marginTop:4,fontWeight:600}}>
                {activeMember==="all"
                  ? "👨‍👩‍👧 Consolidated — all family members"
                  : "👤 "+family.find(m=>m.id===activeMember)?.name+" ("+family.find(m=>m.id===activeMember)?.relation+") only"}
              </div>
            )}
            <div style={{fontSize:12,color:"#555",marginTop:4}}>{data.profile?.name||"Your Name"} · As of {reportDate}</div>
          </div>
          <div className="no-print" style={{display:"flex",flexDirection:"column",gap:7,alignItems:"flex-end"}}>
            <button onClick={handlePrint}
              style={{padding:"7px 14px",borderRadius:8,background:"#1e1b4b",border:"1px solid #3730a3",color:"#a78bfa",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
              🖨️ Print / PDF
            </button>
            <button onClick={exportReportExcel}
              style={{padding:"7px 14px",borderRadius:8,background:"#052e16",border:"1px solid #16a34a",color:"#4ade80",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
              📊 Download Excel
            </button>
          </div>
        </div>

        {/* Print header */}
        <div className="print-only" style={{marginBottom:24,paddingBottom:16,borderBottom:"2px solid #6d28d9"}}>
          <div style={{fontSize:24,fontWeight:800}}>WealthVault — {activeType?.label}</div>
          <div style={{fontSize:12,color:"#555",marginTop:4}}>{data.profile?.name} · PAN: {data.profile?.pan} · Generated: {reportDate}</div>
        </div>

        {/* Report content */}
        <div className="rpt-page">
          {RENDERERS[activeReport]?.()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
